<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NES Security Assessment</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --critical: #f85149;
  --critical-bg: rgba(248, 81, 73, 0.15);
  --high: #d29922;
  --high-bg: rgba(210, 153, 34, 0.15);
  --medium: #e3b341;
  --medium-bg: rgba(227, 179, 65, 0.15);
  --low: #58a6ff;
  --low-bg: rgba(88, 166, 255, 0.15);
  --success: #3fb950;
  --success-bg: rgba(63, 185, 80, 0.15);
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
}
.header h1 span { color: var(--accent); }
.header-meta {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  white-space: nowrap;
}

/* Stats bar */
.stats-bar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.stats-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 12px;
  min-width: max-content;
}
.stat-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  min-width: 100px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-critical .stat-value { color: var(--critical); }
.stat-high .stat-value { color: var(--high); }
.stat-medium .stat-value { color: var(--medium); }
.stat-low .stat-value { color: var(--low); }

/* Filters */
.filters {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
}
.filters-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-group label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}
.filter-select, .search-input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border var(--transition);
}
.filter-select:focus, .search-input:focus {
  border-color: var(--accent);
}
.search-input {
  flex: 1;
  min-width: 180px;
}
.filter-select { min-width: 110px; }
.sort-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 6px 10px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.sort-btn:hover, .sort-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

/* Main content */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 20px;
}

/* Finding cards */
.findings-list { display: flex; flex-direction: column; gap: 10px; }
.finding-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.finding-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}
.finding-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.severity-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.severity-CRITICAL { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical); }
.severity-HIGH { background: var(--high-bg); color: var(--high); border: 1px solid var(--high); }
.severity-MEDIUM { background: var(--medium-bg); color: var(--medium); border: 1px solid var(--medium); }
.severity-LOW { background: var(--low-bg); color: var(--low); border: 1px solid var(--low); }

.finding-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  flex: 1;
}
.finding-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 2px 8px;
  border-radius: 4px;
}
.meta-tag.category-hackerone { color: #d2a8ff; }
.meta-tag.category-code_review { color: #79c0ff; }
.meta-tag.category-cve_catalog { color: #7ee787; }

.status-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.status-investigating { background: rgba(88,166,255,0.15); color: #58a6ff; }
.status-confirmed { background: rgba(210,153,34,0.15); color: #d29922; }
.status-in_progress { background: rgba(210,153,34,0.15); color: #e3b341; }
.status-fixed { background: rgba(63,185,80,0.15); color: #3fb950; }
.status-released { background: rgba(63,185,80,0.2); color: #56d364; }
.status-wont_fix { background: rgba(110,118,129,0.15); color: #8b949e; }
.status-duplicate { background: rgba(110,118,129,0.15); color: #6e7681; }

.finding-desc-preview {
  font-size: 13px;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Detail panel (slide-in on mobile) */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.6);
}
.detail-overlay.active { display: flex; }
.detail-panel {
  background: var(--bg-secondary);
  width: 100%;
  max-width: 700px;
  margin-left: auto;
  height: 100%;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.detail-header {
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.detail-close {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 18px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--transition);
}
.detail-close:hover { border-color: var(--accent); color: var(--accent); }
.detail-title {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}
.detail-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.detail-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.detail-section-header {
  background: var(--bg-tertiary);
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.detail-section-body {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Status dropdown in detail */
.status-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
}
.status-select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 8px 12px;
  flex: 1;
  outline: none;
}
.status-select:focus { border-color: var(--accent); }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  cursor: pointer;
  transition: background var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--accent-hover); }
.btn-secondary {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
}
.btn-secondary:hover { border-color: var(--accent); }

/* Comments section */
.comments-list { display: flex; flex-direction: column; gap: 10px; padding: 14px 16px; }
.comment-item {
  background: var(--bg-tertiary);
  border-radius: 6px;
  padding: 10px 12px;
}
.comment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.comment-author { font-size: 12px; font-weight: 600; color: var(--accent); }
.comment-time { font-size: 11px; color: var(--text-muted); }
.comment-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.comment-form {
  display: flex;
  gap: 8px;
  padding: 0 16px 14px;
}
.comment-input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 8px 12px;
  flex: 1;
  outline: none;
  resize: none;
  font-family: inherit;
  min-height: 38px;
}
.comment-input:focus { border-color: var(--accent); }

/* Tags row in detail */
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px 16px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }

/* Results count */
.results-info {
  font-size: 12px;
  color: var(--text-muted);
  padding: 8px 0;
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 15px; }
  .header-meta { display: none; }
  .stat-card { padding: 8px 12px; min-width: 80px; }
  .stat-card .stat-value { font-size: 20px; }
  .filters-inner { flex-direction: column; }
  .filter-group { width: 100%; }
  .filter-select, .search-input { width: 100%; flex: 1; }
  .detail-panel { max-width: 100%; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Category icons */
.cat-icon {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 4px;
}
.cat-hackerone { background: #d2a8ff; }
.cat-code_review { background: #79c0ff; }
.cat-cve_catalog { background: #7ee787; }

/* Tab navigation for detail view */
.detail-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  overflow-x: auto;
}
.detail-tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all var(--transition);
}
.detail-tab:hover { color: var(--text-primary); }
.detail-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span>NES</span> Security Assessment</h1>
    <div class="header-meta">
      April 2026 &middot; 8 Projects
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-card">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card stat-critical">
      <div class="stat-value" id="criticalCount">0</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat-card stat-high">
      <div class="stat-value" id="highCount">0</div>
      <div class="stat-label">High</div>
    </div>
    <div class="stat-card stat-medium">
      <div class="stat-value" id="mediumCount">0</div>
      <div class="stat-label">Medium</div>
    </div>
    <div class="stat-card stat-low">
      <div class="stat-value" id="lowCount">0</div>
      <div class="stat-label">Low</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--critical)" id="unpatchedCount">0</div>
      <div class="stat-label">Unpatched</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--success)" id="patchedCount">0</div>
      <div class="stat-label">Patched</div>
    </div>
  </div>
</div>

<div class="filters">
  <div class="filters-inner">
    <input type="text" class="search-input" id="searchInput" placeholder="Search findings...">
    <div class="filter-group">
      <label>Severity</label>
      <select class="filter-select" id="severityFilter">
        <option value="">All</option>
        <option value="CRITICAL">Critical</option>
        <option value="HIGH">High</option>
        <option value="MEDIUM">Medium</option>
        <option value="LOW">Low</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Project</label>
      <select class="filter-select" id="projectFilter">
        <option value="">All</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select class="filter-select" id="categoryFilter">
        <option value="">All</option>
        <option value="hackerone">HackerOne</option>
        <option value="code_review">Code Review</option>
        <option value="cve_catalog">CVE Catalog</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select class="filter-select" id="statusFilter">
        <option value="">All</option>
        <option value="investigating">Investigating</option>
        <option value="confirmed">Confirmed</option>
        <option value="in_progress">In Progress</option>
        <option value="fixed">Fixed</option>
        <option value="released">Released</option>
        <option value="wont_fix">Won't Fix</option>
        <option value="duplicate">Duplicate</option>
      </select>
    </div>
    <button class="sort-btn active" id="sortSeverity" onclick="setSort('severity')">Sort: Severity</button>
    <button class="sort-btn" id="sortProject" onclick="setSort('project')">Sort: Project</button>
  </div>
</div>

<div class="main">
  <div class="results-info" id="resultsInfo"></div>
  <div class="findings-list" id="findingsList"></div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <button class="detail-close" onclick="closeDetail()">&larr;</button>
      <div class="detail-title" id="detailTitle"></div>
    </div>
    <div class="detail-tabs">
      <div class="detail-tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
      <div class="detail-tab" data-tab="technical" onclick="switchTab('technical')">Technical</div>
      <div class="detail-tab" data-tab="discussion" onclick="switchTab('discussion')">Discussion</div>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
// ============================================================
// EMBEDDED FINDINGS DATA
// ============================================================
const FINDINGS = [
  // === CRITICAL / HIGH CODE REVIEW FINDINGS ===
  {
    id: "f001", title: "Tomcat Tribes Clustering \u2014 Unfiltered Deserialization",
    severity: "HIGH", project: "Tomcat", category: "code_review", status: "confirmed",
    description: "XByteBuffer.java uses ObjectInputStream.readObject() with zero class filtering. RCE via gadget chains when clustering is enabled. POTENTIALLY NOVEL FINDING \u2014 not in any CVE catalog.",
    affected_files: "XByteBuffer.java \u2014 ObjectInputStream.readObject()",
    exploitation: "When Tribes clustering is enabled, an attacker on the multicast subnet can send crafted serialized objects to the clustering port. Combined with common gadget chain libraries (commons-collections, etc.), this leads to Remote Code Execution.",
    remediation: "Add ObjectInputFilter to Tribes deserialization path; audit all NES Tomcat deployments for clustering configuration.",
    adversarial_verdict: "Confirmed (HIGH, novel) \u2014 strongest Tomcat finding. Clustering not enabled by default; multicast limited to local subnet.",
    fix_status: "Unpatched", affected_versions: "Tomcat 9.0 / 8.5", cve_ids: null, hackerone_id: null
  },
  {
    id: "f002", title: "Cocoon Systemic XXE (3 Core Parsers)",
    severity: "HIGH", project: "Cocoon", category: "code_review", status: "confirmed",
    description: "Core XML parsers (JaxpSAXParser, JaxpDOMParser, DomHelper) do NOT disable external entities. Only StreamGenerator has XXE protections. This is a systemic framework-level issue.",
    affected_files: "JaxpSAXParser.java, JaxpDOMParser.java, DomHelper.java",
    exploitation: "Attacker-controlled XML is processed by any Cocoon pipeline using these core parsers. External entity resolution enables file disclosure (XXE), SSRF, and potentially denial of service.",
    remediation: "Add XXE protections (disable external entities and DTDs) to JaxpSAXParser and JaxpDOMParser at the framework level.",
    adversarial_verdict: "Confirmed in source code. Exploitability depends on whether attacker-controlled XML reaches these parsers (sitemap configuration dependent).",
    fix_status: "Unpatched", affected_versions: "Apache Cocoon", cve_ids: null, hackerone_id: null
  },
  {
    id: "f003", title: "Cocoon RequestGenerator \u2014 Direct User Input XXE/Injection",
    severity: "HIGH", project: "Cocoon", category: "code_review", status: "confirmed",
    description: "Request parameters starting with xml: are parsed as XML and injected into the pipeline. No sitemap misconfiguration required \u2014 directly user-controlled input.",
    affected_files: "RequestGenerator.java \u2014 xml: parameter prefix handling",
    exploitation: "Attacker sends HTTP request with parameter name starting with xml: prefix. The value is parsed as XML and injected into the Cocoon pipeline, enabling XXE and injection attacks without any special sitemap configuration.",
    remediation: "Sanitize or disable the xml: parameter prefix in RequestGenerator.",
    adversarial_verdict: "Confirmed as the highest-priority Cocoon finding (directly user-controlled).",
    fix_status: "Unpatched", affected_versions: "Apache Cocoon", cve_ids: null, hackerone_id: null
  },
  {
    id: "f004", title: "Cocoon SQL Injection in SQLTransformer",
    severity: "HIGH", project: "Cocoon", category: "code_review", status: "confirmed",
    description: "escapeSql() only doubles single quotes; ancestor-value has zero escaping; values concatenated directly into SQL strings.",
    affected_files: "SQLTransformer.java \u2014 escapeSql(), ancestor-value handling",
    exploitation: "If sitemap passes user input to SQL queries via SQLTransformer, the inadequate escaping allows SQL injection. ancestor-value paths have zero escaping applied.",
    remediation: "Replace string concatenation with parameterized queries in SQLTransformer.",
    adversarial_verdict: "Confirmed. Exploitability requires sitemap to pass user input to SQL queries.",
    fix_status: "Unpatched", affected_versions: "Apache Cocoon", cve_ids: null, hackerone_id: null
  },
  {
    id: "f005", title: "Spring HTTP Invoker Unsafe Deserialization",
    severity: "HIGH", project: "Spring", category: "code_review", status: "investigating",
    description: "HttpInvokerServiceExporter deserializes HTTP request bodies via ObjectInputStream.readObject() with zero filtering. This IS CVE-2016-1000027. Verify NES patch actually adds deserialization filtering \u2014 the reviewed code shows none.",
    affected_files: "HttpInvokerServiceExporter.java \u2014 readRemoteInvocation()",
    exploitation: "Attacker sends crafted serialized Java object as HTTP request body to any endpoint using HttpInvokerServiceExporter. Deserialization with no filtering enables RCE via gadget chains.",
    remediation: "Verify NES patch for CVE-2016-1000027 is effective. Add ObjectInputFilter if missing.",
    adversarial_verdict: "This IS CVE-2016-1000027 (already in NES catalog as 'Patched'). Verify that the NES patch actually adds deserialization filtering.",
    fix_status: "Patched (verify)", affected_versions: "Spring Framework 4.3.34", cve_ids: "CVE-2016-1000027", hackerone_id: null
  },
  // === Struts 6.8 Code Review ===
  {
    id: "f006", title: "Struts ScopeInterceptor OGNL Injection",
    severity: "MEDIUM", project: "Struts 6.8", category: "code_review", status: "confirmed",

// ============================================================
// LOCAL STATE
// ============================================================
let comments = {};  // findingId -> [{author, text, created_at}]
let currentSort = 'severity';
let currentFinding = null;
let currentTab = 'overview';

// Datasource config (for when platform bug is fixed)
const DS_CONFIG = {
  findingsId: 'fe21a607-e177-45ef-8243-eb8f06430ffd',
  commentsId: '78c1e932-5f77-4838-8089-e6a9e923c20c',
  statusLogId: 'fe987579-c83f-44a5-8370-35fee16033ad'
};

// ============================================================
// SEVERITY SORT ORDER
// ============================================================
const SEV_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };

// ============================================================
// INIT
// ============================================================
function init() {
  populateProjectFilter();
  updateStats();
  renderFindings();
  // Wire up filters
  document.getElementById('searchInput').addEventListener('input', renderFindings);
  document.getElementById('severityFilter').addEventListener('change', renderFindings);
  document.getElementById('projectFilter').addEventListener('change', renderFindings);
  document.getElementById('categoryFilter').addEventListener('change', renderFindings);
  document.getElementById('statusFilter').addEventListener('change', renderFindings);
  // Close detail on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });
}

function populateProjectFilter() {
  const projects = [...new Set(FINDINGS.map(f => f.project))].sort();
  const sel = document.getElementById('projectFilter');
  projects.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
}

function getFilteredFindings() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const severity = document.getElementById('severityFilter').value;
  const project = document.getElementById('projectFilter').value;
  const category = document.getElementById('categoryFilter').value;
  const status = document.getElementById('statusFilter').value;

  let filtered = FINDINGS.filter(f => {
    if (severity && f.severity !== severity) return false;
    if (project && f.project !== project) return false;
    if (category && f.category !== category) return false;
    if (status && f.status !== status) return false;
    if (search) {
      const haystack = (f.title + ' ' + f.description + ' ' + f.project + ' ' + (f.cve_ids || '') + ' ' + (f.hackerone_id || '')).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Sort
  if (currentSort === 'severity') {
    filtered.sort((a, b) => (SEV_ORDER[a.severity] || 9) - (SEV_ORDER[b.severity] || 9));
  } else if (currentSort === 'project') {
    filtered.sort((a, b) => a.project.localeCompare(b.project));
  }
  return filtered;
}

function updateStats() {
  const all = FINDINGS;
  document.getElementById('totalCount').textContent = all.length;
  document.getElementById('criticalCount').textContent = all.filter(f => f.severity === 'CRITICAL').length;
  document.getElementById('highCount').textContent = all.filter(f => f.severity === 'HIGH').length;
  document.getElementById('mediumCount').textContent = all.filter(f => f.severity === 'MEDIUM').length;
  document.getElementById('lowCount').textContent = all.filter(f => f.severity === 'LOW').length;
  document.getElementById('unpatchedCount').textContent = all.filter(f => f.fix_status && f.fix_status.toLowerCase().includes('unpatched')).length;
  document.getElementById('patchedCount').textContent = all.filter(f => f.fix_status && f.fix_status.toLowerCase().includes('patched') && !f.fix_status.toLowerCase().includes('unpatched')).length;
}

// ============================================================
// RENDER FINDINGS LIST
// ============================================================
function renderFindings() {
  const findings = getFilteredFindings();
  const container = document.getElementById('findingsList');
  const info = document.getElementById('resultsInfo');
  info.textContent = `Showing ${findings.length} of ${FINDINGS.length} findings`;

  if (findings.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No findings match your filters</h3><p>Try adjusting your search or filters</p></div>';
    return;
  }

  container.innerHTML = findings.map(f => `
    <div class="finding-card" onclick="openDetail('${f.id}')">
      <div class="finding-card-header">
        <span class="severity-badge severity-${f.severity}">${f.severity}</span>
        <span class="finding-title">${esc(f.title)}</span>
      </div>
      <div class="finding-desc-preview">${esc(f.description)}</div>
      <div class="finding-meta">
        <span class="meta-tag"><span class="cat-icon cat-${f.category}"></span>${formatCategory(f.category)}</span>
        <span class="meta-tag">${esc(f.project)}</span>
        <span class="status-tag status-${f.status}">${formatStatus(f.status)}</span>
        ${f.hackerone_id ? `<span class="meta-tag category-hackerone">H1#${f.hackerone_id}</span>` : ''}
        ${f.cve_ids ? `<span class="meta-tag category-cve_catalog">${esc(f.cve_ids.split(',')[0])}${f.cve_ids.includes(',') ? '...' : ''}</span>` : ''}
        ${f.fix_status ? `<span class="meta-tag">${esc(f.fix_status)}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function setSort(type) {
  currentSort = type;
  document.getElementById('sortSeverity').classList.toggle('active', type === 'severity');
  document.getElementById('sortProject').classList.toggle('active', type === 'project');
  renderFindings();
}

// ============================================================
// DETAIL VIEW
// ============================================================
function openDetail(id) {
  currentFinding = FINDINGS.find(f => f.id === id);
  if (!currentFinding) return;
  currentTab = 'overview';
  document.getElementById('detailTitle').textContent = currentFinding.title;
  renderDetailContent();
  document.getElementById('detailOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailOverlay') && !e.target.classList.contains('detail-close')) return;
  document.getElementById('detailOverlay').classList.remove('active');
  document.body.style.overflow = '';
  currentFinding = null;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderDetailContent();
}

function renderDetailContent() {
  const f = currentFinding;
  if (!f) return;
  const container = document.getElementById('detailContent');

  let html = '';

  // Overview tab
  html += `<div class="tab-content ${currentTab === 'overview' ? 'active' : ''}">`;
  html += `<div class="detail-section"><div class="detail-section-header">Classification</div><div class="detail-tags">
    <span class="severity-badge severity-${f.severity}">${f.severity}</span>
    <span class="meta-tag"><span class="cat-icon cat-${f.category}"></span>${formatCategory(f.category)}</span>
    <span class="meta-tag">${esc(f.project)}</span>
    <span class="status-tag status-${f.status}">${formatStatus(f.status)}</span>
    ${f.hackerone_id ? `<span class="meta-tag category-hackerone">HackerOne #${f.hackerone_id}</span>` : ''}
    ${f.cve_ids ? `<span class="meta-tag category-cve_catalog">${esc(f.cve_ids)}</span>` : ''}
    ${f.fix_status ? `<span class="meta-tag">${esc(f.fix_status)}</span>` : ''}
    ${f.affected_versions ? `<span class="meta-tag">${esc(f.affected_versions)}</span>` : ''}
  </div></div>`;

  // Status update
  html += `<div class="detail-section"><div class="detail-section-header">Update Status</div>
    <div class="status-controls">
      <select class="status-select" id="statusSelect">
        ${['investigating','confirmed','in_progress','fixed','released','wont_fix','duplicate'].map(s =>
          `<option value="${s}" ${f.status === s ? 'selected' : ''}>${formatStatus(s)}</option>`
        ).join('')}
      </select>
      <button class="btn" onclick="updateStatus()">Update</button>
    </div></div>`;

  html += `<div class="detail-section"><div class="detail-section-header">Description</div>
    <div class="detail-section-body">${esc(f.description)}</div></div>`;

  if (f.adversarial_verdict) {
    html += `<div class="detail-section"><div class="detail-section-header">Adversarial Review Verdict</div>
      <div class="detail-section-body">${esc(f.adversarial_verdict)}</div></div>`;
  }
  html += '</div>';

  // Technical tab
  html += `<div class="tab-content ${currentTab === 'technical' ? 'active' : ''}">`;
  if (f.affected_files) {
    html += `<div class="detail-section"><div class="detail-section-header">Affected Files</div>
      <div class="detail-section-body" style="font-family:monospace;font-size:12px;">${esc(f.affected_files)}</div></div>`;
  }
  if (f.exploitation) {
    html += `<div class="detail-section"><div class="detail-section-header">Exploitation Scenario</div>
      <div class="detail-section-body">${esc(f.exploitation)}</div></div>`;
  }
  if (f.remediation) {
    html += `<div class="detail-section"><div class="detail-section-header">Remediation</div>
      <div class="detail-section-body">${esc(f.remediation)}</div></div>`;
  }
  html += '</div>';

  // Discussion tab
  html += `<div class="tab-content ${currentTab === 'discussion' ? 'active' : ''}">`;
  const findingComments = comments[f.id] || [];
  html += `<div class="detail-section"><div class="detail-section-header">Comments (${findingComments.length})</div>`;
  if (findingComments.length > 0) {
    html += '<div class="comments-list">';
    findingComments.forEach(c => {
      html += `<div class="comment-item">
        <div class="comment-header">
          <span class="comment-author">${esc(c.author)}</span>
          <span class="comment-time">${formatTime(c.created_at)}</span>
        </div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="comments-list"><div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">No comments yet</div></div>';
  }
  html += `<div class="comment-form">
    <textarea class="comment-input" id="commentInput" placeholder="Add a comment..." rows="2"></textarea>
    <button class="btn" onclick="addComment()" style="align-self:flex-end;">Post</button>
  </div></div>`;
  html += '</div>';

  container.innerHTML = html;
}

function updateStatus() {
  if (!currentFinding) return;
  const newStatus = document.getElementById('statusSelect').value;
  const oldStatus = currentFinding.status;
  if (newStatus === oldStatus) return;
  currentFinding.status = newStatus;
  updateStats();
  renderFindings();
  renderDetailContent();
}

function addComment() {
  if (!currentFinding) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  if (!comments[currentFinding.id]) comments[currentFinding.id] = [];
  comments[currentFinding.id].push({
    author: 'Ryan',
    text: text,
    created_at: new Date().toISOString()
  });
  input.value = '';
  renderDetailContent();
}

// ============================================================
// HELPERS
// ============================================================
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatCategory(cat) {
  switch(cat) {
    case 'hackerone': return 'HackerOne';
    case 'code_review': return 'Code Review';
    case 'cve_catalog': return 'CVE Catalog';
    default: return cat;
  }
}

function formatStatus(s) {
  switch(s) {
    case 'investigating': return 'Investigating';
    case 'confirmed': return 'Confirmed';
    case 'in_progress': return 'In Progress';
    case 'fixed': return 'Fixed';
    case 'released': return 'Released';
    case 'wont_fix': return "Won't Fix";
    case 'duplicate': return 'Duplicate';
    default: return s;
  }
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Start
init();
</script>
