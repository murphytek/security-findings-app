  // === Spring Cloud AWS 2.2.x (nes-2.2.x) ===
  {id:"189722c1-0f88-4257-9fb2-f279ff6f3915",title:"Unsafe Java Deserialization in ObjectMessageConverter",severity:"HIGH",project:"Spring Cloud AWS 2.2.x (nes-2.2.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCA-001] CWE-502 (Upstream-Inherited)\n\n**Severity**: High  \n**CWE**: CWE-502 (Deserialization of Untrusted Data)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-aws-messaging/src/main/java/org/springframework/cloud/aws/messaging/support/converter/ObjectMessageConverter.java:78-79`  \n\n**Description**:  \n`ObjectMessageConverter.convertFromInternal()` deserializes the payload of SQS messages using a bare `ObjectInputStream` with no class filtering or allowlist:\n\n```java\nobjectInputStream = new ObjectInputStream(base64InputStream);\nresult = (Serializable) objectInputStream.readObject();\n```\n\nAny actor who can place a message on the subscribed SQS queue can supply a Base64-encoded serialized Java object. If the application classpath contains gadget classes (e.g., from commons-collections, Spring, or other common libraries), this is exploitable for Remote Code Execution.\n\n**Reachability**:  \n`ObjectMessageConverter` is automatically registered in `QueueMessageHandler.createPayloadArgumentCompositeConverter()` (line 239-241 of `QueueMessageHandler.java`) with `setStrictContentTypeMatch(true)`. The converter is active when an SQS message is sent with the `Content-Type: application/x-java-serialized-object` header. This MIME type can be set by any SQS message sender. The converter is part of the default setup of `QueueMessageHandler`, making it active in any application that uses `@SqsListener`.\n\nAccess requirement: ability to send messages to the SQS queue the application is listening on. In many real-world deployments, multiple services share SQS access, and the AWS SQS IAM boundary is the only control — no authentication on the message content itself.\n\n**Recommendation**:  \nReplace the bare `ObjectInputStream` with a filtering stream (e.g., `java.io.ObjectInputFilter` introduced in Java 9) or remove `ObjectMessageConverter` from the default converter list and require explicit opt-in. Better still, deprecate and remove Java serialization support in favor of JSON.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"52bf4cfe-db80-4325-842f-c28ea9c167bc",title:"Class Loading from Untrusted SQS Message Attributes",severity:"LOW",project:"Spring Cloud AWS 2.2.x (nes-2.2.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCA-002] CWE-94 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-94 (Improper Control of Generation of Code)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-aws-messaging/src/main/java/org/springframework/cloud/aws/messaging/core/QueueMessageUtils.java:104`  \n`spring-cloud-aws-messaging/src/main/java/org/springframework/cloud/aws/messaging/support/converter/NotificationRequestConverter.java:89`  \n\n**Description**:  \nBoth `QueueMessageUtils.getNumberValue()` and `NotificationRequestConverter.getNumberValue()` call `Class.forName(numberType)` where `numberType` is derived from the SQS/SNS message attribute data type field:\n\n```java\nString numberType = value.getDataType().substring(MessageAttributeDataTypes.NUMBER.length() + 1);\nClass<? extends Number> numberTypeClass = Class.forName(numberType).asSubclass(Number.class);\n```\n\nThe data type string (e.g., `Number.java.math.BigDecimal`) comes directly from the SQS/SNS message attributes, which are attacker-controlled. The call is constrained by `.asSubclass(Number.class)`, which prevents loading arbitrary classes and causes a `ClassCastException` if the resolved class is not a `Number` subclass.\n\n**Reachability**:  \nThe attacker-supplied class name is loaded via `Class.forName`, which triggers the class's static initializers. If a class with a dangerous static initializer is present on the classpath and happens to extend `Number`, it could be triggered. However, this scenario requires a very unusual classpath configuration. The `.asSubclass(Number.class)` guard substantially reduces the practical impact from RCE to at most a minor classpath-dependent DoS or unexpected initialization side-effect.\n\n**Recommendation**:  \nReplace `Class.forName()` with an allowlist of permitted numeric types (e.g., `Integer`, `Long`, `Double`, `BigDecimal`, `BigInteger`, `Float`, `Short`, `Byte`). This eliminates any class-loading risk entirely.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"fa4ed91a-b46b-4703-aa86-e709d7d7bcea",title:"Password Exposed in DataSourceInformation.toString()",severity:"LOW",project:"Spring Cloud AWS 2.2.x (nes-2.2.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCA-003] CWE-200 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-200 (Exposure of Sensitive Information)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-aws-jdbc/src/main/java/org/springframework/cloud/aws/jdbc/datasource/DataSourceInformation.java:188`  \n\n**Description**:  \n`DataSourceInformation.toString()` includes the database password in plaintext:\n\n```java\nsb.append(\", password='\").append(this.password).append(\"'\");\n```\n\nIf application code (or frameworks like Spring Boot) calls `toString()` on this object and logs or renders the result (for example, in a diagnostic endpoint, exception message, or debug log), the RDS password will be exposed in plaintext.\n\n**Reachability**:  \nNo call site in the production source directly logs a `DataSourceInformation` object. The risk materializes if: (a) a developer accidentally logs this object, (b) the object appears in an exception message that gets logged, or (c) a framework-level diagnostic serializes Spring beans. The risk is low but non-zero — the `toString()` implementation is a latent hazard.\n\n**Recommendation**:  \nMask the password in `toString()`:  \n```java\nsb.append(\", password='[PROTECTED]'\");\n```\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Spring Cloud CloudFoundry 3.0.x (nes-3.0.x) ===
  {id:"72ec20ff-8e82-4f53-8b28-bb57f3a12fe2",title:"JSESSIONID Cookie Missing HttpOnly and Secure Flags",severity:"LOW",project:"Spring Cloud CloudFoundry 3.0.x (nes-3.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCCF-001] CWE-614 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-614 (Sensitive Cookie Without 'Secure' Attribute) / CWE-1004 (Sensitive Cookie Without 'HttpOnly' Flag)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-cloudfoundry-web/src/main/java/org/springframework/cloud/cloudfoundry/session/StickyFilterConfiguration.java:55`\n\n**Description**:  \nThe `StickyFilterConfiguration` filter adds a `JSESSIONID` cookie to responses using the plain `javax.servlet.http.Cookie` constructor without setting the `HttpOnly` or `Secure` attributes. The cookie value is derived from a Spring `${random}` property (randomized per-instance startup), so the value is not static, but the missing cookie flags are a security posture issue.\n\n```java\nresponse.addCookie(new Cookie(\"JSESSIONID\", StickyFilterConfiguration.this.cookie));\n```\n\nThe cookie is not marked `HttpOnly`, making it accessible to JavaScript running in the browser. It is also not marked `Secure`, so it can be transmitted over HTTP (non-TLS) connections.\n\n**Reachability**:  \nThis filter is only registered if `@EnableStickyFilter` is used (opt-in). It is designed for CF-deployed apps using Eureka session affinity. In such deployments, the cookie value itself is a random per-instance token (not a real session secret) used for routing stickiness, limiting the impact. However, applications relying on this as a secondary session identifier could be at risk of session hijacking over HTTP or via XSS.\n\n**Recommendation**:  \nSet `cookie.setHttpOnly(true)` and `cookie.setSecure(true)` on the created cookie. Example:\n```java\nCookie jsCookie = new Cookie(\"JSESSIONID\", StickyFilterConfiguration.this.cookie);\njsCookie.setHttpOnly(true);\njsCookie.setSecure(true);\nresponse.addCookie(jsCookie);\n```\nAdditionally, note that `javax.servlet` is the Jakarta EE legacy namespace; Spring Boot 3.x migrated to `jakarta.servlet`. This code relies on an older javax namespace, indicating potential compatibility concerns on modern Spring Boot 3 deployments.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"9b6144cc-74d5-4261-a1e9-6fc5d53bf7eb",title:"SSL Validation Configurable Skip for CF API Connection",severity:"LOW",project:"Spring Cloud CloudFoundry 3.0.x (nes-3.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCCF-002] CWE-295 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-295 (Improper Certificate Validation)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-cloudfoundry-commons/src/main/java/org/springframework/cloud/cloudfoundry/CloudFoundryProperties.java:66` and `CloudFoundryClientAutoConfiguration.java:116-118`\n\n**Description**:  \nThe `CloudFoundryProperties` configuration exposes a `skipSslValidation` boolean (property: `spring.cloud.cloudfoundry.skip-ssl-validation`, default: `false`). When set to `true`, the CF Java client reactor connection context disables TLS certificate verification for all connections to the Cloud Foundry API host.\n\n```java\nBoolean skipSslValidation = this.cloudFoundryProperties.isSkipSslValidation();\nreturn DefaultConnectionContext.builder().apiHost(apiHost).skipSslValidation(skipSslValidation).build();\n```\n\n**Reachability**:  \nThis is a user-configured option, not enabled by default. However, operators who enable it for self-signed-cert environments may inadvertently expose the application to MITM attacks on the CF API channel. Credentials (username and password configured via `spring.cloud.cloudfoundry.password`) are transmitted to the CF API for token acquisition via `PasswordGrantTokenProvider`, so disabling SSL validation in that context risks credential interception.\n\n**Recommendation**:  \nDocument this configuration option with a prominent security warning. Consider adding a log warning at startup when `skipSslValidation=true` is detected:\n```java\nif (skipSslValidation) {\n    log.warn(\"SSL validation is disabled for Cloud Foundry API connections. \" +\n             \"This is insecure and should not be used in production.\");\n}\n```\nAlternatively, consider requiring users to explicitly acknowledge the risk or remove the option in favor of custom trust store configuration.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"82d93b95-7b2d-4b85-8de1-b06404112bb5",title:"Unvalidated authDomain from VCAP Environment Used to Build OAuth URIs",severity:"LOW",project:"Spring Cloud CloudFoundry 3.0.x (nes-3.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCCF-003] CWE-918 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-918 (Server-Side Request Forgery)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-cloudfoundry-web/src/main/java/org/springframework/cloud/cloudfoundry/environment/VcapServiceCredentialsEnvironmentPostProcessor.java:66-71`\n\n**Description**:  \nThe `VcapServiceCredentialsEnvironmentPostProcessor` reads the `auth-domain` value from VCAP service binding credentials (`vcap.services.<serviceId>.credentials.auth-domain`) and uses it without validation to construct OAuth endpoint URIs that are then placed into the Spring environment:\n\n```java\nString authDomain = environment.getProperty(\"vcap.services.\" + serviceId + \".credentials.auth-domain\");\nif (authDomain != null) {\n    source.put(\"security.oauth2.resource.user-info-uri\", authDomain + \"/userinfo\");\n    source.put(\"security.oauth2.resource.jwt.key-uri\", authDomain + \"/token_key\");\n    source.put(\"security.oauth2.client.access-token-uri\", authDomain + \"/oauth/token\");\n    source.put(\"security.oauth2.client.user-authorization-uri\", authDomain + \"/oauth/authorize\");\n}\n```\n\n**Reachability**:  \nThe `vcap.services.*` environment is set by the Cloud Foundry platform at application deployment time from bound service instances. In a normal CF deployment model, this value is controlled by the platform operator and is not user-supplied at request time, making SSRF exploitation require a malicious service binding or a compromised CF environment. The risk is therefore primarily relevant in multi-tenant CF deployments where a lower-privilege user can control bound service credentials.\n\nNo URL validation or allowlist is applied to `authDomain`, and a value such as `http://internal-metadata-service` could redirect OAuth flows to an internal target.\n\n**Recommendation**:  \nAdd validation to ensure `authDomain` conforms to an expected scheme and trusted domain suffix before using it to build OAuth endpoint URIs. At minimum, reject values that do not start with `https://` and optionally validate against an allowlist of known CF auth providers:\n```java\nif (authDomain != null && authDomain.startsWith(\"https://\")) {\n    // proceed with URI construction\n}\n```\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Spring Cloud Kubernetes 2.0.x (nes-2.0.x) ===
  {id:"c2210a65-4515-4171-8e2c-b9e3d874a6db",title:"Kubernetes Secret Data Exposed via DEBUG Logging (Fabric8)",severity:"MEDIUM",project:"Spring Cloud Kubernetes 2.0.x (nes-2.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCK-001] CWE-200 (Upstream-Inherited)\n\n**Severity**: Medium  \n**CWE**: CWE-200 (Exposure of Sensitive Information to an Unauthorized Actor)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-kubernetes-fabric8-config/src/main/java/org/springframework/cloud/kubernetes/fabric8/config/reload/EventBasedSecretsChangeDetector.java:131`  \n\n**Description**: When a Kubernetes Secret change event is received, the `onEvent` method logs the full Secret object via `secret.toString()` at DEBUG level. The Fabric8 `Secret` model's `toString()` method (generated via Lombok/StringBuilder) renders all fields including the `data` map, which contains base64-encoded secret values. Any operator who enables DEBUG logging for this class will inadvertently dump all secret key-value pairs (base64-encoded) into the application log.\n\n```java\nprotected void onEvent(Secret secret) {\n    this.log.debug(String.format(\"onEvent configMap: %s\", secret.toString()));\n    ...\n}\n```\n\nAdditionally, in the same class, `stringData` (plain-text secret values) may also be present in the `toString()` output.\n\n**Reachability**: Requires `DEBUG` log level to be set for `org.springframework.cloud.kubernetes.fabric8.config.reload.EventBasedSecretsChangeDetector` or its package. This is not the default log level but is a commonly used debugging practice. Any Secret that changes while DEBUG logging is enabled will have its data logged.\n\n**Recommendation**: Replace `secret.toString()` with a safe alternative that logs only non-sensitive metadata such as the secret name and namespace:\n```java\nthis.log.debug(String.format(\"onEvent secret: name=%s, namespace=%s\",\n    secret.getMetadata().getName(), secret.getMetadata().getNamespace()));\n```\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"891b132e-1e70-4f49-a979-145bc0449902",title:"Kubernetes Secret Data Exposed via DEBUG Logging (Official Client)",severity:"MEDIUM",project:"Spring Cloud Kubernetes 2.0.x (nes-2.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCK-002] CWE-200 (Upstream-Inherited)\n\n**Severity**: Medium  \n**CWE**: CWE-200 (Exposure of Sensitive Information to an Unauthorized Actor)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-kubernetes-client-config/src/main/java/org/springframework/cloud/kubernetes/client/config/reload/KubernetesClientEventBasedSecretsChangeDetector.java:136`  \n\n**Description**: The same pattern exists in the official Kubernetes client implementation. When a `V1Secret` change event is received, `secret.toString()` is logged at DEBUG level. The `V1Secret` model (from `io.kubernetes.client-java`) also uses a StringBuilder-based `toString()` that includes all fields, including the `data` map containing base64-encoded byte arrays. This renders all secret keys and their base64-encoded values in the log output.\n\n```java\nprivate void onEvent(V1Secret secret) {\n    this.log.debug(String.format(\"onEvent configMap: %s\", secret.toString()));\n    ...\n}\n```\n\nNote: the log message string itself is a copy-paste error (\"onEvent configMap: %s\" for a Secret object), indicating this code was not carefully reviewed.\n\n**Reachability**: Same as SCK-001 — requires DEBUG logging to be enabled for this class or package.\n\n**Recommendation**: Same as SCK-001 — log only the secret name and namespace:\n```java\nthis.log.debug(String.format(\"onEvent secret: name=%s, namespace=%s\",\n    secret.getMetadata().getName(), secret.getMetadata().getNamespace()));\n```\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"aab878ca-2f22-4750-943e-35998ab38db9",title:"Environment Property Sources Logged at DEBUG Level (Including Secret Values)",severity:"LOW",project:"Spring Cloud Kubernetes 2.0.x (nes-2.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCK-003] CWE-200 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-200 (Exposure of Sensitive Information to an Unauthorized Actor)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-kubernetes-commons/src/main/java/org/springframework/cloud/kubernetes/commons/config/reload/ConfigurationChangeDetector.java:134-135, 191-192`  \n\n**Description**: In `findPropertySources` and `locateMapPropertySources`, the Spring `Environment` object and the list of `PropertySource` objects are logged at DEBUG level using `%s` format (calling `toString()`). Spring's `MapPropertySource.toString()` includes property names. While `SecretsPropertySource` overrides `toString()` to return only the name (safe), the full environment object (`environment.toString()`) can still expose a wider context. Additionally, any `MapPropertySource` objects that do not override `toString()` in a privacy-safe way may include property values.\n\n```java\nthis.log.debug(String.format(\"environment: %s\", this.environment));\nthis.log.debug(String.format(\"environment sources: %s\", sources));\n```\n\n**Reachability**: Requires DEBUG logging for `org.springframework.cloud.kubernetes.commons.config.reload.ConfigurationChangeDetector`. Exposure is partial because `SecretsPropertySource.toString()` is safely overridden to return only the class name and `name` field. However, the `environment.toString()` call is broader and harder to audit completely.\n\n**Recommendation**: Remove or reduce the granularity of these debug log statements. If retained, log only the source name, not the full object:\n```java\nthis.log.debug(\"environment sources count: \" + sources.size());\n```\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"a477dcf6-88be-4528-bd79-2dc9274ee67e",title:"SpEL Expression Filter Evaluated from Application Configuration",severity:"INFO",project:"Spring Cloud Kubernetes 2.0.x (nes-2.0.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SCK-004] CWE-94 (Upstream-Inherited)\n\n**Severity**: Informational  \n**CWE**: CWE-94 (Improper Control of Generation of Code)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-cloud-kubernetes-fabric8-discovery/src/main/java/org/springframework/cloud/kubernetes/fabric8/discovery/KubernetesDiscoveryClient.java:288-303`  \n\n**Description**: The `getServices()` method evaluates a SpEL expression sourced from `spring.cloud.kubernetes.discovery.filter` application property. The expression is evaluated using `SimpleEvaluationContext` which is a restricted evaluation context (read-only data binding, no method invocations beyond instance methods, no class access). This significantly limits the impact of malicious SpEL expressions.\n\n```java\nString spelExpression = this.properties.getFilter();\nExpression filterExpr = this.parser.parseExpression(spelExpression);\nfilteredServices = (Service instance) -> {\n    Boolean include = filterExpr.getValue(this.evalCtxt, instance, Boolean.class);\n    ...\n};\n```\n\n**Reachability**: The filter is sourced from application configuration (e.g., `application.yml` or environment variables), not from runtime HTTP input. An attacker would need to control the application configuration to inject a malicious SpEL expression. `SimpleEvaluationContext` prevents most dangerous operations. This is a defense-in-depth concern rather than a directly exploitable vulnerability in a typical deployment.\n\n**Recommendation**: Document that this filter property accepts SpEL and that operators should treat it as trusted configuration. No code change required given `SimpleEvaluationContext` is already in use.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Spring Hadoop 2.5.x (nes-2.5.x) ===
  {id:"5f65477e-2eea-49d8-96af-1120a25535fd",title:"HiveQL Injection via Unparameterized Statement Execution",severity:"MEDIUM",project:"Spring Hadoop 2.5.x (nes-2.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SH-001] CWE-94 (Upstream-Inherited)\n\n**Severity**: Medium  \n**CWE**: CWE-94 (Code Injection)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-hadoop-hive/src/main/java/org/springframework/data/hadoop/hive/HiveClient.java`\n\n**Description**:  \n`HiveClient.execute(String command)` uses `Connection.createStatement()` followed by `stmt.execute(command)` — a raw, unparameterized JDBC statement. The public API surface in `HiveTemplate.query(String query, Map<?,?> arguments)` accepts a raw HiveQL string as input. If an application passes user-controlled input to `HiveTemplate.query()`, it flows directly to `HiveClient.execute()` without sanitization or parameterization.\n\nHiveQL does not support JDBC prepared statements in the same way relational databases do, so parameterized queries are not available for many statement types. However, this design makes it very easy for library consumers to introduce injection by directly forwarding untrusted input.\n\n**Relevant Code**:\n```java\n// HiveClient.java:67-71\nStatement stmt = con.createStatement();\n// ...\nboolean retRs = stmt.execute(command);  // raw, unparameterized\n```\n\n```java\n// HiveTemplate.java:114-143 — public query() method accepts arbitrary string\npublic List<String> query(String query) throws DataAccessException { ... }\npublic List<String> query(String query, Map<?,?> arguments) throws DataAccessException { ... }\n```\n\n**Impact**: If a downstream application passes unsanitized user input to `HiveTemplate.query()` or `HiveTemplate.queryForString()`, an attacker could inject arbitrary HiveQL commands. Exploitation requires that the application pass user-controlled strings to these APIs without its own sanitization.\n\n**Recommendation**: Add a warning in the API documentation that raw user input must not be passed to `query()`. Consider adding an input validation layer or restricting to allowlisted patterns. Downstream applications should treat this API as \"developer use only\" and not expose it to end-user input.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"0758cc39-db9b-4ca3-a703-1c8bc58fb60d",title:"HiveQL Parameter Injection via Unsanitized SET hiveconf Arguments",severity:"MEDIUM",project:"Spring Hadoop 2.5.x (nes-2.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SH-002] CWE-94 (Upstream-Inherited)\n\n**Severity**: Medium  \n**CWE**: CWE-94 (Code Injection)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-hadoop-hive/src/main/java/org/springframework/data/hadoop/hive/HiveUtils.java` (line 208)\n\n**Description**:  \nWhen `HiveScript` arguments are processed, key-value pairs are injected into HiveQL via a raw string concatenation into `SET hiveconf:` commands:\n\n```java\nresults.addAll(runCommand(hive, \"SET hiveconf:\" + entry.getKey() + \"=\" + entry.getValue()));\n```\n\nNeither `entry.getKey()` nor `entry.getValue()` is sanitized or validated. If an attacker controls argument keys or values (e.g., via a map passed from user-controlled configuration), they could inject additional HiveQL commands using semicolons or other control characters. For example, a value of `foo; DROP TABLE important_data` would be executed as two separate commands.\n\nThe script parsing logic in `HiveUtils.run()` splits on `;` and executes each token as a separate HiveQL command, compounding this risk.\n\n**Relevant Code**:\n```java\n// HiveUtils.java:207-209\nfor (Map.Entry<String, String> entry : params.entrySet()) {\n    results.addAll(runCommand(hive, \"SET hiveconf:\" + entry.getKey() + \"=\" + entry.getValue()));\n}\n```\n\n**Impact**: An attacker who can influence script argument key/value pairs can inject arbitrary HiveQL commands, potentially accessing or modifying data beyond what is intended.\n\n**Recommendation**: Validate that argument keys and values do not contain `;`, newlines, or other HiveQL command separators before constructing the `SET hiveconf:` command. Reject or escape values that contain control characters.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"20ff2967-8c99-46e7-8bd6-ed1ebe8b420d",title:"Security Token Values Logged at INFO Level",severity:"LOW",project:"Spring Hadoop 2.5.x (nes-2.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SH-003] CWE-200 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-200 (Information Exposure)  \n**Classification**: Upstream-Inherited  \n**Files**:\n- `spring-yarn/spring-yarn-core/src/main/java/org/springframework/yarn/configuration/ConfigurationFactoryBean.java` (lines 182-184)\n- `spring-yarn/spring-yarn-core/src/main/java/org/springframework/yarn/am/container/DefaultContainerLauncher.java` (line 180)\n- `spring-yarn/spring-yarn-core/src/main/java/org/springframework/yarn/am/allocate/AbstractPollingAllocator.java` (line 224)\n- `spring-yarn/spring-yarn-core/src/main/java/org/springframework/yarn/client/AbstractYarnClient.java` (line 414)\n\n**Description**:  \nHadoop security tokens (Kerberos delegation tokens, NM tokens, AM-RM tokens) are logged at `INFO` level via `log.info(token)` and `log.info(\"Token \" + token)`. The `Token.toString()` representation in Hadoop includes the token identifier, kind, service, and in some cases encoded token bytes — information that could help an attacker replay or forge authentication.\n\nExamples:\n```java\n// ConfigurationFactoryBean.java:182-184\nlog.info(\"Executing with tokens:\");\nfor (Token<?> token : credentials.getAllTokens()) {\n    log.info(token);  // full token toString() logged\n}\n\n// AbstractYarnClient.java:414\nlog.info(\"Got delegation token for \" + fs.getUri() + \"; \" + token);\n```\n\n**Impact**: If application logs are accessible to unauthorized users (e.g., via log aggregation systems, bug reports, or misconfigured log storage), token information could be exposed. Hadoop tokens are time-limited but can be replayed within their validity window.\n\n**Recommendation**: Change token logging to `DEBUG` level, or redact sensitive token fields (keeping only the `kind` and `service` for diagnostic value). Never log full token strings at `INFO` in production paths.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"0c4d6066-a889-4c4f-a7dc-628040303613",title:"Stack Traces Written to stderr via printStackTrace",severity:"LOW",project:"Spring Hadoop 2.5.x (nes-2.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SH-004] CWE-200 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-200 (Information Exposure)  \n**Classification**: Upstream-Inherited  \n**Files**:\n- `spring-yarn/spring-yarn-batch/src/main/java/org/springframework/yarn/batch/repository/JobRepositoryService.java` (lines 195, 197, 199)\n- `spring-yarn/spring-yarn-core/src/main/java/org/springframework/yarn/launch/AbstractCommandLineRunner.java` (line 192)\n\n**Description**:  \nSeveral catch blocks call `e.printStackTrace()` directly to stderr rather than routing through the logging framework. This can expose internal implementation details (class names, method signatures, file paths, line numbers) to users or system administrators with access to stderr. In containerized Hadoop YARN environments, stderr is often captured and surfaced in job logs accessible to cluster users.\n\n```java\n// JobRepositoryService.java:195-199\n} catch (JobExecutionAlreadyRunningException e) {\n    e.printStackTrace();\n} catch (JobRestartException e) {\n    e.printStackTrace();\n} catch (JobInstanceAlreadyCompleteException e) {\n    e.printStackTrace();\n}\n```\n\n**Impact**: Stack traces can reveal internal library structure useful for crafting more targeted attacks, and expose environment details. Low severity since this is primarily an operational/informational concern rather than a direct attack vector.\n\n**Recommendation**: Replace `e.printStackTrace()` with proper logger calls: `log.error(\"Description\", e)`.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"7cd0aab5-0f4f-4f98-9177-bcb33d8bd4bd",title:"JSR-223 Script Execution with Arbitrary Script Engine",severity:"LOW",project:"Spring Hadoop 2.5.x (nes-2.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SH-005] CWE-94 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-94 (Code Injection)  \n**Classification**: Upstream-Inherited  \n**File**: `spring-hadoop-core/src/main/java/org/springframework/data/hadoop/scripting/Jsr223ScriptEvaluator.java`\n\n**Description**:  \n`Jsr223ScriptEvaluator.evaluate()` executes arbitrary scripts using the JSR-223 `ScriptEngine` API. The script content, language, and bindings are all configurable at the caller level. While this is intentional by design (it is a scripting support module), the API allows execution of any code reachable via the JVM's script engine classpath (Groovy, JavaScript/Nashorn, etc.).\n\n```java\n// Jsr223ScriptEvaluator.java:79-80\nreturn (bindings == null ? engine.eval(script.getScriptAsString()) : engine.eval(\n        script.getScriptAsString(), bindings));\n```\n\nThis is a design-level concern: the library provides no sandboxing, security manager integration, or allowlisting of script content. If an application exposes this capability to untrusted input (e.g., user-configurable Groovy scripts), it results in arbitrary code execution.\n\n**Impact**: Depends entirely on how consuming applications use this API. If script content is developer-controlled (e.g., loaded from application classpath), this is by design and low risk. If application exposes this to end users, it is critical. The library itself carries the risk of misuse.\n\n**Recommendation**: Add clear documentation warning that `Jsr223ScriptEvaluator` must not be used with untrusted script content. Consider adding an explicit note in the API Javadoc about the security implications of the script engine selection.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Spring Security JWT 1.1.x (nes-1.1.x) ===
  {id:"e50c6891-d131-4128-bf3a-67df42501505",title:"BouncyCastle 1.64 — Timing Side-Channel in EC Operations (CVE-2020-15522)",severity:"MEDIUM",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-001] CWE-385 (Unpatched-CVE)\n\n**Severity**: Medium  \n**CWE**: CWE-385 (Covert Timing Channel)  \n**Classification**: Unpatched-CVE  \n\n**Description**:  \nThe NES branch pins BouncyCastle to `bcpkix-jdk15on:1.64`. The upstream spring-security-jwt codebase explicitly updated to 1.69 in commit `f81c74c9` (\"update bouncycastle to 1.69 to fix security vulnerability\"). CVE-2020-15522 affects BouncyCastle < 1.66 and describes a timing-based private key leakage vulnerability in Elliptic Curve point multiplication operations. The EC code path is used in `EllipticCurveKeyHelper.createPublicKey()` and `EllipticCurveVerifier.verify()`.\n\n**Affected Code**:\n- `/src/main/java/org/springframework/security/jwt/crypto/sign/EllipticCurveKeyHelper.java` — uses `org.bouncycastle.jce.ECNamedCurveTable` and `ECNamedCurveSpec`\n- `/src/main/java/org/springframework/security/jwt/crypto/sign/EllipticCurveVerifier.java`\n- `pom.xml`: `bcpkix-jdk15on:1.64`\n\n**Proof**:\nUpstream commit `f81c74c9` (July 2021) bumped BC to 1.69 specifically to address this class of vulnerability. The NES branch was forked from 1.1.1.RELEASE, which predates this fix, and the NESify commit (`2aa540b5`) did not backport the BC upgrade.\n\n**Recommendation**: Upgrade `bcpkix-jdk15on` from `1.64` to `1.78.1` or latest stable.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"7d9de2bd-8555-47fc-bd97-dcff3af8c686",title:"BouncyCastle 1.64 — RSA PKCS#1 v1.5 Oracle Attack (CVE-2020-26939)",severity:"MEDIUM",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-002] CWE-203 (Unpatched-CVE)\n\n**Severity**: Medium  \n**CWE**: CWE-203 (Observable Discrepancy)  \n**Classification**: Unpatched-CVE  \n\n**Description**:  \nCVE-2020-26939 affects BouncyCastle < 1.66 and describes a Bleichenbacher-style oracle attack against RSA PKCS#1 v1.5 decryption. While the primary attack surface is decryption (not signature verification), the library's RSA key parsing in `RsaKeyHelper` uses BouncyCastle ASN.1 primitives and the same vulnerable version. Additionally, `JwtAlgorithms` maps `RSA1_5` to `RSA/ECB/PKCS1Padding` for key encryption operations.\n\n**Affected Code**:\n- `/src/main/java/org/springframework/security/jwt/crypto/sign/RsaKeyHelper.java`\n- `pom.xml`: `bcpkix-jdk15on:1.64`\n- `JwtAlgorithms.java` line 40: `keyAlgs.put(\"RSA1_5\", \"RSA/ECB/PKCS1Padding\")`\n\n**Recommendation**: Upgrade `bcpkix-jdk15on` to `1.78.1` or latest stable.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"2ea703e6-acc9-427e-b68a-bd67c96f4b6c",title:"JWT Header JSON Parser — Naive Colon-Split Breaks URL-Valued `kid` Headers",severity:"LOW",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-003] CWE-20 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-20 (Improper Input Validation)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \n`JwtHeaderHelper.parseMapInternal()` parses JSON by splitting first on `,` then on `:`. This naive approach fails for header values that contain colons, such as URL-format `kid` headers (e.g., `\"kid\":\"https://example.com/keys/1\"`). The `split(\":\")` call produces three tokens (`\"kid\"`, `\"https\"`, `\"//example.com/keys/1\"`) and only `values[1]` (`\"https\"`) is used as the value. The full URL is silently truncated.\n\n**Affected Code**:\n```java\n// JwtHelper.java, lines 147-162\nprivate static Map<String, String> parseMapInternal(String json) {\n    ...\n    for (String pair : json.split(\",\")) {\n        String[] values = pair.split(\":\");   // BUG: splits on ALL colons\n        String key = strip(values[0], '\"');\n        String value = null;\n        if (values.length > 0) {\n            value = strip(values[1], '\"');   // truncates URL-valued headers\n        }\n        ...\n    }\n}\n```\n\n**Impact**: Tokens with URL-style `kid` headers will have their key identifier silently corrupted. If callers use `JwtHelper.headers()` to look up signing keys by `kid`, this can lead to key lookup failures (denial of service) or incorrect key selection.\n\n**Recommendation**: Replace the custom JSON parser with a standard JSON library (Jackson, Gson) or at minimum use `split(\":\", 2)` to limit splitting to the first colon.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"94b46ac8-d9df-4ec4-b005-06cab985428a",title:"JWT Header JSON Parser — Off-by-One Bounds Check Enables ArrayIndexOutOfBoundsException",severity:"LOW",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-004] CWE-20 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-20 (Improper Input Validation)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \nIn `parseMapInternal()`, the bounds check before accessing `values[1]` is incorrect. The code checks `if (values.length > 0)` but then accesses `values[1]`, which requires `values.length > 1`. A crafted JWT header with a key that has no colon-separated value (e.g., `{\"alg\":\"HS256\",\"badkey\"}`) will cause `split(\":\")` to return a single-element array and then throw `ArrayIndexOutOfBoundsException` when `values[1]` is accessed.\n\n**Affected Code**:\n```java\n// JwtHelper.java, lines 152-156\nString[] values = pair.split(\":\");\nString key = strip(values[0], '\"');\nString value = null;\nif (values.length > 0) {          // BUG: should be > 1\n    value = strip(values[1], '\"');  // throws AIOOBE if no ':'\n}\n```\n\n**Impact**: An attacker can send a JWT with a malformed header to trigger an unhandled `ArrayIndexOutOfBoundsException`, causing request processing to fail. This is a denial-of-service vector on endpoints that parse JWTs.\n\n**Recommendation**: Change the bounds check to `values.length > 1` and handle the case where no value is present gracefully.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"312c10c7-5f8a-4b9d-8d5e-ac404bcd3e52",title:"MacSigner String Constructor Uses Platform Default Charset",severity:"LOW",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-005] CWE-116 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-116 (Improper Encoding or Escaping)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \n`MacSigner(String key)` calls `key.getBytes()` without specifying a charset, which uses the JVM platform default charset. On systems where the default charset differs from UTF-8 (e.g., older Windows JVMs with Cp1252), a key string containing non-ASCII characters would be converted to different byte sequences on different platforms, producing different HMAC keys. Tokens signed on one platform would fail verification on another.\n\n**Affected Code**:\n```java\n// MacSigner.java, line 38\npublic MacSigner(String key) {\n    this(new SecretKeySpec(key.getBytes(), DEFAULT_ALGORITHM));  // platform charset\n}\n```\n\nNote: The library's own `Codecs.utf8Encode()` explicitly uses UTF-8 with a comment noting that `String.getBytes` \"is less forgiving.\" This inconsistency in `MacSigner` is a known quality gap.\n\n**Recommendation**: Change `key.getBytes()` to `key.getBytes(StandardCharsets.UTF_8)`.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"a5d113db-fbf0-411d-86ba-4248368ca56d",title:"No Minimum HMAC Key Length Enforcement",severity:"LOW",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-006] CWE-326 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-326 (Inadequate Encryption Strength)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \n`MacSigner` accepts HMAC keys of any length, including a single byte. RFC 7518 (Section 3.2) requires HS256 keys to be at least 256 bits (32 bytes). A commented-out line in the source indicates this was considered but not implemented:\n\n```java\n// MacSigner.java, line 50\n//\tval keyLength = key.getEncoded.length * 8\n```\n\nThere is no enforcement of minimum key length anywhere in the library. Callers using short keys produce tokens that are cryptographically weak and may be susceptible to brute-force attacks.\n\n**Recommendation**: Add a minimum key length check in `MacSigner` constructors: reject keys shorter than 32 bytes for HS256, 48 bytes for HS384, and 64 bytes for HS512.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"826115cd-9b14-450a-beb2-2784ebd174e2",title:"No JWT Claims Validation (exp, iss, aud) in Library",severity:"INFO",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-007] CWE-613 (Upstream-Inherited)\n\n**Severity**: Informational  \n**CWE**: CWE-613 (Insufficient Session Expiration)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \nThe library provides no built-in validation of standard JWT claims (`exp`, `nbf`, `iss`, `aud`). `getClaims()` returns the raw JSON string; callers must parse and validate claims themselves. This is a design-level gap: callers who rely solely on `decodeAndVerify()` will have cryptographic integrity but no semantic validation. Expired tokens, tokens from untrusted issuers, or tokens not intended for the recipient would all be silently accepted.\n\nThe library does not surface this as a risk in its API documentation (which only says the class is `@Deprecated`).\n\n**Impact**: Low by itself (requires caller to omit claims validation), but the library's lack of documentation and deprecated status makes this a common integration mistake.\n\n**Recommendation**: Document clearly that callers must validate `exp`, `iss`, and `aud` after signature verification. If claims validation is added, provide it as optional helpers.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"d5e6022e-9696-4ef3-8301-f418a9fefa0a",title:"`JwtHelper.decode()` Does Not Enforce Signature Verification",severity:"INFO",project:"Spring Security JWT 1.1.x (nes-1.1.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[SSJ-008] CWE-347 (Upstream-Inherited)\n\n**Severity**: Informational  \n**CWE**: CWE-347 (Improper Verification of Cryptographic Signature)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \n`JwtHelper.decode()` returns a `Jwt` object with parsed claims without verifying the signature. The `alg: none` attack (CVE-2015-9235 pattern) is partially mitigated: `decode()` only accepts `alg: none` if the crypto segment is empty, and `decodeAndVerify()` correctly calls the verifier which will reject an empty signature (HMAC output length mismatch). However, callers who use `decode()` alone and forget to call `verifySignature()` will accept unauthenticated tokens.\n\nThe API design makes it easy to call `decode()` directly (it is `public static`) and use `getClaims()` without calling `verifySignature()`. There is no warning in the Javadoc.\n\n**Recommendation**: Document that `decode()` is for inspection only and that `decodeAndVerify()` must be used in security-sensitive contexts. Consider making `decode()` package-private or adding a deprecation warning to its Javadoc.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

  // === Struts 1.3.10 (oss_struts_1_3_10) ===
  {id:"b0010001-0001-4000-8000-000000000001",title:"ScriptAction BSF Unsanitized Request Parameter Injection",severity:"CRITICAL",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Remote Code Execution",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"RequestToVariableFilter.apply() at line 70-96 injects ALL HTTP request parameters as BSF script variables via mgr.declareBean() with zero sanitization. Scripts execute at ScriptAction.execute() line 245 with full access to request, response, session, application (ServletContext) and no SecurityManager. Groovy/BeanShell scripts can call Runtime.exec() via Java interop.",affected_files:"ScriptAction.java:192-250, RequestToVariableFilter.java:63-102",exploitation:"Attacker sends crafted request parameters that become live BSF variables. If the script references any variable matching a parameter name, attacker-controlled values flow in. A Groovy script can call Runtime.getRuntime().exec(cmd) for RCE.",remediation:"RequestToVariableFilter should maintain an allowlist of permitted parameter names. Parameters should NOT overwrite built-in beans. A SecurityManager or sandbox should restrict BSF script access.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000002",title:"ScriptAction TOCTOU Race Condition in Script Loading",severity:"HIGH",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Race Condition",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"loadScript() checks file.lastModified() at line 323 OUTSIDE the synchronized(this) block at line 333. The file read at line 337 occurs INSIDE synchronized. An attacker with filesystem write access can replace the script between the check and read. The Script inner class (lines 493-506) has public mutable fields read/written without proper synchronization.",affected_files:"ScriptAction.java:308-354",exploitation:"Attacker with filesystem write access rapidly swaps script between safe and malicious versions. The race window between lastModified() check (outside sync) and FileReader read (inside sync) allows malicious content to be loaded.",remediation:"Move lastModified() check INSIDE the synchronized block. Use atomic file operations. Make Script inner class fields volatile or immutable.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000003",title:"Unsafe Class.forName() in BSF Filter and Engine Loading",severity:"HIGH",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Arbitrary Code Execution",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"Class.forName(claz) at line 372 with no class whitelist. Class names from struts-scripting.properties are loaded and instantiated in a static initializer (line 178). Same pattern across multiple framework components. A class with side-effects in its static initializer executes code before the cast check at line 373.",affected_files:"ScriptAction.java:363-387, ScriptAction.java:162-177, ActionServlet.java:1612-1614, TilesUtilImpl.java:201-202, ModuleConfigFactory.java:102",exploitation:"Attacker modifies struts-scripting.properties to reference a malicious class. On startup, Class.forName() loads the class and its static initializer runs before any type check.",remediation:"Validate class names against an allowlist. Use ClassLoader.loadClass() instead of Class.forName(). Apply same fix to ActionServlet, TilesUtilImpl, and ModuleConfigFactory.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000004",title:"No XXE Protection in Digester XML Parsing (Framework-Wide)",severity:"HIGH",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"XML External Entity (XXE)",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"Searched the ENTIRE codebase for setEntityResolver, setFeature, disallow-doctype, EXTERNAL - ZERO matches. Every new Digester() call creates XML parsers that allow external entity resolution. The Tiles XmlParser, ActionServlet.initConfigDigester(), DigestingPlugIn, and ValidatorPlugIn all create unprotected parsers.",affected_files:"ActionServlet.java:1558, XmlParser.java:64, DigestingPlugIn.java:182, MemoryUserDatabase.java:168, ValidatorPlugIn.java:244",exploitation:"If attacker can influence any Digester-parsed XML file, external entities resolve to local files or trigger SSRF. Affects struts-config.xml, tiles-defs.xml, validation.xml, and plugin configs.",remediation:"All Digester instances should disable external entities via setFeature(). Disable DOCTYPE declarations. Use a secure EntityResolver. Apply in a centralized factory method.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000005",title:"ErrorsTag/MessagesTag/GetAttributeTag XSS - No HTML Encoding",severity:"HIGH",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Cross-Site Scripting (XSS)",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"ErrorsTag at line 250: when report.isResource() is false, report.getKey() is used as raw output. Line 272: TagUtils.getInstance().write(pageContext, results.toString()) - no HTML encoding. MessagesTag same pattern at line 269. Tiles GetAttributeTag at line 171: pageContext.getOut().print(value) - no encoding at all.",affected_files:"ErrorsTag.java:245-272, MessagesTag.java:254-276, GetAttributeTag.java:170-172",exploitation:"Application code stores user input in ActionMessages with isResource=false. ErrorsTag renders it as raw HTML. Also via Tiles GetAttributeTag with user-controlled tile attributes.",remediation:"ErrorsTag should HTML-encode non-resource messages. MessagesTag should encode message content. GetAttributeTag should default to encoding with explicit filter attribute opt-out.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000006",title:"Stack Trace / Exception Disclosure to End Users",severity:"HIGH",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Information Disclosure",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"ExceptionHandler.handleCommittedResponse() writes full stack trace to HTTP response wrapped in HTML comment: ex.printStackTrace(response.getWriter()). Tiles InsertTag.processException() at line 961 writes exception message to output even when debug is OFF. Leaks internal class names, paths, library versions, and potentially SQL queries.",affected_files:"ExceptionHandler.java:228-231, InsertTag.java:951-965",exploitation:"Trigger an exception after the response is committed. ExceptionHandler falls through to handleCommittedResponse() which dumps the full stack trace to the response body.",remediation:"handleCommittedResponse() should write a generic error message only. Stack traces should be logged server-side only. InsertTag.processException() should suppress exception details in output.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000007",title:"DispatchAction Reflection-Based Method Invocation from User Input",severity:"MEDIUM",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Insecure Reflection",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"DispatchAction.getMethodName() at line 374 returns request.getParameter(parameter) directly. This user-supplied string is passed to clazz.getMethod(name, types) at line 348 and invoked via method.invoke() at line 269. Only \"execute\" and \"perform\" are blocked (lines 161-167). Attacker can invoke any public method matching the Action signature.",affected_files:"DispatchAction.java:369-375, ActionDispatcher.java:469-479",exploitation:"Attacker sets the dispatch parameter to any public method name. Only \"execute\" and \"perform\" are blocked. No allowlist exists.",remediation:"DispatchAction should support a method allowlist. Only explicitly declared methods should be invocable. Block access to inherited methods from Action and Object.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"b0010001-0001-4000-8000-000000000008",title:"Tag Library XSS Defaults - Multiple Tags Default to No Encoding",severity:"MEDIUM",project:"Struts 1.3.10 (oss_struts_1_3_10)",category:"Cross-Site Scripting (XSS)",status:"confirmed",source_badge:"investigation,validated,has-poc",description:"OptionTag defaults filter=false (line 71) unlike OptionsTag/OptionsCollectionTag which default true. BaseHandlerTag.prepareAttribute() at line 1161 appends value in HTML attribute context with no encoding. BaseTag at lines 121-126 uses Host header directly in <base href=\"\"> without sanitization. MessageTag at line 243 outputs via TagUtils.write() with no filter option. NestedWriteNestingTag defaults filter=false (line 40).",affected_files:"OptionTag.java:70-71, NestedWriteNestingTag.java:40, BaseHandlerTag.java:1155-1164, BaseTag.java:121-143, MessageTag.java:243",exploitation:"User-controlled data flows through tags that default to no encoding. Host header injection via BaseTag enables cache poisoning. OptionTag renders values unencoded unlike similar tags.",remediation:"OptionTag should default filter=true. BaseTag should encode server name. MessageTag should support filter attribute. BaseHandlerTag.prepareAttribute() should encode attribute values.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

  {id:"b0020023-0001-4000-8000-000000000001",title:"DOMPurify Patch Modifies Core Attribute-Removal Logic",severity:"MEDIUM",project:"TinyMCE 6.8.x (nes-6.8.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Custom patch-package modifies DOMPurify _sanitizeAttributes: defers attribute removal until after hook decides, skips setAttribute when value unchanged, potentially bypassing DOMPurify normalization. Theoretical bypass if browser parses attribute differently from raw string.",affected_files:"patches/dompurify+3.1.7.patch, modules/tinymce/src/core/main/ts/html/Sanitization.ts:164-178",exploitation:"Theoretical - craft HTML where browser attribute parsing differs from DOMPurify string comparison, bypassing sanitization.",remediation:"Review patch necessity. If needed, ensure attribute normalization still occurs.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

  // === Tomcat Taglibs Standard 1.0.x (nes-1.0.x) ===
  {id:"56be973e-2092-4518-96a7-4b58366330ae",title:"fmt:message outputs unescaped message content (XSS risk if misused)",severity:"LOW",project:"Tomcat Taglibs Standard 1.0.x (nes-1.0.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `<fmt:message>` tag retrieves a message from a resource bundle (via `MessageFormat`) and writes it directly to the JSP output via `pageContext.getOut().print(message)` without any HTML/XML escaping. Similarly, `<fmt:formatDate>`, `<fmt:formatNumber>`, `<fmt:parseDate>`, and `<fmt:parseNumber>` write their output unescaped. This is by-design in JSTL (the spec treats i18n output as trusted), but if an application stores user-controlled content in resource bundles (e.g., a database-backed message resource), XSS becomes possible. CWE: CWE-79 (Cross-Site Scripting)",affected_files:"`src/main/java/org/apache/taglibs/standard/tag/common/fmt/MessageSupport.java:192`",exploitation:"If an application uses dynamically constructed resource bundle values that include user-provided data, an attacker could inject HTML/JavaScript that executes in the user's browser. In typical statically-defined bundle files, this is not exploitable.",remediation:"This is a by-design behavior in JSTL 1.0/1.1. Applications using dynamic resource bundle values should wrap output with `<c:out escapeXml=\"true\">` or sanitize bundle values before storage. Document this limitation in NES release notes.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"fc9c05da-04d5-445a-a52d-7aaa75a647c8",title:"JstlBaseTLV SAX parser missing FEATURE_SECURE_PROCESSING (deployment-time)",severity:"LOW",project:"Tomcat Taglibs Standard 1.0.x (nes-1.0.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `JstlBaseTLV.validate()` method creates a SAX parser via `SAXParserFactory.newInstance()` without setting `FEATURE_SECURE_PROCESSING`. This is the TLV (Tag Library Validator) that parses JSP pages at deployment time. The NES CVE-2015-0254 fix correctly added `FEATURE_SECURE_PROCESSING` to the runtime `ParseSupport` (x:parse) and `TransformSupport` (x:transform) parsers, but did not add it to the TLV. The TLV processes JSP source files (not user-supplied runtime data) during deployment, so this is a lower-risk scenario than a runtime XXE, but it is inconsistent and could theoretically be exploited if an attacker can influence JSP file content at deployment time. CWE: CWE-611 (Improper Restriction of XML External Entity Reference)",affected_files:"`src/main/java/org/apache/taglibs/standard/tlv/JstlBaseTLV.java:152-156`",exploitation:"Very limited in practice. The TLV only processes JSP source files at deployment time, not user-supplied runtime data. An attacker would need to be able to embed malicious XML entities in JSP files (implying write access to the application).",remediation:"Add `f.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true)` after line 152 in `JstlBaseTLV.java` for defense in depth, consistent with the CVE-2015-0254 fix applied to the runtime XML parsers:",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2015-0254",hackerone_id:null},
  {id:"b2fecce5-a8cf-4671-9754-ccc74674a40f",title:"c:import tag allows arbitrary URL schemes (SSRF by design)",severity:"INFO",project:"Tomcat Taglibs Standard 1.0.x (nes-1.0.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `<c:import>` tag accepts any absolute URL (any scheme with valid RFC 1738 characters) including `file://`, `ftp://`, `gopher://`, etc. When the `url` attribute is set from a user-controlled expression, this enables SSRF. The `isAbsoluteUrl()` check only verifies that the scheme has valid characters; it does not restrict to safe schemes (e.g., `http`, `https`). This is the upstream JSTL specification behavior. CWE: CWE-918 (Server-Side Request Forgery)",affected_files:"`src/main/java/org/apache/taglibs/standard/tag/common/core/ImportSupport.java:321-360`",exploitation:"If application code uses `<c:import url=\"${userInput}\">`, an attacker could access internal network resources, local files, or cause the server to make outbound requests to arbitrary hosts. Exploitation requires application-level use of user input in the URL attribute.",remediation:"This is a JSTL by-design behavior. Applications should never use user-controlled values in `<c:import url=\"...\">`. NES can document this in a security advisory/release notes. Optionally, add a scheme allow-list (http, https) with a warning log for other schemes.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"07de3c76-768f-4658-8b13-1f411de980f7",title:"c:redirect tag allows open redirect (by design)",severity:"INFO",project:"Tomcat Taglibs Standard 1.0.x (nes-1.0.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `<c:redirect>` tag calls `UrlSupport.resolveUrl()` and then `response.sendRedirect(result)` without validating the URL against an allow-list of permitted redirect targets. Absolute URLs (those with a scheme like `http://attacker.com`) pass through unmodified. When the `url` attribute is derived from user-supplied input, this enables a classic open redirect. This is upstream JSTL specification behavior. CWE: CWE-601 (Open Redirect)",affected_files:"`src/main/java/org/apache/taglibs/standard/tag/common/core/RedirectSupport.java:99-110`",exploitation:"If application code uses `<c:redirect url=\"${param.next}\">` or similar, an attacker could craft a link like `https://app.example.com/page?next=https://evil.com` and redirect users to a phishing site. Exploitation requires application-level misuse.",remediation:"This is a JSTL by-design behavior. Applications should validate redirect targets against an allow-list before passing to `<c:redirect>`. NES can include this in security guidance documentation.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Vue 2.7.x (nes-2.7.x) ===
  {id:"a0000002-0001-4000-8000-000000000001",title:"ReDoS in forAliasRE Template Compiler Regex",severity:"MEDIUM",project:"Vue 2.7.x (nes-2.7.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The forAliasRE regex used to parse v-for directive expressions exhibits quadratic time complexity O(n^2) when processing input consisting of whitespace without in/of keywords. Requires full build with runtime template compilation of untrusted input.",affected_files:"src/compiler/parser/index.ts:35",exploitation:"3000 spaces input causes ~4 seconds of processing. Requires application to compile templates from untrusted input at runtime.",remediation:"Replace the regex with one that avoids the lazy-greedy interaction.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.7.x",cve_ids:null,hackerone_id:null},
  {id:"a0000002-0003-4000-8000-000000000003",title:"SSR XSS via Unescaped HTML Comments",severity:"LOW",project:"Vue 2.7.x (nes-2.7.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The SSR renderer outputs HTML comment nodes by directly interpolating the comment text without escaping the --> sequence. If an attacker controls comment VNode text (via render functions, not templates), they can inject arbitrary HTML.",affected_files:"packages/server-renderer/src/render.ts:91",exploitation:"Comment text --><script>alert(1)<\/script><!-- breaks out of HTML comment. Requires programmatic comment VNode creation with user input via SSR.",remediation:"Sanitize comment text by replacing -- sequences with - -.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.7.x",cve_ids:null,hackerone_id:null},
  {id:"a0000002-0002-4000-8000-000000000002",title:"SSR XSS via Unsanitized nonce in renderState",severity:"LOW",project:"Vue 2.7.x (nes-2.7.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The renderState method in SSR template renderer interpolates context.nonce directly into an HTML attribute without sanitization. If context.nonce contains a double-quote character, an attacker can break out of the nonce attribute and inject arbitrary HTML.",affected_files:"packages/server-renderer/src/template-renderer/index.ts:237",exploitation:"Set context.nonce to ' onload=\"alert(document.cookie)\" data=\"' to inject event handlers. Requires developer to pass user-controlled input as nonce value.",remediation:"Sanitize the nonce value by escaping double quotes with &quot;.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.7.x",cve_ids:null,hackerone_id:null},
  {id:"a0000002-0004-4000-8000-000000000004",title:"Vue.set()/Vue.delete() Missing Prototype Key Guards",severity:"LOW",project:"Vue 2.7.x (nes-2.7.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Vue.set() does not guard against special prototype keys (__proto__, constructor, prototype). Assignment target[key] = val can change the target object prototype chain. Does NOT enable global Object.prototype pollution -- only modifies the specific target object.",affected_files:"src/core/observer/index.ts:223-276",exploitation:"Attacker controls both key and value parameters of a Vue.set() call to manipulate per-object prototype.",remediation:"Add a guard for __proto__, constructor, and prototype keys in Vue.set().",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.7.x",cve_ids:null,hackerone_id:null},

  {id:"a0100001-0001-4000-8000-000000000001",title:"VM Sandbox Escape in Magic Comment Parser (RCE)",severity:"CRITICAL",project:"Webpack 5.x",category:"Our Findings",status:"CVE Candidate",source_badge:null,description:"Webpack uses vm.createContext()/vm.runInContext() to parse magic comments. Sandbox escape via this.constructor.constructor(\"return process\")() pattern. Malicious npm package comment achieves arbitrary code execution during build.",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

// LIVE DATA (populated from DB, fallback to seed)
// ============================================================
let OUR_FINDINGS = [];
let EXTERNAL_REPORTS = [];
let CVE_CATALOG = [];
let ALL_FINDINGS = [];
let PROJECTS = [];
let DB_CVES = [];
let DB_HACKERONE = [];

// ============================================================
// LOCAL STATE

let comments = {};

const SEV_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
const PRIORITY_ORDER = { 'P0-urgent': 0, 'P1-high': 1, 'P2-medium': 2, 'P3-low': 3 };

// ============================================================
// DB -> FINDING MAPPER
// ============================================================
function dbRowToFinding(row) {
  return {
    id: row.id,
    title: row.title || '',
    severity: row.severity || 'MEDIUM',
    project: row.project || '',
    category: row.category || '',
    status: row.status || 'investigating',
    description: row.description || '',
    affected_files: row.affected_files || '',
    exploitation: row.exploitation || '',
    remediation: row.remediation || '',
    adversarial_verdict: row.adversarial_verdict || '',
    fix_status: row.fix_status || '',
    affected_versions: row.affected_versions || '',
    cve_ids: row.cve_ids || null,
    hackerone_id: row.hackerone_id || null,
    source_badge: row.source_badge || '',
    reproduction_path: row.reproduction_path || '',
    // New columns
    cvss_score: row.cvss_score || null,
    cvss_vector: row.cvss_vector || '',
    finding_type: row.finding_type || '',
    nes_branch: row.nes_branch || '',
    nes_version: row.nes_version || '',
    affected_component: row.affected_component || '',
    attack_vector: row.attack_vector || '',
    has_poc: row.has_poc || false,
    poc_path: row.poc_path || '',
    reviewed_by: row.reviewed_by || '',
    adversarial_reviewed: row.adversarial_reviewed || false,
    original_severity: row.original_severity || '',
    related_cves: row.related_cves || null,
    related_findings: row.related_findings || null,
    tags: row.tags || null,
    priority: row.priority || '',
    assigned_to: row.assigned_to || '',
    remediation_status: row.remediation_status || '',
    remediation_pr: row.remediation_pr || '',
    discovered_at: row.discovered_at || null,
    verified_at: row.verified_at || null
  };
}

function categorizeFinding(f) {
  const cat = (f.category || '').toLowerCase();
  if (cat === 'external reports' || cat === 'external_reports') return 'external';
  if (cat === 'cve_catalog') return 'cve';
  return 'our'; // code_review, investigation, hackerone (HackerOne findings come from their own table now), etc.
}

// ============================================================
// SEED DB IF EMPTY
// ============================================================
async function seedDatabase() {
  const setStatus = (msg) => {
    const el = document.getElementById('loadingStatus');
    if (el) el.textContent = msg;
  };

  const allSeed = [
    ...SEED_OUR_FINDINGS,
    ...SEED_EXTERNAL_REPORTS,
    ...SEED_CVE_CATALOG
  ];

  setStatus(`Seeding ${allSeed.length} findings into database...`);

  // Insert in batches of 5 to avoid overwhelming the API
  for (let i = 0; i < allSeed.length; i += 5) {
    const batch = allSeed.slice(i, i + 5);
    const promises = batch.map(f => {
      const sql = `INSERT INTO security_findings (id, title, severity, project, category, status, description, affected_files, exploitation, remediation, adversarial_verdict, fix_status, affected_versions, cve_ids, hackerone_id, source_badge, reproduction_path)
VALUES (gen_random_uuid(), '${DB.escape(f.title)}', '${DB.escape(f.severity)}', '${DB.escape(f.project)}', '${DB.escape(f.category)}', '${DB.escape(f.status)}', '${DB.escape(f.description)}', '${DB.escape(f.affected_files || '')}', '${DB.escape(f.exploitation || '')}', '${DB.escape(f.remediation || '')}', '${DB.escape(f.adversarial_verdict || '')}', '${DB.escape(f.fix_status || '')}', '${DB.escape(f.affected_versions || '')}', '${DB.escape(f.cve_ids || '')}', '${DB.escape(f.hackerone_id || '')}', '${DB.escape(f.source_badge || '')}', '${DB.escape(f.reproduction_path || '')}')`;
      return DB.mutate(sql).catch(e => console.warn('Seed insert failed for', f.title, e));
    });
    await Promise.all(promises);
    setStatus(`Seeded ${Math.min(i + 5, allSeed.length)} of ${allSeed.length} findings...`);
  }
}

// ============================================================
// LOAD DATA FROM DB
// ============================================================
async function loadFromDatabase() {
  const setStatus = (msg) => {
    const el = document.getElementById('loadingStatus');
    if (el) el.textContent = msg;
  };

  try {
    setStatus('Querying database...');
    const rows = await DB.query('SELECT * FROM security_findings ORDER BY created_at ASC');

    if (!rows || rows.length === 0) {
      setStatus('Database empty, seeding from embedded data...');
      await seedDatabase();
      // Re-query after seed
      const seededRows = await DB.query('SELECT * FROM security_findings ORDER BY created_at ASC');
      return seededRows.map(dbRowToFinding);
    }

    setStatus(`Loaded ${rows.length} findings from database`);
    return rows.map(dbRowToFinding);
  } catch (e) {
    console.error('Failed to load from DB, using seed data:', e);
    setStatus('Database unavailable, using local data...');
    // Fallback to embedded seed data
    return [
      ...SEED_OUR_FINDINGS,
      ...SEED_EXTERNAL_REPORTS,
      ...SEED_CVE_CATALOG
    ];
  }
}

async function loadCves() {
  try {
    const rows = await DB.query('SELECT * FROM security_cves ORDER BY project, cve_id');
    return rows || [];
  } catch (e) { console.warn('Failed to load CVEs:', e); return []; }
}

  try {
    const rows = await DB.query('SELECT * FROM security_hackerone_reports ORDER BY submitted_at DESC');
    return rows || [];
  } catch (e) { console.warn('Failed to load H1 reports:', e); return []; }
}

    const rows = await DB.query(`SELECT * FROM security_pocs WHERE finding_id = '${DB.escape(findingId)}' ORDER BY created_at ASC`);

async function loadComments(findingId) {

    const rows = await DB.query(`SELECT * FROM finding_comments WHERE finding_id = '${DB.escape(findingId)}' ORDER BY created_at ASC`);

// ============================================================
// INIT
// ============================================================
async function loadProjects() {

    await DB.mutate(`INSERT INTO security_finding_history (finding_id, field_changed, old_value, new_value, changed_by) VALUES ('${DB.escape(findingId)}', '${DB.escape(field)}', '${DB.escape(oldVal || '')}', '${DB.escape(newVal || '')}', 'App User')`);
  } catch (e) {
    console.warn('Failed to log change:', e);
  }
