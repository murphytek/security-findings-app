<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NES Security Assessment</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --critical: #f85149;
  --critical-bg: rgba(248, 81, 73, 0.15);
  --high: #d29922;
  --high-bg: rgba(210, 153, 34, 0.15);
  --medium: #e3b341;
  --medium-bg: rgba(227, 179, 65, 0.15);
  --low: #58a6ff;
  --low-bg: rgba(88, 166, 255, 0.15);
  --success: #3fb950;
  --success-bg: rgba(63, 185, 80, 0.15);
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
}
.header h1 span { color: var(--accent); }
.header-meta {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  white-space: nowrap;
}

/* Stats bar */
.stats-bar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.stats-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 12px;
  min-width: max-content;
}
.stat-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  min-width: 100px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-critical .stat-value { color: var(--critical); }
.stat-high .stat-value { color: var(--high); }
.stat-medium .stat-value { color: var(--medium); }
.stat-low .stat-value { color: var(--low); }

/* Main tabs */
.main-tabs {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.main-tabs-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}
.main-tab {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  user-select: none;
}
.main-tab:hover { color: var(--text-primary); }
.main-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.main-tab .tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 20px;
  padding: 0 6px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}
.main-tab.active .tab-count {
  background: rgba(88, 166, 255, 0.2);
  color: var(--accent);
}

/* Filters */
.filters {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
}
.filters-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-group label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}
.filter-select, .search-input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border var(--transition);
}
.filter-select:focus, .search-input:focus {
  border-color: var(--accent);
}
.search-input {
  flex: 1;
  min-width: 180px;
}
.filter-select { min-width: 110px; }
.sort-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 6px 10px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.sort-btn:hover, .sort-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

/* Main content */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 20px;
}

/* Project group headers */
.project-group-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 16px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.project-group-header:first-child { padding-top: 0; }
.project-group-count {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

/* Finding cards */
.findings-list { display: flex; flex-direction: column; gap: 10px; }
.finding-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.finding-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}

/* Primary finding cards (Our Findings) - bolder */
.finding-card.card-primary {
  border-left: 3px solid var(--accent);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(88,166,255,0.03) 100%);
}
.finding-card.card-primary:hover {
  border-color: var(--accent);
  border-left-color: var(--accent-hover);
}

/* External report cards - muted */
.finding-card.card-external {
  opacity: 0.85;
  border-left: 3px solid #d2a8ff;
}
.finding-card.card-external:hover {
  opacity: 1;
  border-color: #d2a8ff;
}

/* CVE list items - compact */
.cve-list-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 10px;
}
.cve-list-item:hover {
  border-color: var(--accent);
}
.cve-list-item .severity-badge { flex-shrink: 0; }
.cve-list-item .cve-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cve-list-item .cve-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.finding-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.severity-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.severity-CRITICAL { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical); }
.severity-HIGH { background: var(--high-bg); color: var(--high); border: 1px solid var(--high); }
.severity-MEDIUM { background: var(--medium-bg); color: var(--medium); border: 1px solid var(--medium); }
.severity-LOW { background: var(--low-bg); color: var(--low); border: 1px solid var(--low); }

.finding-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  flex: 1;
}
.finding-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 2px 8px;
  border-radius: 4px;
}
.meta-tag.category-hackerone { color: #d2a8ff; }
.meta-tag.category-code_review { color: #79c0ff; }
.meta-tag.category-cve_catalog { color: #7ee787; }

/* Source badges */
.source-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.source-badge.badge-validated {
  background: rgba(63, 185, 80, 0.2);
  color: #3fb950;
  border: 1px solid rgba(63, 185, 80, 0.4);
}
.source-badge.badge-investigation {
  background: rgba(88, 166, 255, 0.2);
  color: #58a6ff;
  border: 1px solid rgba(88, 166, 255, 0.4);
}
.source-badge.badge-code-review {
  background: rgba(121, 192, 255, 0.15);
  color: #79c0ff;
  border: 1px solid rgba(121, 192, 255, 0.3);
}
.source-badge.badge-hackerone {
  background: rgba(210, 168, 255, 0.15);
  color: #d2a8ff;
  border: 1px solid rgba(210, 168, 255, 0.3);
}
.source-badge.badge-cve {
  background: rgba(126, 231, 135, 0.12);
  color: #7ee787;
  border: 1px solid rgba(126, 231, 135, 0.25);
}
.source-badge.badge-cve-candidate {
  background: rgba(63, 185, 80, 0.25);
  color: #3fb950;
  border: 2px solid rgba(63, 185, 80, 0.6);
  font-weight: 800;
}
.source-badge.badge-silent-fix {
  background: rgba(210, 153, 34, 0.15);
  color: #d29922;
  border: 1px solid rgba(210, 153, 34, 0.4);
}
.source-badge.badge-reviewed-safe {
  background: rgba(110, 118, 129, 0.15);
  color: #8b949e;
  border: 1px solid rgba(110, 118, 129, 0.3);
}
.source-badge.badge-has-poc {
  background: transparent;
  color: #f85149;
  border: 1px solid rgba(248, 81, 73, 0.5);
}

.status-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.status-investigating { background: rgba(88,166,255,0.15); color: #58a6ff; }
.status-confirmed { background: rgba(210,153,34,0.15); color: #d29922; }
.status-in_progress { background: rgba(210,153,34,0.15); color: #e3b341; }
.status-fixed { background: rgba(63,185,80,0.15); color: #3fb950; }
.status-released { background: rgba(63,185,80,0.2); color: #56d364; }
.status-wont_fix { background: rgba(110,118,129,0.15); color: #8b949e; }
.status-duplicate { background: rgba(110,118,129,0.15); color: #6e7681; }

.finding-desc-preview {
  font-size: 13px;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Detail panel (slide-in on mobile) */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.6);
}
.detail-overlay.active { display: flex; }
.detail-panel {
  background: var(--bg-secondary);
  width: 100%;
  max-width: 700px;
  margin-left: auto;
  height: 100%;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.detail-header {
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.detail-close {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 18px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--transition);
}
.detail-close:hover { border-color: var(--accent); color: var(--accent); }
.detail-title {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}
.detail-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.detail-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.detail-section-header {
  background: var(--bg-tertiary);
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.detail-section-body {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Status dropdown in detail */
.status-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
}
.status-select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 8px 12px;
  flex: 1;
  outline: none;
}
.status-select:focus { border-color: var(--accent); }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  cursor: pointer;
  transition: background var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--accent-hover); }
.btn-secondary {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
}
.btn-secondary:hover { border-color: var(--accent); }

/* Comments section */
.comments-list { display: flex; flex-direction: column; gap: 10px; padding: 14px 16px; }
.comment-item {
  background: var(--bg-tertiary);
  border-radius: 6px;
  padding: 10px 12px;
}
.comment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.comment-author { font-size: 12px; font-weight: 600; color: var(--accent); }
.comment-time { font-size: 11px; color: var(--text-muted); }
.comment-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.comment-form {
  display: flex;
  gap: 8px;
  padding: 0 16px 14px;
}
.comment-input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 8px 12px;
  flex: 1;
  outline: none;
  resize: none;
  font-family: inherit;
  min-height: 38px;
}
.comment-input:focus { border-color: var(--accent); }

/* Tags row in detail */
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px 16px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }

/* Results count */
.results-info {
  font-size: 12px;
  color: var(--text-muted);
  padding: 8px 0;
}

/* Tab navigation for detail view */
.detail-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  overflow-x: auto;
}
.detail-tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all var(--transition);
}
.detail-tab:hover { color: var(--text-primary); }
.detail-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Reproduction path */
.repro-path {
  font-family: monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-block;
  margin-top: 4px;
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 15px; }
  .header-meta { display: none; }
  .stat-card { padding: 8px 12px; min-width: 80px; }
  .stat-card .stat-value { font-size: 20px; }
  .filters-inner { flex-direction: column; }
  .filter-group { width: 100%; }
  .filter-select, .search-input { width: 100%; flex: 1; }
  .detail-panel { max-width: 100%; }
  .main-tab { padding: 10px 12px; font-size: 13px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Category icons */
.cat-icon {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 4px;
}
.cat-hackerone { background: #d2a8ff; }
.cat-code_review { background: #79c0ff; }
.cat-cve_catalog { background: #7ee787; }
.cat-investigation { background: #3fb950; }

/* PoC code blocks */
pre code {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

/* Project dashboard grid */
@media (max-width: 600px) {
  .main-tabs-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .filters-inner { overflow-x: auto; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span>NES</span> Security Assessment</h1>
    <div class="header-meta">
      April 2026 &middot; 9 Projects
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-card">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card stat-critical">
      <div class="stat-value" id="criticalCount">0</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat-card stat-high">
      <div class="stat-value" id="highCount">0</div>
      <div class="stat-label">High</div>
    </div>
    <div class="stat-card stat-medium">
      <div class="stat-value" id="mediumCount">0</div>
      <div class="stat-label">Medium</div>
    </div>
    <div class="stat-card stat-low">
      <div class="stat-value" id="lowCount">0</div>
      <div class="stat-label">Low</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--critical)" id="unpatchedCount">0</div>
      <div class="stat-label">Unpatched</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--success)" id="patchedCount">0</div>
      <div class="stat-label">Patched</div>
    </div>
  </div>
</div>

<!-- Main view tabs -->
<div class="main-tabs">
  <div class="main-tabs-inner">
    <div class="main-tab" data-view="projects" onclick="switchMainTab('projects')">
      Projects <span class="tab-count" id="projectsCount">0</span>
    </div>
    <div class="main-tab active" data-view="our_findings" onclick="switchMainTab('our_findings')">
      Our Findings <span class="tab-count" id="ourFindingsCount">0</span>
    </div>
    <div class="main-tab" data-view="external_reports" onclick="switchMainTab('external_reports')">
      External Reports <span class="tab-count" id="externalReportsCount">0</span>
    </div>
    <div class="main-tab" data-view="known_cves" onclick="switchMainTab('known_cves')">
      Known CVEs <span class="tab-count" id="knownCvesCount">0</span>
    </div>
    <div class="main-tab" data-view="cve_catalog" onclick="switchMainTab('cve_catalog')">
      CVE Catalog <span class="tab-count" id="cveCatalogCount">0</span>
    </div>
    <div class="main-tab" data-view="hackerone" onclick="switchMainTab('hackerone')">
      HackerOne <span class="tab-count" id="hackeroneCount">0</span>
    </div>
  </div>

// ============================================================
let OUR_FINDINGS = [];
let EXTERNAL_REPORTS = [];
let CVE_CATALOG = [];
let ALL_FINDINGS = [];
let PROJECTS = [];
let DB_CVES = [];
let DB_HACKERONE = [];

// ============================================================
// LOCAL STATE
// ============================================================
let comments = {};
let currentSort = 'severity';
let currentFinding = null;
let currentTab = 'overview';
let currentMainView = 'our_findings';

const SEV_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
const PRIORITY_ORDER = { 'P0-urgent': 0, 'P1-high': 1, 'P2-medium': 2, 'P3-low': 3 };

// ============================================================
// DB -> FINDING MAPPER
// ============================================================
function dbRowToFinding(row) {
  return {
    id: row.id,
    title: row.title || '',
    severity: row.severity || 'MEDIUM',
    project: row.project || '',
    category: row.category || '',
    status: row.status || 'investigating',
    description: row.description || '',
    affected_files: row.affected_files || '',
    exploitation: row.exploitation || '',
    remediation: row.remediation || '',
    adversarial_verdict: row.adversarial_verdict || '',
    fix_status: row.fix_status || '',
    affected_versions: row.affected_versions || '',
    cve_ids: row.cve_ids || null,
    hackerone_id: row.hackerone_id || null,
    source_badge: row.source_badge || '',
    reproduction_path: row.reproduction_path || '',
    // New columns
    cvss_score: row.cvss_score || null,
    cvss_vector: row.cvss_vector || '',
    finding_type: row.finding_type || '',
    nes_branch: row.nes_branch || '',
    nes_version: row.nes_version || '',
    affected_component: row.affected_component || '',
    attack_vector: row.attack_vector || '',
    has_poc: row.has_poc || false,
    poc_path: row.poc_path || '',
    reviewed_by: row.reviewed_by || '',
    adversarial_reviewed: row.adversarial_reviewed || false,
    original_severity: row.original_severity || '',
    related_cves: row.related_cves || null,
    related_findings: row.related_findings || null,
    tags: row.tags || null,
    priority: row.priority || '',
    assigned_to: row.assigned_to || '',
    remediation_status: row.remediation_status || '',
    remediation_pr: row.remediation_pr || '',
    discovered_at: row.discovered_at || null,
    verified_at: row.verified_at || null
  };
}

function categorizeFinding(f) {
  const cat = (f.category || '').toLowerCase();
  if (cat === 'external reports' || cat === 'external_reports') return 'external';
  if (cat === 'cve_catalog') return 'cve';
  return 'our'; // code_review, investigation, hackerone (HackerOne findings come from their own table now), etc.
}

// ============================================================
// SEED DB IF EMPTY
// ============================================================
async function seedDatabase() {
  const setStatus = (msg) => {
    const el = document.getElementById('loadingStatus');
    if (el) el.textContent = msg;
  };

  const allSeed = [
    ...SEED_OUR_FINDINGS,
    ...SEED_EXTERNAL_REPORTS,
    ...SEED_CVE_CATALOG
  ];

  setStatus(`Seeding ${allSeed.length} findings into database...`);

  // Insert in batches of 5 to avoid overwhelming the API
  for (let i = 0; i < allSeed.length; i += 5) {
    const batch = allSeed.slice(i, i + 5);
    const promises = batch.map(f => {
      const sql = `INSERT INTO security_findings (id, title, severity, project, category, status, description, affected_files, exploitation, remediation, adversarial_verdict, fix_status, affected_versions, cve_ids, hackerone_id, source_badge, reproduction_path)
VALUES (gen_random_uuid(), '${DB.escape(f.title)}', '${DB.escape(f.severity)}', '${DB.escape(f.project)}', '${DB.escape(f.category)}', '${DB.escape(f.status)}', '${DB.escape(f.description)}', '${DB.escape(f.affected_files || '')}', '${DB.escape(f.exploitation || '')}', '${DB.escape(f.remediation || '')}', '${DB.escape(f.adversarial_verdict || '')}', '${DB.escape(f.fix_status || '')}', '${DB.escape(f.affected_versions || '')}', '${DB.escape(f.cve_ids || '')}', '${DB.escape(f.hackerone_id || '')}', '${DB.escape(f.source_badge || '')}', '${DB.escape(f.reproduction_path || '')}')`;
      return DB.mutate(sql).catch(e => console.warn('Seed insert failed for', f.title, e));
    });
    await Promise.all(promises);
    setStatus(`Seeded ${Math.min(i + 5, allSeed.length)} of ${allSeed.length} findings...`);
  }
}

// ============================================================
// LOAD DATA FROM DB
// ============================================================
async function loadFromDatabase() {
  const setStatus = (msg) => {
    const el = document.getElementById('loadingStatus');
    if (el) el.textContent = msg;
  };

  try {
    setStatus('Querying database...');
    const rows = await DB.query('SELECT * FROM security_findings ORDER BY created_at ASC');

    if (!rows || rows.length === 0) {
      setStatus('Database empty, seeding from embedded data...');
      await seedDatabase();
      // Re-query after seed
      const seededRows = await DB.query('SELECT * FROM security_findings ORDER BY created_at ASC');
      return seededRows.map(dbRowToFinding);
    }

    setStatus(`Loaded ${rows.length} findings from database`);
    return rows.map(dbRowToFinding);
  } catch (e) {
    console.error('Failed to load from DB, using seed data:', e);
    setStatus('Database unavailable, using local data...');
    // Fallback to embedded seed data
    return [
      ...SEED_OUR_FINDINGS,
      ...SEED_EXTERNAL_REPORTS,
      ...SEED_CVE_CATALOG
    ];
  }
}

async function loadCves() {
  try {
    const rows = await DB.query('SELECT * FROM security_cves ORDER BY project, cve_id');
    return rows || [];
  } catch (e) { console.warn('Failed to load CVEs:', e); return []; }
}

  try {
    const rows = await DB.query('SELECT * FROM security_hackerone_reports ORDER BY submitted_at DESC');
    return rows || [];
  } catch (e) { console.warn('Failed to load H1 reports:', e); return []; }
}

async function loadPocs(findingId) {

    const rows = await DB.query(`SELECT * FROM security_pocs WHERE finding_id = '${DB.escape(findingId)}' ORDER BY created_at ASC`);
    return rows || [];
  } catch (e) { console.warn('Failed to load PoCs:', e); return []; }
}

async function loadComments(findingId) {
  try {
    const rows = await DB.query(`SELECT * FROM finding_comments WHERE finding_id = '${DB.escape(findingId)}' ORDER BY created_at ASC`);

// ============================================================

    await DB.mutate(`INSERT INTO security_finding_history (finding_id, field_changed, old_value, new_value, changed_by) VALUES ('${DB.escape(findingId)}', '${DB.escape(field)}', '${DB.escape(oldVal || '')}', '${DB.escape(newVal || '')}', 'App User')`);
  } catch (e) {

async function init() {
  // Load all data from DB in parallel
  const [allFindings, projects, cves, h1Reports] = await Promise.all([
    loadFromDatabase(),
    loadProjects(),
    loadCves(),
    loadHackeroneReports()
  ]);

  PROJECTS = projects;
  DB_CVES = cves;
  DB_HACKERONE = h1Reports;

  // Categorize into the three views
  OUR_FINDINGS = [];
  EXTERNAL_REPORTS = [];
  CVE_CATALOG = [];

  allFindings.forEach(f => {
    const bucket = categorizeFinding(f);
    if (bucket === 'external') EXTERNAL_REPORTS.push(f);
    else if (bucket === 'cve') CVE_CATALOG.push(f);
    else OUR_FINDINGS.push(f);
  });

  ALL_FINDINGS = [...OUR_FINDINGS, ...EXTERNAL_REPORTS, ...CVE_CATALOG];

  // Hide loading overlay
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.style.display = 'none';

  // Update the header meta with actual project count
  const projectCount = new Set(ALL_FINDINGS.map(f => f.project)).size;
  const headerMeta = document.querySelector('.header-meta');
  if (headerMeta) headerMeta.textContent = `April 2026 \u00b7 ${projectCount} Projects \u00b7 ${ALL_FINDINGS.length} Findings`;

  populateProjectFilter();
  populateExtraFilters();
  updateStats();
  updateTabCounts();
  renderFindings();
  document.getElementById('searchInput').addEventListener('input', renderFindings);
  document.getElementById('severityFilter').addEventListener('change', renderFindings);
  document.getElementById('projectFilter').addEventListener('change', renderFindings);
  document.getElementById('statusFilter').addEventListener('change', renderFindings);
  const ftFilter = document.getElementById('findingTypeFilter');
  if (ftFilter) ftFilter.addEventListener('change', renderFindings);
  const prFilter = document.getElementById('priorityFilter');
  if (prFilter) prFilter.addEventListener('change', renderFindings);
  const remFilter = document.getElementById('remediationFilter');
  if (remFilter) remFilter.addEventListener('change', renderFindings);
  const pocFilter = document.getElementById('pocFilter');
  if (pocFilter) pocFilter.addEventListener('change', renderFindings);
  const advFilter = document.getElementById('adversarialFilter');
  if (advFilter) advFilter.addEventListener('change', renderFindings);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });
}

function populateExtraFilters() {
  // Finding types
  const types = [...new Set(ALL_FINDINGS.map(f => f.finding_type).filter(Boolean))].sort();
  const ftSel = document.getElementById('findingTypeFilter');
  if (ftSel) types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    ftSel.appendChild(opt);
  });
}

function populateProjectFilter() {
  const projects = [...new Set(ALL_FINDINGS.map(f => f.project))].sort();
  const sel = document.getElementById('projectFilter');
  projects.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
}

function getCurrentViewFindings() {
  switch (currentMainView) {
    case 'our_findings': return OUR_FINDINGS;
    case 'external_reports': return EXTERNAL_REPORTS;
    case 'known_cves': return CVE_CATALOG;
    default: return OUR_FINDINGS;
  }
}

function getFilteredFindings() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const severity = document.getElementById('severityFilter').value;
  const project = document.getElementById('projectFilter').value;
  const status = document.getElementById('statusFilter').value;
  const findingType = (document.getElementById('findingTypeFilter') || {}).value || '';
  const priority = (document.getElementById('priorityFilter') || {}).value || '';
  const remStatus = (document.getElementById('remediationFilter') || {}).value || '';
  const pocVal = (document.getElementById('pocFilter') || {}).value || '';
  const advVal = (document.getElementById('adversarialFilter') || {}).value || '';

  let filtered = getCurrentViewFindings().filter(f => {
    if (severity && f.severity !== severity) return false;
    if (project && f.project !== project) return false;
    if (status && f.status !== status) return false;
    if (findingType && f.finding_type !== findingType) return false;
    if (priority && f.priority !== priority) return false;
    if (remStatus && f.remediation_status !== remStatus) return false;
    if (pocVal === 'true' && !f.has_poc) return false;
    if (pocVal === 'false' && f.has_poc) return false;
    if (advVal === 'true' && !f.adversarial_reviewed) return false;
    if (advVal === 'false' && f.adversarial_reviewed) return false;
    if (search) {
      const haystack = (f.title + ' ' + f.description + ' ' + f.project + ' ' + (f.cve_ids || '') + ' ' + (f.hackerone_id || '') + ' ' + (f.finding_type || '') + ' ' + (f.tags ? JSON.stringify(f.tags) : '')).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  if (currentSort === 'severity') {
    filtered.sort((a, b) => (SEV_ORDER[a.severity] || 9) - (SEV_ORDER[b.severity] || 9));
  } else if (currentSort === 'project') {
    filtered.sort((a, b) => a.project.localeCompare(b.project) || (SEV_ORDER[a.severity] || 9) - (SEV_ORDER[b.severity] || 9));
  }
  return filtered;
}

function updateStats() {
  const all = ALL_FINDINGS;
  document.getElementById('totalCount').textContent = all.length;
  document.getElementById('criticalCount').textContent = all.filter(f => f.severity === 'CRITICAL').length;
  document.getElementById('highCount').textContent = all.filter(f => f.severity === 'HIGH').length;
  document.getElementById('mediumCount').textContent = all.filter(f => f.severity === 'MEDIUM').length;
  document.getElementById('lowCount').textContent = all.filter(f => f.severity === 'LOW').length;
  document.getElementById('unpatchedCount').textContent = all.filter(f => f.fix_status && f.fix_status.toLowerCase().includes('unpatched')).length;
  document.getElementById('patchedCount').textContent = all.filter(f => f.fix_status && f.fix_status.toLowerCase().includes('patched') && !f.fix_status.toLowerCase().includes('unpatched')).length;
}

function updateTabCounts() {
  document.getElementById('projectsCount').textContent = PROJECTS.length || new Set(ALL_FINDINGS.map(f => f.project)).size;
  document.getElementById('ourFindingsCount').textContent = OUR_FINDINGS.length;
  document.getElementById('externalReportsCount').textContent = EXTERNAL_REPORTS.length;
  document.getElementById('knownCvesCount').textContent = CVE_CATALOG.length;
  document.getElementById('cveCatalogCount').textContent = DB_CVES.length;
  document.getElementById('hackeroneCount').textContent = DB_HACKERONE.length;
}

// ============================================================
// MAIN TAB SWITCHING
// ============================================================
function switchMainTab(view) {
  currentMainView = view;
  document.querySelectorAll('.main-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  renderFindings();
}

// ============================================================
// RENDER FINDINGS LIST
// ============================================================
function renderFindings() {
  const container = document.getElementById('findingsList');
  const info = document.getElementById('resultsInfo');

  if (currentMainView === 'projects') {
    info.textContent = `${PROJECTS.length || new Set(ALL_FINDINGS.map(f => f.project)).size} projects`;
    renderProjectDashboard(container);
    return;
  }

  if (currentMainView === 'cve_catalog') {
    renderCveCatalog(container, info);
    return;
  }

  if (currentMainView === 'hackerone') {
    renderHackeroneDashboard(container, info);
    return;
  }

  const findings = getFilteredFindings();
  const viewFindings = getCurrentViewFindings();
  info.textContent = `Showing ${findings.length} of ${viewFindings.length} findings`;

  if (findings.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No findings match your filters</h3><p>Try adjusting your search or filters</p></div>';
    return;
  }

  if (currentMainView === 'known_cves') {
    renderCveList(findings, container);
  } else if (currentSort === 'project') {
    renderGroupedByProject(findings, container);
  } else {
    renderFlatList(findings, container);
  }
}

function renderProjectDashboard(container) {
  if (PROJECTS.length === 0) {
    // Fall back to computing project stats from findings
    const projectMap = {};
    ALL_FINDINGS.forEach(f => {
      if (!projectMap[f.project]) projectMap[f.project] = { name: f.project, findings: [], critical: 0, high: 0 };
      projectMap[f.project].findings.push(f);
      if (f.severity === 'CRITICAL') projectMap[f.project].critical++;
      if (f.severity === 'HIGH') projectMap[f.project].high++;
    });
    const projects = Object.values(projectMap).sort((a, b) => (b.critical * 100 + b.high) - (a.critical * 100 + a.high));

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;">';
    projects.forEach(p => {
      const unpatched = p.findings.filter(f => f.fix_status && f.fix_status.toLowerCase().includes('unpatched')).length;
      html += `
        <div class="finding-card card-primary" onclick="switchMainTab('our_findings');document.getElementById('projectFilter').value='${esc(p.name)}';renderFindings();" style="cursor:pointer;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:15px;font-weight:600;">${esc(p.name)}</span>
            <span style="font-size:12px;color:var(--text-muted);">${p.findings.length} findings</span>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${p.critical > 0 ? `<span class="severity-badge severity-CRITICAL">${p.critical} Critical</span>` : ''}
            ${p.high > 0 ? `<span class="severity-badge severity-HIGH">${p.high} High</span>` : ''}
            ${unpatched > 0 ? `<span style="font-size:11px;color:var(--critical);background:var(--critical-bg);padding:2px 8px;border-radius:4px;">${unpatched} Unpatched</span>` : ''}
          </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;">';
  PROJECTS.forEach(p => {
    const statusColor = p.assessment_status === 'adversarial-complete' ? 'var(--success)' :
      p.assessment_status === 'reviewed' ? 'var(--accent)' :
      p.assessment_status === 'in-progress' ? 'var(--high)' : 'var(--text-muted)';
    html += `
      <div class="finding-card card-primary" onclick="switchMainTab('our_findings');document.getElementById('projectFilter').value='${esc(p.name)}';renderFindings();" style="cursor:pointer;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:15px;font-weight:600;">${esc(p.name)}</span>
          <span style="font-size:11px;color:${statusColor};font-weight:600;text-transform:uppercase;">${esc(p.assessment_status || 'unknown')}</span>
        </div>

function renderCveCatalog(container, info) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const severity = document.getElementById('severityFilter').value;
  const project = document.getElementById('projectFilter').value;

  let filtered = DB_CVES.filter(c => {
    if (severity && c.severity !== severity) return false;
    if (project && c.project !== project) return false;
    if (search) {
      const haystack = (c.cve_id + ' ' + c.description + ' ' + c.project).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  info.textContent = `Showing ${filtered.length} of ${DB_CVES.length} CVEs`;

  if (filtered.length === 0) {
    container.innerHTML = DB_CVES.length === 0
      ? '<div class="empty-state"><h3>CVE catalog is being populated</h3><p>Data will appear as agents insert CVE records</p></div>'
      : '<div class="empty-state"><h3>No CVEs match your filters</h3></div>';
    return;
  }

  // Group by project
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.project]) groups[c.project] = [];
    groups[c.project].push(c);
  });

  let html = '';
  Object.keys(groups).sort().forEach(proj => {
    const cves = groups[proj];
    const patched = cves.filter(c => c.patched_in_nes).length;
    const unpatched = cves.length - patched;
    html += `<div class="project-group-header">${esc(proj)}
      <span class="project-group-count">(${cves.length} CVEs &middot; <span style="color:var(--success)">${patched} patched</span> &middot; <span style="color:var(--critical)">${unpatched} unpatched</span>)</span></div>`;
    cves.forEach(c => {
      html += `
        <div class="cve-list-item" onclick="openCveDetail('${c.id}')">
          <span class="severity-badge severity-${c.severity || 'MEDIUM'}">${c.severity || '?'}${c.cvss_score ? ' ' + c.cvss_score : ''}</span>
          <span class="cve-title">${esc(c.cve_id)}: ${esc(c.description || '').substring(0, 120)}${(c.description || '').length > 120 ? '...' : ''}</span>
          <div class="cve-meta">
            ${c.affected_versions ? `<span style="font-size:10px;color:var(--text-muted);">Affected: ${esc(c.affected_versions)}</span>` : ''}
            ${c.patched_in_nes
              ? '<span style="font-size:10px;color:var(--success);background:var(--success-bg);padding:2px 6px;border-radius:4px;font-weight:700;">&#10003; Patched in NES</span>'

function findRelatedItems(f) {
  const result = { cves: [], hackerone: [], pocs: [], findings: [] };
  if (!f) return result;

  // 1. Related CVEs: use the finding's related_cves JSON array, look up details from DB_CVES
  const relatedCveIds = f.related_cves ? (typeof f.related_cves === 'string' ? JSON.parse(f.related_cves) : f.related_cves) : [];
  if (relatedCveIds.length > 0) {
    relatedCveIds.forEach(cveId => {
      const match = DB_CVES.find(c => c.cve_id === cveId);
      if (match) result.cves.push(match);
    });
  }

  // Also check cve_ids field for legacy/fallback matching
  if (result.cves.length === 0) {
    const cvePattern = /CVE-\d{4}-\d{4,}/g;
    const textBlob = (f.cve_ids || '') + ' ' + (f.title || '') + ' ' + (f.description || '');
    const mentionedCves = [...new Set((textBlob.match(cvePattern) || []))];
    if (mentionedCves.length > 0) {
      DB_CVES.forEach(c => {
        if (mentionedCves.includes(c.cve_id) && !result.cves.some(rc => rc.id === c.id)) {
          result.cves.push(c);
        }
      });
    }
  }

  // 2. Related HackerOne reports: find reports where related_finding_ids contains this finding's ID
  DB_HACKERONE.forEach(h => {
    const hRelated = h.related_finding_ids ? (typeof h.related_finding_ids === 'string' ? JSON.parse(h.related_finding_ids) : h.related_finding_ids) : [];
    if (hRelated.includes(f.id)) {
      result.hackerone.push(h);
    }
  });

  // 3. Related findings by affected files or same project (fallback)
  const allOther = [...OUR_FINDINGS, ...CVE_CATALOG].filter(o => o.id !== f.id && !result.cves.some(c => c.id === o.id));
  allOther.forEach(o => {
    if (result.findings.length >= 5) return; // cap at 5
    const fFileParts = (f.affected_files || '').split(/[,;\s]+/).filter(p => p.length > 4).map(p => p.toLowerCase().replace(/\.java.*/, '.java'));
    const oFileParts = (o.affected_files || '').toLowerCase().split(/[,;\s]+/).filter(p => p.length > 4).map(p => p.replace(/\.java.*/, '.java'));
    const fileOverlap = fFileParts.some(fp => oFileParts.some(op => fp.includes(op) || op.includes(fp)));
    if (fileOverlap) {
      result.findings.push(o);
    }
  });

  return result;
}

function extractKeywords(text) {
  // Extract meaningful component keywords from text
  const stopwords = new Set(['the','and','or','a','an','in','to','for','of','is','on','at','by','via','with','no','not','from','this','that','are','was','has','have']);
  return text.toLowerCase()
    .replace(/[^a-z0-9]+/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 3 && !stopwords.has(w) && !/^\d+$/.test(w));
}

    <span class="meta-tag">${esc(f.project)}</span>
    <span class="status-tag status-${f.status}">${formatStatus(f.status)}</span>
    ${f.priority ? `<span class="meta-tag" style="color:${f.priority.startsWith('P0') ? 'var(--critical)' : f.priority.startsWith('P1') ? 'var(--high)' : 'var(--text-secondary)'};font-weight:700;">${esc(f.priority)}</span>` : ''}
    ${f.hackerone_id ? `<span class="meta-tag category-hackerone">HackerOne #${f.hackerone_id}</span>` : ''}
    ${f.cve_ids ? `<span class="meta-tag category-cve_catalog">${esc(f.cve_ids)}</span>` : ''}
    ${f.fix_status ? `<span class="meta-tag">${esc(f.fix_status)}</span>` : ''}
    ${f.affected_versions ? `<span class="meta-tag">${esc(f.affected_versions)}</span>` : ''}
    ${f.has_poc ? '<span class="source-badge badge-has-poc">Has PoC</span>' : ''}
    ${f.adversarial_reviewed ? '<span class="meta-tag" style="color:#a78bfa;border:1px solid rgba(167,139,250,0.3);">Adversarial Reviewed</span>' : ''}
    ${f.remediation_status ? `<span class="meta-tag" style="color:${f.remediation_status === 'fixed' ? 'var(--success)' : f.remediation_status === 'open' ? 'var(--critical)' : 'var(--text-secondary)'};">Remediation: ${esc(f.remediation_status)}</span>` : ''}
    ${f.assigned_to ? `<span class="meta-tag">Assigned: ${esc(f.assigned_to)}</span>` : ''}
  </div></div>`;

  // CVSS details if available
  if (f.cvss_score || f.cvss_vector || f.attack_vector) {
    html += `<div class="detail-section"><div class="detail-section-header">CVSS / Attack Details</div><div class="detail-section-body">`;
    if (f.cvss_score) html += `<strong>CVSS Score:</strong> ${f.cvss_score}<br>`;
    if (f.cvss_vector) html += `<strong>CVSS Vector:</strong> <span style="font-family:monospace;font-size:12px;">${esc(f.cvss_vector)}</span><br>`;
    if (f.attack_vector) html += `<strong>Attack Vector:</strong> ${esc(f.attack_vector)}<br>`;
    if (f.original_severity && f.original_severity !== f.severity) html += `<strong>Original Severity:</strong> ${esc(f.original_severity)} (adjusted to ${f.severity})<br>`;
    if (f.nes_branch) html += `<strong>NES Branch:</strong> ${esc(f.nes_branch)}<br>`;
    if (f.nes_version) html += `<strong>NES Version:</strong> ${esc(f.nes_version)}<br>`;
    if (f.affected_component) html += `<strong>Component:</strong> ${esc(f.affected_component)}<br>`;
    html += `</div></div>`;
  }

  // Tags
  const tags = f.tags ? (typeof f.tags === 'string' ? JSON.parse(f.tags) : f.tags) : [];
  if (tags.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-header">Tags</div><div class="detail-tags">`;
    tags.forEach(t => { html += `<span class="meta-tag">${esc(t)}</span>`; });
    html += `</div></div>`;
  }

  // Status / Priority / Severity update
  html += `<div class="detail-section"><div class="detail-section-header">Update Finding</div>
    <div class="status-controls" style="flex-wrap:wrap;">
      <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:120px;">
        <label style="font-size:11px;color:var(--text-muted);">Status</label>
        <select class="status-select" id="statusSelect">
          ${['investigating','confirmed','in_progress','fixed','released','wont_fix','duplicate'].map(s =>
            `<option value="${s}" ${f.status === s ? 'selected' : ''}>${formatStatus(s)}</option>`
          ).join('')}
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:120px;">
        <label style="font-size:11px;color:var(--text-muted);">Priority</label>
        <select class="status-select" id="prioritySelect">
          <option value="" ${!f.priority ? 'selected' : ''}>None</option>
          ${['P0-urgent','P1-high','P2-medium','P3-low'].map(p =>
            `<option value="${p}" ${f.priority === p ? 'selected' : ''}>${p}</option>`
          ).join('')}
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:120px;">
        <label style="font-size:11px;color:var(--text-muted);">Severity</label>
        <select class="status-select" id="severitySelect">
          ${['CRITICAL','HIGH','MEDIUM','LOW'].map(s =>
            `<option value="${s}" ${f.severity === s ? 'selected' : ''}>${s}</option>`
          ).join('')}
        </select>
      </div>
      <button class="btn" onclick="updateFinding()" style="align-self:flex-end;">Save Changes</button>
    </div></div>`;

  html += `<div class="detail-section"><div class="detail-section-header">Description</div>
    <div class="detail-section-body">${esc(f.description)}</div></div>`;

  if (f.adversarial_verdict) {
    html += `<div class="detail-section"><div class="detail-section-header">Adversarial Review Verdict${f.reviewed_by ? ' (' + esc(f.reviewed_by) + ')' : ''}</div>
      <div class="detail-section-body">${esc(f.adversarial_verdict)}</div></div>`;
  }

  if (f.reproduction_path || f.poc_path) {
    html += `<div class="detail-section"><div class="detail-section-header">Reproduction</div>
      <div class="detail-section-body">Reproduction materials available at:<br><span class="repro-path">${esc(f.poc_path || f.reproduction_path)}</span></div></div>`;
  }

  if (f.remediation_pr) {
    html += `<div class="detail-section"><div class="detail-section-header">Fix PR</div>
      <div class="detail-section-body"><a href="${esc(f.remediation_pr)}" target="_blank" style="color:var(--accent);">${esc(f.remediation_pr)}</a></div></div>`;
  }
  html += '</div>';

  // Technical tab
  html += `<div class="tab-content ${currentTab === 'technical' ? 'active' : ''}">`;
  if (f.affected_files) {
    html += `<div class="detail-section"><div class="detail-section-header">Affected Files</div>
      <div class="detail-section-body" style="font-family:monospace;font-size:12px;">${esc(f.affected_files)}</div></div>`;
  }
  if (f.exploitation) {
    html += `<div class="detail-section"><div class="detail-section-header">Exploitation Scenario</div>
      <div class="detail-section-body">${esc(f.exploitation)}</div></div>`;
  }
  if (f.remediation) {
    html += `<div class="detail-section"><div class="detail-section-header">Remediation</div>
      <div class="detail-section-body">${esc(f.remediation)}</div></div>`;
  }
  html += '</div>';

  // Discussion tab
  html += `<div class="tab-content ${currentTab === 'discussion' ? 'active' : ''}">`;

  // PoC viewer section
  html += `<div class="detail-section" id="pocSection" style="display:none;"><div class="detail-section-header">Proof of Concept</div>
    <div id="pocContent" style="padding:14px 16px;"><div style="color:var(--text-muted);font-size:13px;">Loading PoCs...</div></div></div>`;

  // Comments section
  html += `<div class="detail-section"><div class="detail-section-header">Comments</div>`;
  html += '<div id="commentsListEl" class="comments-list"><div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">Loading comments...</div></div>';
  html += `<div class="comment-form">
    <textarea class="comment-input" id="commentInput" placeholder="Add a comment..." rows="2"></textarea>
    <button class="btn" onclick="addComment()" style="align-self:flex-end;">Post</button>
  </div></div>`;
  html += '</div>';

  // Load comments and PoCs asynchronously when discussion tab is active
  if (currentTab === 'discussion' && f.id) {
    // Load comments
    loadComments(f.id).then(dbComments => {
      const el = document.getElementById('commentsListEl');
      if (!el) return;
      // Merge with local comments
      const localComments = comments[f.id] || [];
      const allComments = [...dbComments, ...localComments];
      if (allComments.length === 0) {
        el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">No comments yet</div>';
        return;
      }
      el.innerHTML = allComments.map(c => `
        <div class="comment-item">
          <div class="comment-header">
            <span class="comment-author">${esc(c.author)}</span>
            <span class="comment-time">${formatTime(c.created_at)}</span>
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>`).join('');
    });

    // Load PoCs
    loadPocs(f.id).then(pocs => {
      const section = document.getElementById('pocSection');
      const el = document.getElementById('pocContent');
      if (!el || !section) return;
      if (pocs.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      el.innerHTML = pocs.map(p => `
        <div style="margin-bottom:16px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <div>
              <strong style="font-size:14px;">${esc(p.title)}</strong>
              ${p.poc_type ? `<span class="meta-tag" style="margin-left:8px;">${esc(p.poc_type)}</span>` : ''}
              ${p.file_name ? `<span style="font-size:11px;color:var(--text-muted);margin-left:8px;">${esc(p.file_name)}</span>` : ''}
            </div>
            ${p.content ? `<button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;" onclick="navigator.clipboard.writeText(this.closest('[data-poc]').querySelector('pre').textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)})">Copy</button>` : ''}
          </div>
          ${p.content ? `<pre data-poc style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;color:var(--text-primary);max-height:400px;overflow-y:auto;"><code>${esc(p.content)}</code></pre>` : ''}
          ${p.reproduction_steps ? `<div style="margin-top:8px;font-size:13px;color:var(--text-secondary);"><strong>Reproduction Steps:</strong><br><div style="white-space:pre-wrap;margin-top:4px;">${esc(p.reproduction_steps)}</div></div>` : ''}
          ${p.expected_result ? `<div style="margin-top:6px;font-size:12px;color:var(--text-muted);"><strong>Expected:</strong> ${esc(p.expected_result)}</div>` : ''}
          ${p.environment ? `<div style="margin-top:4px;font-size:12px;color:var(--text-muted);"><strong>Environment:</strong> ${esc(p.environment)}</div>` : ''}
        </div>`).join('<div style="border-top:1px solid var(--border);margin:12px 0;"></div>');
    });
  }

  // History tab (audit trail)
  html += `<div class="tab-content ${currentTab === 'history' ? 'active' : ''}" id="historyTabContent">`;
  html += `<div class="detail-section"><div class="detail-section-header">Change History</div>`;
  html += `<div id="historyList" style="padding:14px 16px;"><div style="color:var(--text-muted);font-size:13px;text-align:center;">Loading audit trail...</div></div>`;
  html += `</div></div>`;

  // Load history asynchronously if on history tab
  if (currentTab === 'history' && f.id) {
    loadHistory(f.id).then(entries => {
      const el = document.getElementById('historyList');
      if (!el) return;
      if (entries.length === 0) {
        el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">No changes recorded yet</div>';
        return;
      }
      el.innerHTML = entries.map(e => `
        <div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;">
          <div style="flex-shrink:0;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:6px;"></div>
          <div style="flex:1;">
            <div style="font-size:13px;color:var(--text-primary);">
              <strong>${esc(e.field_changed)}</strong> changed from
              <span style="color:var(--text-muted);text-decoration:line-through;">${esc(e.old_value || '(none)')}</span>
              to <span style="color:var(--accent);font-weight:600;">${esc(e.new_value || '(none)')}</span>
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">
              by ${esc(e.changed_by)} ${e.created_at ? '&middot; ' + formatTime(e.created_at) : ''}
              ${e.reason ? '<br>' + esc(e.reason) : ''}
            </div>
          </div>
        </div>
      `).join('');
    });
  }

  // Related items section (visible on all tabs)
  const related = findRelatedItems(f);
  if (related.cves.length > 0 || related.hackerone.length > 0 || related.findings.length > 0) {
    html += '<div style="padding: 0 20px 20px;">';
    html += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);padding:16px 0 10px;border-top:1px solid var(--border);">Related</div>';

    if (related.cves.length > 0) {
      html += '<div style="margin-bottom:10px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">Related CVEs</div>';
      related.cves.forEach(r => {
        html += `<div class="cve-list-item" style="margin-bottom:4px;" onclick="openCveDetail('${r.id}')">
          <span class="severity-badge severity-${r.severity}">${r.severity}${r.cvss_score ? ' ' + r.cvss_score : ''}</span>
          <span class="cve-title">${esc(r.cve_id)}: ${esc((r.description || '').substring(0, 100))}${(r.description || '').length > 100 ? '...' : ''}</span>
          ${r.patched_in_nes ? '<span style="color:var(--success);font-size:11px;font-weight:700;">&#10003; NES</span>' : '<span style="color:var(--critical);font-size:11px;font-weight:700;">&#10007; NES</span>'}
        </div>`;
      });
      html += '</div>';
    }

    if (related.hackerone.length > 0) {
      html += '<div style="margin-bottom:10px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">HackerOne Reports</div>';
      related.hackerone.forEach(r => {
        html += `<div class="cve-list-item" style="margin-bottom:4px;" onclick="openH1Detail('${r.id}')">
          <span class="severity-badge severity-${r.severity}">${r.severity}</span>
          <span class="cve-title">${esc(r.title)}</span>
          <span class="source-badge badge-hackerone">H1#${esc(r.hackerone_id || '')}</span>
        </div>`;
      });
      html += '</div>';
    }

    if (related.findings.length > 0) {
      html += '<div style="margin-bottom:10px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">Related Findings</div>';
      related.findings.forEach(r => {
        html += `<div class="cve-list-item" style="margin-bottom:4px;" onclick="openDetail('${r.id}')">
          <span class="severity-badge severity-${r.severity}">${r.severity}</span>
          <span class="cve-title">${esc(r.title)}</span>
          ${getSourceBadgeHtml(r)}
        </div>`;
      });
      html += '</div>';
    }

    html += '</div>';
  }

  // PoC section (loaded asynchronously from security_pocs)
  html += '<div id="relatedPocsSection" style="display:none;padding:0 20px 20px;"></div>';

  container.innerHTML = html;

  // Load PoCs asynchronously for the related section
  if (f.id) {
    loadPocs(f.id).then(pocs => {
      const section = document.getElementById('relatedPocsSection');
      if (!section || pocs.length === 0) return;
      section.style.display = 'block';
      let pocHtml = '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);padding:0 0 10px;border-top:1px solid var(--border);margin-top:-1px;padding-top:16px;">Proof of Concept</div>';
      pocs.forEach(p => {
        pocHtml += `<div style="margin-bottom:8px;padding:8px 12px;background:var(--bg-tertiary);border-radius:6px;border:1px solid var(--border);">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);">${esc(p.title)}</div>
          ${p.poc_type ? `<span class="meta-tag" style="font-size:10px;">${esc(p.poc_type)}</span>` : ''}
          ${p.file_name ? `<span style="font-size:11px;color:var(--text-muted);margin-left:6px;">${esc(p.file_name)}</span>` : ''}
          ${p.reproduction_steps ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${esc(p.reproduction_steps).substring(0, 200)}${(p.reproduction_steps || '').length > 200 ? '...' : ''}</div>` : ''}
        </div>`;
      });
      section.innerHTML = pocHtml;
    });
  }
}

async function updateFinding() {
  if (!currentFinding) return;
  const newStatus = document.getElementById('statusSelect').value;
  const newPriority = document.getElementById('prioritySelect').value;
  const newSeverity = document.getElementById('severitySelect').value;

  const changes = [];
  if (newStatus !== currentFinding.status) changes.push({ field: 'status', old: currentFinding.status, new: newStatus });
  if (newPriority !== (currentFinding.priority || '')) changes.push({ field: 'priority', old: currentFinding.priority || '', new: newPriority });
  if (newSeverity !== currentFinding.severity) changes.push({ field: 'severity', old: currentFinding.severity, new: newSeverity });

  if (changes.length === 0) return;

  // Apply locally
  currentFinding.status = newStatus;
  currentFinding.priority = newPriority;
  currentFinding.severity = newSeverity;

  // Persist to DB and log changes
  try {
    const setClauses = [];
    if (changes.some(c => c.field === 'status')) setClauses.push(`status = '${DB.escape(newStatus)}'`);
    if (changes.some(c => c.field === 'priority')) setClauses.push(`priority = '${DB.escape(newPriority)}'`);
    if (changes.some(c => c.field === 'severity')) setClauses.push(`severity = '${DB.escape(newSeverity)}'`);
    setClauses.push('updated_at = now()');

    await DB.mutate(`UPDATE security_findings SET ${setClauses.join(', ')} WHERE id = '${DB.escape(currentFinding.id)}'`);

    // Log each change to audit trail
    await Promise.all(changes.map(c => logChange(currentFinding.id, c.field, c.old, c.new)));
  } catch (e) {
    console.warn('Failed to persist finding update to DB:', e);
  }
  updateStats();
  renderFindings();
  renderDetailContent();
}

// Keep backward compat
async function updateStatus() { return updateFinding(); }

async function addComment() {
  if (!currentFinding) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  // Save to DB
  await saveComment(currentFinding.id, 'App User', text);
  // Also keep local copy for immediate display
  if (!comments[currentFinding.id]) comments[currentFinding.id] = [];
  comments[currentFinding.id].push({
    author: 'App User',
    text: text,
    created_at: new Date().toISOString()
  });
  input.value = '';
  renderDetailContent();
}

// ============================================================
// HELPERS
// ============================================================
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatCategory(cat) {
  switch(cat) {
    case 'hackerone': return 'HackerOne';
    case 'code_review': return 'Code Review';
    case 'cve_catalog': return 'CVE Catalog';
    case 'investigation': return 'Investigation';
    default: return cat;
  }
}

function formatStatus(s) {
  switch(s) {
    case 'investigating': return 'Investigating';
    case 'confirmed': return 'Confirmed';
    case 'in_progress': return 'In Progress';
    case 'fixed': return 'Fixed';
    case 'released': return 'Released';
    case 'wont_fix': return "Won't Fix";
    case 'duplicate': return 'Duplicate';
    default: return s;
  }
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Start
init();
