  {id:"a0050001-0001-4000-8000-000000000001",title:"TypeParser DoS (Missing Length/Nesting Limits)",severity:"MEDIUM",project:"Jackson 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"TypeParser.parse() has no MAX_TYPE_LENGTH or MAX_TYPE_NESTING limits. Deeply nested generic type IDs cause StackOverflowError. Requires non-default polymorphic config.",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Jackson Dataformat XML 2.13.x (nes-2.13.x) ===
  {id:"29461b09-bee1-482e-a658-21ebf6f24d92",title:"User-Supplied XMLInputFactory Bypasses XXE Protection",severity:"LOW",project:"Jackson Dataformat XML 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"`XmlFactory` provides public constructors that accept a caller-supplied `XMLInputFactory`. When a non-null factory is passed, the XXE protection properties (`IS_SUPPORTING_EXTERNAL_ENTITIES=false`, `SUPPORT_DTD=false`) are **not** applied to the caller's factory — only the `_initFactories` call is made (which sets `IS_COALESCING` and namespace repairing). The protection properties are only set when `xmlIn == null` (i.e., the default factory path). Similarly, the deprecated `setXMLInputFactory(XMLInputFactory f)` method replaces the factory with no security property enforcement. CWE: CWE-611 (Improper Restriction of XML External Entity Reference)",affected_files:"`src/main/java/com/fasterxml/jackson/dataformat/xml/XmlFactory.java:91-103`",exploitation:"An application that constructs `XmlFactory` or `XmlMapper` with a custom `XMLInputFactory` that does not have entity expansion disabled (e.g., the JDK default factory) could be exposed to XXE attacks if untrusted XML is subsequently parsed. The impact is limited to applications that explicitly pass a custom factory with DTD/entity support enabled.",remediation:"Apply the XXE-protection properties to any user-supplied factory when it does not already have them set, or document clearly in Javadoc that caller-supplied factories must have external entities disabled. Consider adding a warning log or assertion if a supplied factory has `IS_SUPPORTING_EXTERNAL_ENTITIES=true`.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"905a63d5-fa94-46bc-a3d1-3ed93f7cf7f6",title:"Class.forName on Unvalidated Class Name During JDK Deserialization",severity:"LOW",project:"Jackson Dataformat XML 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"`XmlFactory` implements Java serialization (`implements Serializable` via `JsonFactory`). During JDK deserialization, `readObject` reads two UTF strings from the stream (`_jdkXmlInFactory`, `_jdkXmlOutFactory`) representing class names, and `readResolve` then calls `Class.forName(className).getDeclaredConstructor().newInstance()` on these class names without any whitelist or type verification before the cast. The cast to `XMLInputFactory`/`XMLOutputFactory` provides partial protection (an incompatible class will throw `ClassCastException`), but a class whose static initializer or constructor causes side effects could still be triggered. This is a standard Java serialization gadget vector: if an attacker can supply a crafted serialized `XmlFactory` object to an application's JDK `ObjectInputStream`, arbitrary classes with default no-arg constructors implementing `XMLInputFactory` or `XMLOutputFactory` could be instantiated during deserialization. CWE: CWE-502 (Deserialization of Untrusted Data)",affected_files:"`src/main/java/com/fasterxml/jackson/dataformat/xml/XmlFactory.java:215-231` (`readResolve`), `src/main/java/com/fasterxml/jackson/dataformat/xml/XmlFactory.java:238-244` (`readObject`)",exploitation:"In practice, exploitability requires that: (a) the application deserializes `XmlFactory` objects from untrusted sources via `ObjectInputStream`, AND (b) a usable gadget class is on the classpath. Neither condition is common in typical usage. The severity is Low because jackson-dataformat-xml is a data-binding library unlikely to be directly deserialized from untrusted streams.",remediation:"Validate that the deserialized class names are exactly one of the expected implementations (e.g., `com.fasterxml.woodstox.WstxInputFactory`, `com.sun.xml.internal.stream.XMLInputFactoryImpl`). Alternatively, use `Class.forName(name, false, cl)` and verify `XMLInputFactory.class.isAssignableFrom(cls)` before instantiation. This is an upstream issue that should be reported or patched upstream.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Jackson Dataformats Binary 2.13.x (nes-2.13.x) ===
  {id:"79236c59-bc87-41a6-b719-995aba594aeb",title:"Outdated Apache Avro Dependency (1.8.2) with Known CVEs",severity:"MEDIUM",project:"Jackson Dataformats Binary 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `jackson-dataformat-avro` module depends on `org.apache.avro:avro:1.8.2`, released in 2017. Apache Avro 1.8.x has several known security issues fixed in later versions: CWE: CWE-1104 (Use of Unmaintained Third Party Components) / CWE-502 (Deserialization of Untrusted Data)",affected_files:"`avro/pom.xml:44-47`",exploitation:"Depending on how Avro parsing is configured, an attacker with control over Avro binary data or schemas could trigger DoS through malformed schemas or potentially deserialization issues via the Apache Avro stack when `ApacheAvroFactory` is in use.",remediation:"Upgrade `org.apache.avro:avro` to at least 1.11.3 (latest stable as of review date). This may require API compatibility assessment, but the jackson-avro code primarily uses the Avro I/O and Schema APIs which are stable across versions.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2019-17195,CVE-2023-39410",hackerone_id:null},
  {id:"00a2c28b-36de-4647-8926-f7ca41b56e99",title:"AvroTypeIdResolver Uses ClassNameIdResolver for Polymorphic Type Resolution",severity:"LOW",project:"Jackson Dataformats Binary 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"`AvroTypeIdResolver` extends Jackson's `ClassNameIdResolver`, which resolves Java class types from string class names embedded in data. This class is activated automatically for: CWE: CWE-502 (Deserialization of Untrusted Data)",affected_files:"`avro/src/main/java/com/fasterxml/jackson/dataformat/avro/AvroTypeIdResolver.java:22`",exploitation:"In applications that deserialize Avro binary data with `java.lang.Object` fields or `@Union` types from untrusted sources without a restrictive `PolymorphicTypeValidator`, an attacker could potentially trigger instantiation of dangerous gadget classes present on the classpath, leading to RCE or SSRF.",remediation:"1. Document that downstream users must configure a strict `PolymorphicTypeValidator` when using `AvroMapper` with `Object.class` or `@Union` fields from untrusted data.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"cf83e5d8-d782-4f20-b98c-466d853c7e48",title:"No StreamReadConstraints / BigInteger-BigDecimal Size Limits in Binary Parsers",severity:"LOW",project:"Jackson Dataformats Binary 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"Version 2.13.x predates the introduction of `StreamReadConstraints` (added in jackson-core 2.15.0). While the binary parsers do implement a `LONGEST_NON_CHUNKED_BINARY = 250,000` limit for buffering binary blobs, BigInteger and BigDecimal values are constructed without size validation: CWE: CWE-400 (Uncontrolled Resource Consumption)",affected_files:"- `cbor/src/main/java/com/fasterxml/jackson/dataformat/cbor/CBORParser.java:888`",exploitation:"A crafted binary payload could cause sustained CPU consumption (DoS) when parsed. The 250KB binary limit reduces but does not eliminate this risk.",remediation:"1. Add a maximum size check for BigInteger source bytes before construction (e.g., reject if binary payload > 10,000 bytes for numeric tags, which represents a 80,000-bit integer — already astronomical).",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"c4de9578-5b71-4bc1-a901-99ee481d786a",title:"logback-classic 1.2.3 Test Dependency with Known CVEs",severity:"INFO",project:"Jackson Dataformats Binary 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"`ch.qos.logback:logback-classic:1.2.3` is included as a `test`-scope dependency in the avro module. This version is affected by: CWE: CWE-1104 (Use of Unmaintained Third Party Components)",affected_files:"`avro/pom.xml:49-55`",exploitation:"Developer/CI build environments that run the avro test suite could be affected if an attacker can inject malicious logback configuration, but this is a very narrow attack vector.",remediation:"Upgrade `logback-classic` to 1.2.13 or 1.3.x to eliminate CVE exposure in test environments.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2021-42550,CVE-2023-6378",hackerone_id:null},
  {id:"79164f78-7bca-4759-b9db-59c9b0cb939b",title:"Maven Wrapper Downloads Without Checksum Validation",severity:"INFO",project:"Jackson Dataformats Binary 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The Maven Wrapper downloader fetches the Maven distribution from `repo.maven.apache.org` and the wrapper JAR without performing checksum validation. An attacker with MITM capability could substitute a malicious JAR. The `wrapperUrl` property can be set to any URL via `.mvn/wrapper/maven-wrapper.properties`, which is checked into source control. CWE: CWE-494 (Download of Code Without Integrity Check)",affected_files:"`.mvn/wrapper/MavenWrapperDownloader.java`",exploitation:"Developer/CI build-time supply chain risk. Not a runtime vulnerability in the distributed library.",remediation:"The Maven Wrapper 3.x series includes built-in checksum validation. Consider upgrading the Maven Wrapper tooling or adding SHA-256 validation.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Jackson Dataformats Text 2.13.x (nes-2.13.x) ===
  {id:"500ab0cd-6683-44c3-8d2e-9bc61e4fe965",title:"SnakeYAML 1.31 — Multiple DoS CVEs (Stack Overflow)",severity:"MEDIUM",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The YAML module depends on SnakeYAML 1.31. This version is affected by four DoS vulnerabilities (CVE-2022-38749, CVE-2022-38750, CVE-2022-38751, CVE-2022-38752), all involving stack-overflow crashes when processing specially-crafted deeply-nested or malformed YAML documents. These were fixed in SnakeYAML 1.32. Notably, the upstream 2.13.x branch backported 1.32 (commit `2c163ff`) then *reverted* it (commit `cebda38`) citing compatibility concerns. The NES branch inherits the version that was reverted to (1.31). The fix was present in the upstream 2.14.x line. CWE: CWE-400 (Uncontrolled Resource Consumption)",affected_files:"`yaml/pom.xml:41` (`<version>1.31<\/version>`)",exploitation:"A remote attacker who can supply a crafted YAML payload to an application using `jackson-dataformat-yaml` can cause a JVM StackOverflowError, crashing the parsing thread or the application (denial of service).",remediation:"Upgrade SnakeYAML to at least 1.33 (or ideally 2.x). If 1.32 reintroduced the compatibility issue that caused the original revert, investigate that specific incompatibility and address it, rather than staying on 1.31.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2022-38749,CVE-2022-38750,CVE-2022-38751,CVE-2022-38752",hackerone_id:null},
  {id:"cb485905-b7bf-42d7-8476-6308e603ae9a",title:"SnakeYAML 1.31 — Heap OOB / Buffer Overflow CVE",severity:"MEDIUM",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"CVE-2022-41854 affects SnakeYAML <= 1.31 and describes a heap-based buffer overflow during parsing of special YAML input, which can lead to denial of service or, in theory, memory corruption. Fixed in 1.32. CWE: CWE-122 (Heap-based Buffer Overflow)",affected_files:"`yaml/pom.xml:41` (`<version>1.31<\/version>`)",exploitation:"Denial of service; in adversarial JVM environments with unsafe serialization, potential memory disclosure.",remediation:"Same as FINDING-001 — upgrade SnakeYAML.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2022-41854",hackerone_id:null},
  {id:"45aabf7c-b817-4e9c-9925-237c82db2597",title:"YAML Alias Bomb — No Depth Limiting in YAMLParser",severity:"LOW",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"`YAMLParser` constructs `new ParserImpl(new StreamReader(reader))` directly, without passing any `LoaderOptions` that would limit alias expansion depth, maximum aliases-per-collection, or overall nesting depth. SnakeYAML 1.31 does not expose `LoaderOptions` to `ParserImpl` (that API was added in 1.33). As a result, a YAML document with deeply nested anchors and aliases can cause excessive memory consumption or stack overflow. The TOML module mitigates this via `StreamReadConstraints`, but the YAML module does not have an equivalent guard. CWE: CWE-400 (Uncontrolled Resource Consumption)",affected_files:"`yaml/src/main/java/com/fasterxml/jackson/dataformat/yaml/YAMLParser.java:178`",exploitation:"An application accepting YAML from untrusted sources could be subjected to a \"YAML bomb\" (analogous to XML Billion Laughs), consuming CPU/memory proportional to the alias expansion depth, potentially causing OOM or prolonged GC pauses.",remediation:"Upgrade to a SnakeYAML version that supports `LoaderOptions.setMaxAliasesForCollections()` and `LoaderOptions.setNestingDepthLimit()` (added in 1.33/2.x), and configure these limits appropriately. As an interim measure, document to NES consumers that YAML input from untrusted sources should be size-bounded at the I/O layer.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"0bcff952-2a28-40c2-8e8e-3f12cdac4406",title:"SnakeYAML 1.x — CVE-2022-1471 (Constructor RCE — Largely Mitigated)",severity:"LOW",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"CVE-2022-1471 is a critical RCE vulnerability in all SnakeYAML 1.x versions, exploitable via the `org.yaml.snakeyaml.constructor.Constructor` class which can instantiate arbitrary Java objects from YAML tags. Jackson's `YAMLParser` **does NOT use** `Constructor`; it uses `ParserImpl` for event-based parsing only, and performs its own type resolution via `Resolver` and `YAMLParser._decodeScalar()`. The raw SnakeYAML `Yaml` class is never instantiated. This architectural choice means the primary attack vector of CVE-2022-1471 (arbitrary Java class instantiation) is not present. However, SnakeYAML 1.x is still a transitive dependency, and any application code or third-party library that uses `new Yaml()` or `new Constructor()` alongside this library would be exposed. CWE: CWE-502 (Deserialization of Untrusted Data)",affected_files:"`yaml/pom.xml:41`, `yaml/src/main/java/com/fasterxml/jackson/dataformat/yaml/YAMLParser.java:178`",exploitation:"Within the scope of `jackson-dataformat-yaml`'s own code, impact is low — the library does not use the vulnerable SnakeYAML API surface. However, presence of SnakeYAML 1.x on the classpath presents risk to the broader application if other code paths trigger the vulnerable constructor.",remediation:"Document the mitigation clearly in NES release notes. Track the SnakeYAML 2.x migration in jackson-dataformats-text upstream and backport when stable. For NES consumers, advise them to audit their own use of SnakeYAML APIs.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2022-1471",hackerone_id:null},
  {id:"860bbf2f-520f-49f8-bdca-9b8ef86247c5",title:"CSV Injection — Not Mitigated at Library Level (By Design)",severity:"INFO",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The CSV module does not sanitize values that begin with `=`, `+`, `-`, `@`, or tab — characters that spreadsheet applications interpret as formula injectors. This is a known, accepted limitation of CSV libraries (the library is a data serialization format, not a spreadsheet-safe sanitizer). No upstream CVE has been filed for this. The NES fork does not add or change this behavior. CWE: CWE-1236 (Improper Neutralization of Formula Elements in a CSV File)",affected_files:"`csv/src/main/java/com/fasterxml/jackson/dataformat/csv/impl/CsvEncoder.java` (all write paths)",exploitation:"If an application writes user-controlled data to CSV and a user opens the CSV in a spreadsheet application (Excel, LibreOffice), formula injection could occur — but this is an application-level concern, not a parser vulnerability.",remediation:"No action at the library level. Recommend NES consumers document to their end-users that they should sanitize values before writing CSV that will be consumed in spreadsheet contexts.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"8e62b229-16f7-45ef-b4f1-347f1fd6486c",title:"TOML Nesting Depth DoS — Fixed in NES, But Default Limit Only",severity:"INFO",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"NES commit `fcb3ff9` (\"TOML: check nesting depth\") backports upstream PR #398, which adds `streamReadConstraints.validateNestingDepth()` calls in the TOML lexer whenever `{`, `[[`, `[`, or `}` tokens are encountered. This addresses a stack-overflow DoS (OSS-Fuzz issue 50083, tested in `FuzzTomlReadTest`). The fix delegates to Jackson Core's `StreamReadConstraints` which defaults to a maximum depth of 1000. This is a positive security change and is correctly implemented. CWE: CWE-400 (Uncontrolled Resource Consumption)",affected_files:"`toml/src/main/jflex/com/fasterxml/jackson/dataformat/toml/toml.jflex:268-370`, `toml/src/main/java/com/fasterxml/jackson/dataformat/toml/Parser.java:76-92`",exploitation:"No negative impact — this is a fix. The default limit of 1000 is reasonable.",remediation:"No action required. Consider documenting the fix in NES changelogs as a security improvement.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"fa65aff0-0db9-46db-83c8-a6d73febef46",title:"JavaProps — Commented-Out Debug Logging in Production Code",severity:"INFO",project:"Jackson Dataformats Text 2.13.x (nes-2.13.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"Two debug logging code blocks are present in production source files, both inside `/* ... */` block comments. They print parsed property content and key/value entries to `System.err`/`System.out`. The code is commented out and poses no immediate runtime risk, but constitutes dead code that could be accidentally re-enabled. CWE: CWE-200 (Information Exposure)",affected_files:"`properties/src/main/java/com/fasterxml/jackson/dataformat/javaprop/JavaPropsParser.java:247-251`, `properties/src/main/java/com/fasterxml/jackson/dataformat/javaprop/JavaPropsFactory.java:372-383`",exploitation:"None in current state (code is commented out). If accidentally uncommented, would expose parsed configuration data in server logs.",remediation:"Remove the commented-out debug blocks rather than leaving them in the source. Low priority.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Jawr Spring 3.6.x (nes-3.6.x) ===
  {id:"15e7fedc-6413-48a6-af7b-da17acb219dd",title:"Unvalidated Path Concatenation in Sample Image Generator",severity:"LOW",project:"Jawr Spring 3.6.x (nes-3.6.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `SampleImageGenerator.createResourceAsStream()` method directly concatenates `context.getPath()` to the prefix `/img/` and passes it to `servletContext.getResourceAsStream()` without any validation or sanitization. If the generator were registered in a production `jawr.properties` configuration and the JAWR framework allows unvalidated path injection into `GeneratorContext`, an attacker who can influence the generator path parameter could potentially traverse outside the `/img/` directory using sequences such as `../` to read arbitrary webapp resources. CWE: CWE-22 (Path Traversal)",affected_files:"`jawr-spring-webapp-sample/src/main/java/net/jawr/resource/generator/SampleImageGenerator.java:21` and `jawr-spring-integration-test/src/main/java/net/jawr/spring/resource/generator/SampleImageGenerator.java:20`",exploitation:"A path traversal could allow an attacker to read files outside the intended `/img/` directory within the servlet context (e.g., `/WEB-INF/web.xml`, configuration files). However, `servletContext.getResourceAsStream()` is scoped to the web application root and does not allow reading files outside the deployed WAR, limiting the worst-case impact.",remediation:"These files are sample code and should not be deployed in production as-is. If SampleImageGenerator is used as a template, add path validation: reject paths containing `..`, normalize the path, and verify it stays within the intended directory before passing to `getResourceAsStream()`.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"569454da-fad0-4b3a-8b35-1256e3e8f2fe",title:"JavaScript Injection Pattern in Integration Test Sample Generator (Test Code Only)",severity:"INFO",project:"Jawr Spring 3.6.x (nes-3.6.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The `SampleGeneratorResourceBrowser.createResource()` method constructs a JavaScript string by embedding `context.getPath()` directly into an `alert()` call without sanitization: `;alert('GeneratedPath : \"+context.getPath()+\"');`. This is a hardcoded test demonstrating the resource browser, and the path comes from bundle configuration (not HTTP request parameters). However, if this class were ever adapted for production use with user-controlled paths, it would be a JavaScript injection vulnerability. CWE: CWE-94 (Code Injection)",affected_files:"`jawr-spring-integration-test/src/main/java/net/jawr/spring/resource/generator/SampleGeneratorResourceBrowser.java:85`",exploitation:"In its current form, this class is only used in integration tests and is not registered in the production `jawr.properties`. There is no exploitable attack vector as deployed. If the pattern were replicated in production code with user-controlled input, it could lead to XSS or JavaScript injection in served bundles.",remediation:"This is test/sample code only. Add a comment clearly marking the class as test-only, not for production use. If the pattern is ever generalized, ensure `context.getPath()` output is escaped before embedding in JavaScript strings.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"54cfa3c1-6bcf-4f78-b147-9e20cff030ed",title:"Outdated DWR Test Dependency (Known CVEs)",severity:"INFO",project:"Jawr Spring 3.6.x (nes-3.6.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The integration test module depends on DWR (Direct Web Remoting) version 2.0.2 with a note that it's only used for a classpath issue fix. DWR 2.0.x is a very old library (circa 2006-2007) with publicly known XSS and security vulnerabilities. The Dependabot automation attempted to bump this to `2.0.11-RELEASE` (commit `224575a`) but this was not merged into the `nes-3.6.x` branch. CWE: CWE-1035 (Using Components with Known Vulnerabilities)",affected_files:"`jawr-spring-integration-test/pom.xml` — `org.directwebremoting:dwr:2.0.2` (comment says \"Dependency used only to fix a classpath issue\")",exploitation:"DWR is used only in the integration test module, not the production `jawr-spring-extension` artifact. There is no runtime exposure for consumers of the NES library artifact. The risk is confined to developers running integration tests in their build environment.",remediation:"Apply the Dependabot bump to `2.0.11-RELEASE`, or remove the DWR dependency entirely if the classpath issue it fixes is no longer relevant. Since this is test-only scope, severity remains Info.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"476b9a40-5484-4557-8bc6-42ac7643cbef",title:"jawr-core Dependency Pinned to SNAPSHOT Version",severity:"INFO",project:"Jawr Spring 3.6.x (nes-3.6.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The parent pom references `jawr-core` version `3.6-SNAPSHOT`. SNAPSHOT dependencies are mutable and can change between builds, making the build non-reproducible and potentially introducing unreviewed changes into the dependency graph. The actual jawr-core codebase (where most of the security-sensitive logic lives — path traversal protection, bundle serving, request handling) is not included in this repository and was not audited. CWE: CWE-1104 (Use of Unmaintained Third Party Components)",affected_files:"`pom.xml:62` — `<jawr-core.version>3.6-SNAPSHOT<\/jawr-core.version>`",exploitation:"If a SNAPSHOT artifact is served from a repository that an attacker can influence, a supply chain attack is theoretically possible. In practice, SNAPSHOT resolution is typically scoped to internal or trusted repositories. The bigger concern is that the security posture of `jawr-core 3.6-SNAPSHOT` itself is unknown.",remediation:"Pin to a fixed released version of `jawr-core` rather than a SNAPSHOT. Ensure the maven repository resolving the SNAPSHOT is trusted and access-controlled. A separate security review of `jawr-core` is recommended as it contains the actual resource serving, bundle caching, and path resolution logic.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

  // === Micrometer 1.3.x (nes-1.3.x) ===
  {id:"7bca45d3-e029-4c23-afd8-16e9af1485a5",title:"API Token Exposed in HTTP Request URL (Dynatrace & Datadog)",severity:"MEDIUM",project:"Micrometer 1.3.x (nes-1.3.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[MIC-001] CWE-200 (Upstream-Inherited)\n\n**Severity**: Medium  \n**CWE**: CWE-200 (Information Exposure)  \n**Classification**: Upstream-Inherited\n\n**Description**:  \nThe Dynatrace and Datadog registry implementations append API tokens directly into HTTP URL query parameters rather than using HTTP headers. This exposes the token in:\n- Server-side access logs at the metrics backend\n- Network proxy logs\n- `Request.toString()` output (which includes the full URL), callable via the debug `print()` method on `HttpSender.Request.Builder`\n\n**Evidence**:\n\n`DynatraceMeterRegistry.java:118`:\n```java\nString customDeviceMetricEndpoint = config.uri() + \"/api/v1/entity/infrastructure/custom/\" +\n        config.deviceId() + \"?api-token=\" + config.apiToken();\n```\n\n`DynatraceMeterRegistry.java:236`:\n```java\nhttpClient.put(customMetricEndpointTemplate + customMetric.getMetricId() + \"?api-token=\" + config.apiToken())\n```\n\n`DatadogMeterRegistry.java:109`:\n```java\nString datadogEndpoint = config.uri() + \"/api/v1/series?api_key=\" + config.apiKey();\n```\n\n`HttpSender.java:109-111` (the `toString()` method on `Request` includes the full URL):\n```java\npublic String toString() {\n    StringBuilder printed = new StringBuilder(method.toString()).append(\" \")\n            .append(url.toString()).append(\"\\\\n\");\n```\n\n`HttpSender.java:278-280` (explicit debug print that exposes URL with token):\n```java\npublic final Builder print() {\n    System.out.println(new Request(url, entity, method, requestHeaders));\n```\n\n**Note**: Wavefront correctly uses an `Authorization: Bearer` header instead of a URL query parameter, which is the safer pattern.\n\n**Remediation**: Pass API tokens as HTTP headers (e.g., `Authorization: Bearer <token>`) rather than URL query parameters.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"cf96ed88-e285-4104-8e04-15ee40938d70",title:"SQL Injection via Table/Database Name in DB Binders",severity:"LOW",project:"Micrometer 1.3.x (nes-1.3.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[MIC-002] CWE-89 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-89 (SQL Injection)  \n**Classification**: Upstream-Inherited\n\n**Description**:  \nTwo database metric binder classes construct SQL queries by string-concatenating developer-supplied identifiers (table name, database name) without parameterization or quoting. While these values come from application configuration rather than end-user input at runtime, if an application sources these identifiers from any dynamic or external input, SQL injection becomes possible.\n\n**Evidence**:\n\n`DatabaseTableMetrics.java:55`:\n```java\nthis(dataSource, \"SELECT COUNT(1) FROM \" + tableName, dataSourceName, tableName, tags);\n```\n\n`PostgreSQLDatabaseMetrics.java:292-294`:\n```java\nprivate static String getDBStatQuery(String database, String statName) {\n    return SELECT + statName + \" FROM pg_stat_database WHERE datname = '\" + database + \"'\";\n}\n```\n\nThe `runQuery()` method at line 282 uses `Statement.executeQuery()` (not `PreparedStatement`) for these constructed queries:\n```java\nStatement statement = connection.createStatement();\nResultSet resultSet = statement.executeQuery(query)\n```\n\n**Remediation**: Use parameterized queries (`PreparedStatement`) or validate/escape identifier values before interpolation.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"731fa634-57fd-4289-abfd-94738bc8a5b2",title:"InfluxDB Retention Policy Name Unquoted in InfluxQL Query",severity:"LOW",project:"Micrometer 1.3.x (nes-1.3.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[MIC-003] CWE-94 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-94 (Code Injection / InfluxQL Injection)  \n**Classification**: Upstream-Inherited\n\n**Description**:  \n`CreateDatabaseQueryBuilder` builds an InfluxQL `CREATE DATABASE` statement. The database name is properly double-quoted (using `QUERY_MANDATORY_TEMPLATE = \"CREATE DATABASE \\\\\"%s\\\\\"\"`), but the retention policy name uses `NAME_CLAUSE_TEMPLATE = \" NAME %s\"` — without quoting. A retention policy name containing spaces or InfluxQL keywords would corrupt the query. If this configuration value is sourced from external or user-controlled input, it could be used for InfluxQL injection.\n\n**Evidence**:\n\n`CreateDatabaseQueryBuilder.java:37-38`:\n```java\nprivate static final String NAME_CLAUSE_TEMPLATE = \" NAME %s\";\n```\n\n`CreateDatabaseQueryBuilder.java:71-74`:\n```java\nCreateDatabaseQueryBuilder setRetentionPolicyName(@Nullable String retentionPolicyName) {\n    if (!isEmpty(retentionPolicyName)) {\n        retentionPolicyClauses[3] = String.format(NAME_CLAUSE_TEMPLATE, retentionPolicyName);\n    }\n```\n\nThe same concern applies to `DURATION_CLAUSE_TEMPLATE` and `SHARD_DURATION_CLAUSE_TEMPLATE`, though duration values have a more constrained format (e.g., `30d`).\n\n**Remediation**: Quote the retention policy name in the InfluxQL query template (e.g., `\" NAME \\\\\"%s\\\\\"\"` with sanitization).\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"f71c2cf6-9fe6-4127-b41b-3f00e064b1d3",title:"Unbounded Tag Cardinality (DoS Risk) - No Default Limit",severity:"LOW",project:"Micrometer 1.3.x (nes-1.3.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[MIC-004] CWE-400 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-400 (Uncontrolled Resource Consumption)  \n**Classification**: Upstream-Inherited\n\n**Description**:  \nMicrometer provides optional `MeterFilter.maximumAllowableMetrics()` and `MeterFilter.maximumAllowableTags()` guards, but these are **not applied by default**. If application code uses user-controlled values as tag values (e.g., user ID, URL paths, request parameters), an attacker can exhaust JVM heap memory by creating unbounded unique metric combinations. This is a well-known risk for metrics libraries.\n\nHTTP binder code acknowledges this risk in comments (e.g., `OkHttpMetricsEventListener.java:42`): \"uri tag is usually limited to URI patterns to mitigate tag cardinality explosion\".\n\nNo default cardinality limit is enforced in `MeterRegistry` or any registry implementation.\n\n**Remediation**: Document the cardinality risk prominently and consider enabling a default maximum (e.g., 1000 unique time series per metric name) or at minimum emit a warning when the number of registered meters crosses a threshold.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"9bf62cdc-f8ea-493b-9ae0-be67483da841",title:"StatsD/Etsy Flavor: Newlines in Tag Values Not Sanitized",severity:"LOW",project:"Micrometer 1.3.x (nes-1.3.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[MIC-005] CWE-94 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-94 (Protocol Injection)  \n**Classification**: Upstream-Inherited\n\n**Description**:  \nThe StatsD protocol is newline-delimited. The `EtsyStatsdLineBuilder` delegates to `HierarchicalNameMapper.toHierarchicalName()` which ultimately calls `NamingConvention.tagValue()`. The default `NamingConvention.tagValue()` implementation returns the value unchanged:\n\n`NamingConvention.java:148-150`:\n```java\ndefault String tagValue(String value) {\n    return value;\n}\n```\n\n`EtsyStatsdLineBuilder.java:81-84`:\n```java\nprivate String etsyName(@Nullable Statistic stat) {\n    return nameMapper.toHierarchicalName(stat != null ? id.withTag(stat) : id, config.namingConvention())\n            .replace(':', '_');\n}\n```\n\nOnly the colon character is replaced. A newline in the metric name would split the StatsD UDP/TCP packet into two records, potentially corrupting or injecting a second metric record with arbitrary content.\n\nBy contrast:\n- `TelegrafStatsdLineBuilder.telegrafEscape()` replaces `\\\\s` (includes `\\\\n`) with underscore.\n- `SysdigStatsdLineBuilder.sanitize()` uses a whitelist regex `[^\\\\w._]` which excludes newlines.\n- `InfluxNamingConvention.tagValue()` explicitly does `.replace('\\\\n', ' ')`.\n\nThe Etsy flavor lacks equivalent newline protection in tag values used as hierarchical name components.\n\n**Remediation**: In `EtsyStatsdLineBuilder.etsyName()`, strip or replace newline and carriage return characters from the produced hierarchical name.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

  // === Next.js 12.3.x (nes-12.3.x) ===
  {id:"a0000004-0002-4000-8000-000000000002",title:"No SSRF Blocklist in Image Optimizer for Private/Internal IPs",severity:"LOW",project:"Next.js 12.3.x (nes-12.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The image optimizer fetches external images via fetch(href) after validating against domains/remotePatterns allowlist but has no blocklist for private/internal IP ranges. DNS rebinding could cause fetch to internal IPs.",affected_files:"packages/next/server/image-optimizer.ts:630, packages/next/shared/lib/match-remote-pattern.ts",exploitation:"Attacker controls DNS for an allowed domain, points it to 127.0.0.1 or 169.254.169.254 (cloud metadata endpoint).",remediation:"Add DNS resolution validation before fetch() to check IP against private/reserved range blocklist.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.3.x",cve_ids:null,hackerone_id:null},
  // === Node.js 12.x (nes-v12.x) ===
  {id:"a0000010-0001-4000-8000-000000000001",title:"Prototype Pollution Escalation via child_process Env Injection",severity:"HIGH",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"normalizeSpawnArguments() iterates environment variables using for...in which traverses the entire prototype chain. Any prototype pollution vulnerability can inject LD_PRELOAD, NODE_OPTIONS, or PATH into ALL child processes, escalating to RCE.",affected_files:"lib/child_process.js:529-535",exploitation:"Object.prototype.LD_PRELOAD = '/tmp/evil.so' followed by spawnSync('env', []) produces LD_PRELOAD in child environment. Verified.",remediation:"Replace for...in with Object.keys(env) or Object.entries(env) to prevent prototype chain traversal.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  {id:"a0000010-0002-4000-8000-000000000002",title:"HTTP Header __proto__ Injection Nullifies req.headers Prototype",severity:"MEDIUM",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"IncomingMessage.headers is initialized as plain {} (not Object.create(null)). When remote client sends __proto__ header, the assignment triggers V8 __proto__ setter, nullifying the prototype chain. HTTP/2 correctly uses ObjectCreate(null).",affected_files:"lib/_http_incoming.js:61,256-266",exploitation:"Remote unauthenticated client sends __proto__: anything\\\\r\\\\n. Server code calling inherited methods on req.headers breaks.",remediation:"Use Object.create(null) for HTTP/1.1 headers, matching the HTTP/2 implementation.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  {id:"a0000010-0003-4000-8000-000000000003",title:"PBKDF2 Default Digest SHA-1 Still Active",severity:"MEDIUM",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"crypto.pbkdf2() called without digest defaults to SHA-1 (DEP0009 warning only). NIST deprecated SHA-1 for digital signatures in 2011. The minimum enforced iteration count is 1 (far below OWASP 600,000 recommendation for SHA-256).",affected_files:"lib/internal/crypto/pbkdf2.js:55-65",exploitation:"Applications omitting digest parameter get weak SHA-1 key derivation with potential for brute-force attacks.",remediation:"Remove SHA-1 default from PBKDF2. Throw an error when digest is null/omitted.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  {id:"a0000010-0004-4000-8000-000000000004",title:"constructor Property Override via HTTP Header",severity:"LOW",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Since headers is a plain {}, a remote client sending a constructor header overwrites the inherited constructor property. After this, req.headers.constructor is a string instead of the Object function.",affected_files:"lib/_http_incoming.js:256-278",exploitation:"Remote client sends constructor HTTP header. Server code checking req.headers.constructor for type checking receives unexpected values.",remediation:"Use Object.create(null) for HTTP/1.1 headers.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  {id:"a0000010-0005-4000-8000-000000000005",title:"Incomplete Regex Escaping in TLS addContext()",severity:"LOW",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The regex escaping does NOT escape parentheses (), or pipe |. addContext('(a|b).example.com', ctx) creates unescaped metacharacters matching a.example.com or b.example.com instead of the literal string.",affected_files:"lib/_tls_wrap.js:1437-1440",exploitation:"Server misconfigures TLS context matching to broader set of hostnames than intended.",remediation:"Escape parentheses and pipe in TLS addContext() regex.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  {id:"a0000010-0006-4000-8000-000000000006",title:"randomFill() Typo Bug Causes Silent Failure",severity:"LOW",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"buf.bytesLength (plural) is undefined on ArrayBufferView objects. The correct property is buf.byteLength (no s). The two-argument form crypto.randomFill(buf, callback) always throws because size becomes NaN.",affected_files:"lib/internal/crypto/random.js:98",exploitation:"Developers using two-argument randomFill() encounter silent failure, potentially using less secure alternatives.",remediation:"Fix typo: change buf.bytesLength to buf.byteLength.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  {id:"a0000010-0007-4000-8000-000000000007",title:"Default TLS Cipher Suite Includes Legacy Ciphers",severity:"LOW",project:"Node.js 12.x (nes-v12.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The default cipher list includes OpenSSL HIGH group which permits CBC-mode ciphers vulnerable to Lucky13 timing attacks, ciphers using SHA-1 HMAC, and 3DES (SWEET32 attack). !DES does NOT exclude 3DES.",affected_files:"src/node_constants.h:49-73",exploitation:"Downgrade attacks negotiating weak 3DES or CBC-mode ciphers with legacy peers.",remediation:"Add !3DES to the exclusion list. Consider explicit AEAD cipher allowlist.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"12.x",cve_ids:null,hackerone_id:null},
  // === Node.js 14.x (nes-v14.x) ===
  {id:"a0000012-0003-4000-8000-000000000003",title:"V8 8.4 Unpatched Security Vulnerabilities (v14)",severity:"HIGH",project:"Node.js 14.x (nes-v14.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"V8 8.4 is no longer maintained. Only 1 V8 security patch (CVE-2026-21717 array index hash) applied by NES. Hundreds of V8 CVEs involving type confusion, OOB access, and use-after-free have been published since.",affected_files:"deps/v8/",exploitation:"Applications using vm.runInNewContext(), eval(), or processing untrusted JavaScript are at risk of RCE.",remediation:"Never evaluate untrusted JavaScript. Applications requiring sandbox isolation should use separate processes.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"14.x",cve_ids:null,hackerone_id:null},
  {id:"a0000012-0002-4000-8000-000000000002",title:"OpenSSL 1.1.1 EOL with Incomplete Post-EOL Patching (v14)",severity:"MEDIUM",project:"Node.js 14.x (nes-v14.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"OpenSSL 1.1.1 reached EOL September 2023. Version 1.1.1-w-nes.1 with two cherry-picks (CVE-2023-5678, CVE-2024-0727). Post-EOL CVEs NOT patched include CVE-2024-2511, CVE-2024-4603, CVE-2024-4741 (use-after-free), CVE-2024-5535 (buffer overread).",affected_files:"deps/openssl/openssl/",exploitation:"CVE-2024-4741 (use-after-free) and CVE-2024-5535 (buffer overread) could lead to information disclosure or DoS.",remediation:"Cherry-pick fixes for CVE-2024-4741 and CVE-2024-5535. Document OpenSSL EOL status prominently.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"14.x",cve_ids:"CVE-2024-4741,CVE-2024-5535",hackerone_id:null},
  {id:"a0000012-0004-4000-8000-000000000004",title:"requestTimeout Defaults to 0 (Disabled) (v14)",severity:"MEDIUM",project:"Node.js 14.x (nes-v14.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Node.js 14 has requestTimeout infrastructure (since 14.11.0) but defaults to 0 (disabled). Node.js 18+ defaults to 300000ms. Attacker can hold connections open indefinitely by slow body data.",affected_files:"lib/_http_server.js:387",exploitation:"Slowloris variant: attacker holds connections open after headers by sending body data at very slow rate.",remediation:"Set server.requestTimeout = 300000 or use reverse proxy with request timeouts.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"14.x",cve_ids:null,hackerone_id:null},

  {id:"a0000012-0008-4000-8000-000000000008",title:"insecureHTTPParser Disables All HTTP Parsing Protections (v14)",severity:"MEDIUM",project:"Node.js 14.x (nes-v14.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The --insecure-http-parser flag enables ALL lenient flags in llhttp (10 different modes), bypassing protections against HTTP request smuggling that were carefully backported. Warning emitted only once to stderr.",affected_files:"lib/_http_common.js:32, src/node_http_parser.cc:84-99",exploitation:"If enabled, all HTTP request smuggling protections are bypassed. Node.js 14 users with legacy apps more likely to use this flag.",remediation:"Ensure NES documentation warns against using this flag in production.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"14.x",cve_ids:null,hackerone_id:null},

  {id:"c0060004-0002-4000-8000-000000000002",title:"No Network Permission Scope in v20 Permission Model",severity:"LOW",project:"Node.js 20.x (nes-v20.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The v20 permission model defines scopes for fs, child, worker, wasi, and inspector only. No net or dns scope exists. Code under --experimental-permission can make unrestricted network connections via fetch, http.request, net.connect, or dgram. Cannot prevent SSRF.",affected_files:"src/permission/permission_base.h:17-36; lib/net.js; lib/dgram.js",exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"",hackerone_id:null},

  {id:"a0000008-0001-4000-8000-000000000001",title:"NES TLS Cipher Configuration Silent Failure",severity:"MEDIUM",project:"Spring Boot 2.7.x (nes-2.7.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"NES commit 5ad94cd added TLS 1.2/1.3 cipher splitting. Two silent-failure paths exist: isTls13Cipher() throws classifying all as TLS 1.2, and setCipherSuites() throws silently discarding TLS 1.3 ciphers. Neither catch block logs a warning.",affected_files:"spring-boot/src/main/java/org/springframework/boot/web/embedded/tomcat/SslConnectorCustomizer.java:99-110,217-226",exploitation:"User configures server.ssl.ciphers to restrict to TLS 1.3 only. Silent failure causes Tomcat to use default ciphers including weaker TLS 1.2 suites.",remediation:"Add logging to TLS cipher catch blocks to alert operators when cipher configuration silently fails.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.7.x",cve_ids:null,hackerone_id:null},

  {id:"a0000008-0002-4000-8000-000000000002",title:"GraphQL Introspection Enabled by Default (2.7.x)",severity:"LOW",project:"Spring Boot 2.7.x (nes-2.7.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Spring Boot 2.7 introduced Spring for GraphQL auto-configuration. By default, spring.graphql.schema.introspection.enabled=true, allowing any client to enumerate the entire GraphQL schema. No query depth/complexity limits are configured.",affected_files:"spring-boot-autoconfigure/.../graphql/GraphQlProperties.java:112, spring-boot-autoconfigure/.../graphql/GraphQlAutoConfiguration.java:82",exploitation:"Unauthenticated introspection query reveals internal data models. Deeply nested introspection queries can degrade performance.",remediation:"Set spring.graphql.schema.introspection.enabled=false in production profiles.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.7.x",cve_ids:null,hackerone_id:null},
